<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:radial-gradient(circle,#050505,#000);
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

.container{text-align:center;margin-top:60px;}

/* LOGO */
.logo{
width:80px;
filter:drop-shadow(0 0 10px #00f5d4);
margin-bottom:10px;
}

textarea{
width:80%;
height:140px;
background:rgba(0,0,0,0.7);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
outline:none;
}

textarea:focus{
box-shadow:0 0 20px #00f5d4;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 25px rgba(0,255,200,0.2);
}

.bar{
height:10px;
background:linear-gradient(90deg,green,red);
width:0%;
transition:0.4s;
border-radius:10px;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:10px 18px;
margin:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}

.btn:hover{
background:#00f5d4;
color:black;
}
</style>
</head>

<body>

<div class="container">

<!-- SVG EAGLE LOGO -->
<svg class="logo" viewBox="0 0 100 100">
<path fill="#00f5d4" d="M10 60 L50 10 L90 60 L70 50 L50 80 L30 50 Z"/>
</svg>

<h1>BlackFalcon SOC</h1>

<button class="btn" onclick="toggleLang()">🌐 Language</button>
<button class="btn" onclick="generatePDF()">📄 Report</button>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

let currentLang="ar";
let lastSpeak="";
let lastResult="", lastType="", lastRec="", lastMsg="";

/* ===== صوت ذكي ===== */
function speak(text){
if(text===lastSpeak) return;
lastSpeak=text;

speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
u.rate=1;
u.pitch=1;
speechSynthesis.speak(u);
}

/* ===== كلمات أخطر ===== */
const suspiciousWords=[
"otp","password","bank","bitcoin","crypto","http","urgent",
"click here","verify","account","login","security alert",
"تحقق","كلمة المرور","حسابك","بنك","رابط","جائزة","مجانا",
"استثمار","ربح سريع","عرض","هدية","اضغط","winner","lottery"
];

/* ===== تحليل ===== */
let timer;
msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,900);
});

function analyze(){

let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;

suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=8;
});

if(text.includes("http")) score+=25;
if(text.includes("bank")) score+=20;
if(text.includes("otp")) score+=25;

if(score>100) score=100;

/* نوع */
let type="Safe";

if(text.match(/verify|تحقق|login/)) type="Phishing";
else if(text.match(/bank|account/)) type="Data Theft";
else if(text.match(/bitcoin|crypto/)) type="Crypto Scam";
else if(text.match(/http/)) type="Malicious Link";

/* UI */
score=Math.round(score);
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>35){

status.innerHTML="<span class='danger'>⚠️ "+(currentLang==="ar"?"غير آمن":"UNSAFE")+"</span>";
rec.innerHTML="⚠️ "+(currentLang==="ar"?"لا تضغط الروابط":"Do not click links");
speak(currentLang==="ar"?"تحذير خطر":"Warning dangerous");

lastResult="UNSAFE";
lastRec="Do not click suspicious links";

}else{

status.innerHTML="<span class='safe'>✔️ "+(currentLang==="ar"?"آمن":"SAFE")+"</span>";
rec.innerHTML="✔️ "+(currentLang==="ar"?"لا يوجد تهديد":"No threat");
speak(currentLang==="ar"?"آمن":"Safe");

lastResult="SAFE";
lastRec="No threat detected";
}

lastType=type;
}

/* ===== اللغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";

msg.placeholder=currentLang==="ar"?"الصق الرسالة هنا":"Paste message here";
}

/* ===== PDF احترافي ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

/* خلفية */
doc.setFillColor(0,0,0);
doc.rect(0,0,210,297,"F");

/* لون */
doc.setTextColor(0,255,200);

/* عنوان */
doc.setFontSize(20);
doc.text("BlackFalcon SOC",105,30,null,null,"center");

doc.setFontSize(12);
doc.text("Cyber Security Report",105,40,null,null,"center");

/* خط */
doc.line(20,50,190,50);

/* محتوى */
doc.setFontSize(11);

doc.text("Message:",20,65);
doc.text(doc.splitTextToSize(lastMsg||"Empty",170),20,75);

doc.text("Result: "+lastResult,20,110);
doc.text("Type: "+lastType,20,120);
doc.text("Risk: "+document.getElementById("score").innerText+"%",20,130);

doc.text("Recommendation:",20,145);
doc.text(doc.splitTextToSize(lastRec,170),20,155);

/* Footer */
doc.text("Generated by BlackFalcon SOC AI",105,280,null,null,"center");

doc.save("BlackFalcon_Report.pdf");

speak(currentLang==="ar"?"تم إنشاء التقرير":"Report generated");
}

</script>

</body>
</html>
