<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{ --neon-green:#00ffcc; --danger-red:#ff0033; }
body{ margin:0; background:black; color:var(--neon-green); font-family:'Orbitron',sans-serif; overflow-x:hidden; }
canvas{ position:fixed; top:0; left:0; z-index:-1; }
.container{ text-align:center; margin-top:40px; }
textarea{ width:85%; height:130px; background:black; border:2px solid var(--neon-green); color:var(--neon-green); padding:15px; }
.bar{ height:10px; background:var(--neon-green); width:0%; transition:0.5s;}
.danger-bar{ background:var(--danger-red)!important;}

<body>

<canvas id="matrix"></canvas>

<div class="container">
<h1>🦅 BlackFalcon SOC</h1>

<button onclick="toggleLang()">EN / AR</button>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div>
<p id="statusLabel">Threat Status: CLEAN</p>
<p>Risk: <span id="score">0</span>%</p>
<div class="bar" id="bar"></div>
</div>

<p id="recContent"></p>
</div>

const msgInput=document.getElementById("msg");

function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

const suspiciousKeywords = keywordsText.split("\n").map(k=>k.trim()).filter(k=>k);

msgInput.addEventListener("input",()=>{
let text=msgInput.value.toLowerCase();
let score=0;

suspiciousKeywords.forEach(k=>{
if(text.includes(k.toLowerCase())){
score+=20;
if(k.length>6)score+=10;
}
});

if(score>100)score=100;

updateUI(score);
});

function updateUI(score){
let bar=document.getElementById("bar");
let scoreVal=document.getElementById("score");
let statusLabel=document.getElementById("statusLabel");
let rec=document.getElementById("recContent");

scoreVal.innerText=score;
bar.style.width=score+"%";

if(score>30){
bar.classList.add("danger-bar");

let s=currentLang==="ar"?"خطر عالي":"HIGH RISK";
let r=currentLang==="ar"?"🚨 رسالة احتيالية":"🚨 Phishing detected";

statusLabel.innerText=s;
rec.innerText=r;
speak(s+" "+r);

}else{
bar.classList.remove("danger-bar");
let s=currentLang==="ar"?"آمن":"SAFE";
statusLabel.innerText=s;
rec.innerText="";
speak(s);
}
}

function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";
}
</script>
