<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00ff00;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
margin-top:60px;
}

h1{font-size:40px;}

.lang-btn{
margin-top:10px;
}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.7);
border:1px solid #00ff00;
border-radius:20px;
padding:20px;
color:#00ff00;
margin-top:20px;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.7);
box-shadow:0 0 20px #00ff00;
}

.bar{
height:10px;
background:red;
width:0%;
}

.safe{color:#00ff88;}
.danger{color:red;}

button{
padding:8px 15px;
border:1px solid #00ff00;
background:transparent;
color:#00ff00;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<!-- 🔽 زر تحت الاسم -->
<div class="lang-btn">
<button id="langBtn" onclick="toggleLang()">AR / EN</button>
</div>

<textarea id="msg"></textarea>

<div class="card">
<div id="status">—</div>
<div id="riskLabel">Risk</div>
<div><span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec"></div>

</div>

<script>

let currentLang="ar";

/* 🔊 صوت */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
u.rate=0.9;
speechSynthesis.speak(u);
}

/* 🚨 إنذار */
function alarm(){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
osc.type="square";
osc.frequency.setValueAtTime(700,ctx.currentTime);
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),200);
}

/* 🌐 ترجمة */
const lang={
ar:{
placeholder:"الصق الرسالة هنا",
risk:"درجة الخطر",
safe:"آمن",
danger:"تهديد",
recSafe:"لا يوجد تهديد",
recDanger:"لا تتفاعل مع الرسالة"
},
en:{
placeholder:"Paste message",
risk:"Risk",
safe:"SAFE",
danger:"THREAT",
recSafe:"No threat detected",
recDanger:"Do not interact"
}
};

/* 🧠 قراءة عند المرور على أي عنصر */
document.addEventListener("mouseover",(e)=>{

let el=e.target;

if(el.id==="msg") speak(currentLang==="ar"?"مربع إدخال النص":"Text input");
else if(el.id==="langBtn") speak(currentLang==="ar"?"زر تغيير اللغة":"Language button");
else if(el.id==="status") speak(currentLang==="ar"?"حالة التهديد":"Threat status");
else if(el.id==="rec") speak(currentLang==="ar"?"التوصية":"Recommendation");
else if(el.id==="score") speak(currentLang==="ar"?"نسبة الخطر":"Risk percentage");

});

/* تحليل */
const high=["password","otp","bank","كلمة المرور"];
const medium=["http","bit.ly","click","اضغط"];

let msg=document.getElementById("msg");

msg.addEventListener("input",analyze);

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

high.forEach(w=>{ if(text.includes(w)) score+=25; });
medium.forEach(w=>{ if(text.includes(w)) score+=15; });

if(score>100) score=100;

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>30){

status.innerHTML="<span class='danger'>"+lang[currentLang].danger+"</span>";
rec.innerText=lang[currentLang].recDanger;

alarm();
speak(lang[currentLang].danger);

}else{

status.innerHTML="<span class='safe'>"+lang[currentLang].safe+"</span>";
rec.innerText=lang[currentLang].recSafe;

speak(lang[currentLang].safe);

}

}

/* تغيير اللغة */
function toggleLang(){

currentLang=currentLang==="ar"?"en":"ar";

msg.placeholder=lang[currentLang].placeholder;
document.getElementById("riskLabel").innerText=lang[currentLang].risk;

speak(currentLang==="ar"?"تم تغيير اللغة":"Language changed");

}

/* 🟢 MATRIX احترافي */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="01";
const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];
for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;
}

}

setInterval(draw,33);

</script>

</body>
</html>
