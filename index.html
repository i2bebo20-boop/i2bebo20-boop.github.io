<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

.alert-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,0,0,0.25);
display:none;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
margin-top:20px;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 25px #00f5d433;
}

.bar{height:10px;background:#ff0033;width:0%;}
.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<div id="alertBg" class="alert-bg"></div>
<canvas id="matrix"></canvas>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<button class="btn" onclick="toggleLang()" id="langBtn">EN</button>

<textarea id="msg"></textarea>

<div class="card">
<div id="status">—</div>
<div id="riskLabel">Risk:</div>
<div><span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec"></div>

</div>

<script>

let currentLang="ar";

/* ===== صوت احترافي ===== */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);

u.lang = currentLang==="ar" ? "ar-SA" : "en-US";
u.rate = 0.95;
u.pitch = 1.1;
u.volume = 1;

speechSynthesis.speak(u);
}

/* 🔊 إنذار */
function alarm(){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
osc.type="sawtooth";
osc.frequency.setValueAtTime(600,ctx.currentTime);
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),200);
}

/* 🌐 نصوص */
const langData={
ar:{
placeholder:"الصق الرسالة هنا...",
risk:"درجة الخطر:",
safe:"✔️ آمن",
danger:"⚠️ تهديد",
safeMsg:"لا يوجد تهديد",
dangerMsg:"لا تتفاعل مع الرسالة. أبلغ الأمن السيبراني فوراً"
},
en:{
placeholder:"Paste message here...",
risk:"Risk:",
safe:"✔️ SAFE",
danger:"⚠️ THREAT",
safeMsg:"No threat detected",
dangerMsg:"Do not interact. Report immediately"
}
};

/* 🖱️ قراءة عند المرور */
function addHoverVoice(el,textAr,textEn){
el.addEventListener("mouseenter",()=>{
speak(currentLang==="ar"?textAr:textEn);
});
}

/* كلمات */
const highRisk=["password","otp","bank","crypto","bitcoin","كلمة المرور","تحقق"];
const mediumRisk=["http","https","bit.ly","click","urgent","login","account","اضغط"];

let msg=document.getElementById("msg");
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1000);
});

/* تحليل */
function analyze(){

let text=msg.value.toLowerCase();
let score=0;

highRisk.forEach(w=>{ if(text.includes(w)) score+=25; });
mediumRisk.forEach(w=>{ if(text.includes(w)) score+=15; });

if(score>100) score=100;

let type="Safe";
let mitre="None";

if(text.includes("password")||text.includes("otp")){
type="Credential Theft";
mitre="T1003";
}
else if(text.includes("http")){
type="Malicious Link";
mitre="T1071";
}

/* عرض */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");
let alertBg=document.getElementById("alertBg");

if(score>30){

alertBg.style.display="block";
alarm();

status.innerHTML="<span class='danger'>"+langData[currentLang].danger+"</span>";
rec.innerText=langData[currentLang].dangerMsg;

/* 🔊 قراءة */
speak(langData[currentLang].dangerMsg);

}else{

alertBg.style.display="none";

status.innerHTML="<span class='safe'>"+langData[currentLang].safe+"</span>";
rec.innerText=langData[currentLang].safeMsg;

speak(langData[currentLang].safeMsg);

}

}

/* تغيير اللغة */
function toggleLang(){

currentLang = currentLang==="ar"?"en":"ar";

document.getElementById("langBtn").innerText = currentLang==="ar"?"EN":"AR";

msg.placeholder = langData[currentLang].placeholder;
document.getElementById("riskLabel").innerText = langData[currentLang].risk;

/* قراءة تغيير اللغة */
speak(currentLang==="ar"?"تم تغيير اللغة إلى العربية":"Language switched to English");

}

/* تفعيل hover صوت */
addHoverVoice(msg,"مربع إدخال النص","Text input field");
addHoverVoice(document.getElementById("langBtn"),"زر تغيير اللغة","Language button");

</script>

</body>
</html>
