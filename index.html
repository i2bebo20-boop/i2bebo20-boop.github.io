<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.5s;
}

/* طبقة الخطر 🔴 */
.alert-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,0,0,0.25);
z-index:0;
display:none;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

.logo{font-size:60px;}
.title{font-size:22px;}

.lang-btn{
margin-top:10px;
}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
margin-top:20px;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 25px #00f5d433;
}

.bar{
height:10px;
background:#ff0033;
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔴 طبقة الخطر -->
<div id="alertBg" class="alert-bg"></div>

<canvas id="matrix"></canvas>

<div class="container">

<div class="logo">🦅</div>
<div class="title">BlackFalcon SOC</div>

<!-- 📍 زر تحت الاسم -->
<div class="lang-btn">
<button class="btn" onclick="toggleLang()">EN / AR</button>
</div>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

let currentLang="ar";

/* ===== صوت ===== */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

/* ===== كلمات ===== */
const highRisk=["password","otp","verify","bank","crypto","bitcoin","كلمة المرور","تحقق"];
const mediumRisk=["http","https","bit.ly","tinyurl","click","urgent","login","account","جائزة","اضغط"];

/* ===== تحليل ===== */
let timer;
const msg=document.getElementById("msg");

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

/* حساب */
highRisk.forEach(w=>{ if(text.includes(w)) score+=25; });
mediumRisk.forEach(w=>{ if(text.includes(w)) score+=15; });

if(text.includes("http")||text.includes("bit.ly")) score+=35;

if(score>100) score=100;

/* ===== MITRE ===== */
let type="Safe";
let mitre="None";

if(text.includes("verify")||text.includes("تحقق")){
type="Phishing";
mitre="TA0001 - Initial Access / T1566";
}
else if(text.includes("password")||text.includes("otp")){
type="Credential Theft";
mitre="TA0006 - Credential Access / T1003";
}
else if(text.includes("crypto")){
type="Scam";
mitre="TA0040 - Impact";
}
else if(text.includes("http")){
type="Malicious Link";
mitre="TA0011 - Command & Control / T1071";
}

/* عرض */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+type;
document.getElementById("mitre").innerText="MITRE: "+mitre;

let status=document.getElementById("status");
let rec=document.getElementById("rec");
let alertBg=document.getElementById("alertBg");

/* 🔴 خطر */
if(score>30){

alertBg.style.display="block";

if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ تهديد</span>";
rec.innerHTML="🚨 لا تتفاعل مع الرسالة. أبلغ فريق الأمن السيبراني (SOC) أو CERT فوراً.";
speak("تحذير تهديد. قم بالإبلاغ فوراً");
}else{
status.innerHTML="<span class='danger'>⚠️ THREAT</span>";
rec.innerHTML="🚨 Do not interact. Report to SOC or CERT immediately.";
speak("Threat detected. Report immediately");
}

}

/* 🟢 آمن */
else{

alertBg.style.display="none";

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد";
speak("لا يوجد تهديد");
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat detected";
speak("No threat detected");
}

}

}

/* ===== لغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";
msg.placeholder=currentLang==="ar"?"الصق الرسالة هنا":"Paste message here";
}

/* ===== MATRIX ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>

</body>
</html>
