<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:black;
color:#00ff88;
font-family:'Orbitron',monospace;
overflow:hidden;
}

/* MATRIX */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* UI */
.container{text-align:center;margin-top:60px;}

textarea{
width:80%;
height:140px;
background:black;
border:1px solid #00ff88;
padding:15px;
color:#00ff88;
}

.card{
width:80%;
margin:30px auto;
padding:20px;
border:1px solid #00ff88;
}

.bar{
height:10px;
background:red;
width:0%;
}

.btn{
padding:8px 15px;
margin:10px;
border:1px solid #00ff88;
background:black;
color:#00ff88;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>BLACKFALCON SOC</h1>

<button class="btn" onclick="toggleLang()">EN / AR</button>
<button class="btn" onclick="generatePDF()">REPORT</button>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

/* MATRIX */
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");

c.height=window.innerHeight;
c.width=window.innerWidth;

let letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters=letters.split("");

let fontSize=14;
let columns=c.width/fontSize;

let drops=[];
for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ff88";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>c.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);

/* ===== صوت ===== */
let lastSpeak="";
function speak(text){
if(text===lastSpeak) return;
lastSpeak=text;

speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

/* ===== لغة ===== */
let currentLang="ar";

/* ===== Hover للمكفوفين ===== */
msg.addEventListener("mouseenter",()=>{
speak(currentLang==="ar"?"مربع إدخال الرسالة":"Message input box");
});

/* ===== كلمات ضخمة ===== */
const suspiciousWords=[
"otp","password","bank","bitcoin","crypto","wallet","http","https",
"urgent","click","verify","account","login","security","alert",
"free","money","offer","limited","winner","lottery","gift","bonus",
"transfer","payment","invoice","refund","claim","update","confirm",
"تحقق","كلمة المرور","حساب","بنك","رابط","اضغط","عاجل","تحويل",
"جائزة","هدية","استثمار","ربح","مجانا","تأكيد","تحديث","استرجاع",
"فاتورة","دفعة","رمز","تفعيل","تحذير","عرض","مكافأة"
];

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,800);
});

let lastResult="",lastType="",lastRec="",lastMsg="";

function analyze(){

let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;

suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=6;
});

if(text.includes("http")) score+=25;
if(text.includes("otp")) score+=25;

if(score>100) score=100;

let type="Safe";

if(text.match(/verify|تحقق|login/)) type="Phishing";
else if(text.match(/bank|account/)) type="Data Theft";
else if(text.match(/bitcoin|crypto/)) type="Crypto Scam";
else if(text.match(/http/)) type="Malicious Link";

/* UI */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>35){

status.innerHTML="⚠️ "+(currentLang==="ar"?"غير آمن":"UNSAFE");
lastResult="UNSAFE";

lastRec=currentLang==="ar"?
"لا تضغط الروابط ولا تشارك بياناتك":
"Do not click links or share data";

}else{

status.innerHTML="✔️ "+(currentLang==="ar"?"آمن":"SAFE");
lastResult="SAFE";

lastRec=currentLang==="ar"?
"لا يوجد تهديد":
"No threat detected";
}

rec.innerHTML=lastRec;

/* 🔊 قراءة تلقائية */
speak(lastResult+" . "+lastRec);

lastType=type;
}

/* ===== اللغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";
msg.placeholder=currentLang==="ar"?"الصق الرسالة هنا":"Paste message here";
}

/* ===== PDF ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFillColor(0,0,0);
doc.rect(0,0,210,297,"F");

doc.setTextColor(0,255,0);

let ar=currentLang==="ar";

doc.setFontSize(18);
doc.text(ar?"تقرير أمني":"Security Report",105,30,null,null,"center");

doc.line(20,40,190,40);

doc.setFontSize(12);

doc.text(ar?"الرسالة:":"Message:",20,60);
doc.text(doc.splitTextToSize(lastMsg||"",170),20,70);

doc.text((ar?"النتيجة: ":"Result: ")+lastResult,20,110);
doc.text((ar?"النوع: ":"Type: ")+lastType,20,120);
doc.text((ar?"الخطر: ":"Risk: ")+document.getElementById("score").innerText+"%",20,130);

doc.text(ar?"التوصية:":"Recommendation:",20,150);
doc.text(doc.splitTextToSize(lastRec,170),20,160);

doc.save("BlackFalcon_Report.pdf");

speak(ar?"تم إنشاء التقرير":"Report generated");
}

</script>

</body>
</html>
