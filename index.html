<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.6s;
}

body.dangerMode{
background:#140000;
box-shadow:inset 0 0 300px #ff0033;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
outline:none;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 30px #00f5d422;
text-align:left;
}

.progress{
height:10px;
background:#111;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#ff0033;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
margin:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<button class="btn" onclick="toggleLang()">EN / AR</button>
<button class="btn" onclick="generatePDF()">PDF REPORT</button>

<h1 class="speakable">🦅 BlackFalcon SOC</h1>
<div class="speakable" id="subtitle">منصة تحليل الرسائل المشبوهة</div>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<h2 class="speakable" id="threatTitle">حالة التهديد</h2>
<div id="status" class="speakable">—</div>

<div class="speakable">
<span id="riskLabel">نسبة الخطورة:</span> <span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="mitre" class="speakable">MITRE: —</div>
</div>

<div id="rec" class="speakable safe">
✔️ بانتظار التحليل
</div>

</div>

<script>

let currentLang="ar";
let lastResult="", lastType="", lastRec="";

/* ===== صوت ===== */
function speak(text){
if(!text) return;
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(msg);
}

/* قراءة عند المرور */
document.addEventListener("mouseover",e=>{
if(e.target.classList.contains("speakable")){
speak(e.target.innerText);
}
});

/* مربع النص */
const msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
speak(currentLang==="ar"?
"أنت الآن في مربع إدخال الرسالة":
"You are in the message input field");
});

/* ===== كلمات ضخمة جداً ===== */
const suspiciousWords=[

/* كلمات قوية جداً */
"تحقق من حسابك البنكي","verify your bank account",
"تحديث بياناتك البنكية","update your banking info",

/* قائمتك الطويلة */
"خصم 50%","مجاناً","جائزة","اضغط هنا","انقر هنا",
"اربح الآن","ربح سريع","استثمار","مضاعفة أموالك",
"كاش","قرض","استرداد","عرض حصري","عرض محدود",
"free money","guaranteed profit","urgent","click now",
"limited time","act now","winner","lottery","bonus",

/* إضافات إنجليزية قوية */
"earn money fast","work from home","no risk investment",
"double your income","instant profit","crypto investment",
"bitcoin offer","claim now","verify identity","security alert",
"account suspended","reset password","bank transfer",
"wire transfer","credit card details","cvv number",
"enter otp","confirm login","unusual activity detected",

/* روابط */
"http://","https://","bit.ly","tinyurl",".ru",".cn",".tk",".gq",".ml"

];

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200); // تأخير
});

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

/* رفع خطورة العبارات المهمة */
if(text.includes("تحقق من حسابك البنكي")) score+=60;
if(text.includes("verify your bank account")) score+=60;

suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=10;
});

if(text.includes("http")) score+=25;

if(score>100) score=100;

/* نوع الهجوم */
let type="—";

if(text.includes("verify")||text.includes("تحقق")) type="Phishing";
else if(text.includes("bank")||text.includes("card")) type="Data Theft";
else if(text.includes("bitcoin")||text.includes("investment")) type="Financial Scam";
else if(text.includes("http")) type="Malicious Link";

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("mitre").innerText="MITRE: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>30){

document.body.classList.add("dangerMode");

if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";
speak("تحذير. الرسالة غير آمنة. لا تضغط الروابط");
lastResult="غير آمن";
lastRec="لا تضغط الروابط ولا تشارك بياناتك";
}else{
status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
rec.innerHTML="⚠️ Do not click links or share data";
speak("Warning. This message is unsafe. Do not click links");
lastResult="UNSAFE";
lastRec="Do not click links or share data";
}

lastType=type;

}else{

document.body.classList.remove("dangerMode");

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد واضح";
speak("الرسالة آمنة");
lastResult="آمن";
lastRec="لا يوجد تهديد واضح";
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat detected";
speak("This message is safe");
lastResult="SAFE";
lastRec="No threat detected";
}

lastType=type;
}

}

/* ===== لغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";

if(currentLang==="en"){
document.getElementById("subtitle").innerText="Suspicious Message Analyzer";
document.getElementById("threatTitle").innerText="Threat Status";
document.getElementById("riskLabel").innerText="Risk Score:";
msg.placeholder="Paste message here";
}else{
document.getElementById("subtitle").innerText="منصة تحليل الرسائل المشبوهة";
document.getElementById("threatTitle").innerText="حالة التهديد";
document.getElementById("riskLabel").innerText="نسبة الخطورة:";
msg.placeholder="الصق الرسالة هنا";
}
}

/* ===== PDF احترافي ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(18);
doc.text("🦅 BlackFalcon SOC REPORT",20,20);

doc.setFontSize(12);
doc.text("Result: "+lastResult,20,40);
doc.text("Threat Type: "+lastType,20,50);
doc.text("Recommendation: "+lastRec,20,60);

doc.save("BlackFalcon_Report.pdf");
}

/* ===== Matrix ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>
</body>
</html>
