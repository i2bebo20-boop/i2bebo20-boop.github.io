<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.5s;
}

/* وضع الخطر */

body.dangerMode{
background:#140000;
box-shadow:inset 0 0 300px red;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* زر اللغة */

.langBtn{
position:absolute;
top:20px;
right:25px;
padding:8px 18px;
border-radius:20px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
}

/* العنوان */

.container{
text-align:center;
margin-top:70px;
}

h1{
font-size:42px;
text-shadow:0 0 25px #00f5d4;
}

.subtitle{
margin-bottom:35px;
color:#00f5d4aa;
}

/* مربع الإدخال */

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
outline:none;
}

/* الكرت */

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 30px #00f5d422;
text-align:left;
}

/* شريط الخطورة */

.progress{
height:10px;
background:#111;
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#ff0033;
transition:0.4s;
}

/* التوصية */

.recommendation{
width:80%;
margin:20px auto;
padding:20px;
border-radius:20px;
font-weight:bold;
}

.recSafe{
background:rgba(0,255,136,0.1);
border:2px solid #00ff88;
color:#00ff88;
}

.recDanger{
background:rgba(255,0,0,0.1);
border:2px solid red;
color:red;
}

.safe{color:#00ff88;}
.danger{color:red;}

</style>
</head>

<body>

<button class="langBtn" onclick="toggleLang()">EN</button>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="speakable">🦅 BlackFalcon SOC</h1>

<div class="subtitle speakable" id="subtitle">
منصة تحليل الرسائل المشبوهة
</div>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">

<h2 class="speakable" id="threatTitle">
حالة التهديد
</h2>

<div id="status" class="speakable">—</div>

<div class="speakable">
<span id="riskLabel">نسبة الخطورة:</span>
<span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div>MITRE: T1566 – Phishing</div>

</div>

<div id="rec" class="recommendation recSafe speakable">
✔️ بانتظار التحليل
</div>

</div>

<script>

/* =====================
قائمة كلمات الاحتيال
===================== */

const suspiciousWords=[

"verify account","account verification","bank account",
"update account","secure account","login now",
"password reset","confirm password","security alert",
"suspicious activity","account suspended","account locked",
"confirm identity","verify identity","credit card",
"bank transfer","wire transfer","urgent payment",
"gift card","apple gift card","amazon gift card",
"google play card","steam card","bitcoin payment",
"crypto investment","free money","claim prize",
"lottery winner","limited offer","act now",
"click here","open link","visit link",
"download attachment","open attachment",
"tax refund","paypal alert","amazon security",
"apple id locked","account recovery","security update",
"bank security team","confirm transaction",
"pending payment","unusual login",
"verify payment","confirm payment",
"urgent action required","security notice",
"billing problem","payment failed",
"update billing information",
"verification code","otp code",

/* Arabic */

"تحقق من حسابك",
"تحقق من حسابك البنكي",
"تم ايقاف حسابك",
"تم تعليق حسابك",
"تم حظر حسابك",
"حسابك موقوف",
"تم تجميد حسابك",
"تحديث الحساب",
"تحديث بياناتك",
"تحديث معلوماتك",
"التحقق من الهوية",
"تأكيد الهوية",
"تأكيد حسابك",
"إعادة تعيين كلمة المرور",
"كلمة المرور",
"بطاقة ائتمان",
"بطاقة بنكية",
"تحويل بنكي",
"تحويل الأموال",
"تحويل فوري",
"طلب دفع",
"عملية دفع",
"تنبيه أمني",
"رسالة من البنك",
"تأكيد الدفع",
"اضغط هنا",
"اضغط الرابط",
"افتح الرابط",
"زيارة الرابط",
"اضغط للتأكيد",
"اضغط للتحقق",
"ارسل رمز",
"رمز التحقق",
"رمز التفعيل",
"ارسل معلوماتك",
"ارسل بياناتك",
"جائزة",
"ربحت جائزة",
"مبروك فزت",
"استلام جائزة",
"جائزة مالية",
"ارباح سريعة",
"استثمار سريع",
"ربح فوري",
"عرض محدود",
"عرض خاص",
"تنبيه عاجل",
"طلب عاجل"

];

/* =====================
كشف الروابط
===================== */

function detectLinks(text){

let regex=/https?:\/\/[^\s]+/g;

let links=text.match(regex);

if(!links) return 0;

return links.length*15;

}

/* =====================
تحليل الرسالة
===================== */

const msg=document.getElementById("msg");

msg.addEventListener("input",analyze);

function analyze(){

let text=msg.value.toLowerCase();

let score=0;

suspiciousWords.forEach(word=>{
if(text.includes(word)){
score+=5;
}
});

score+=detectLinks(text);

if(score>100) score=100;

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>=40){

status.innerHTML="⚠️ رسالة مشبوهة";
status.className="danger speakable";

rec.className="recommendation recDanger speakable";
rec.innerHTML="⚠️ لا تضغط أي رابط. احذف الرسالة فوراً.";

document.body.classList.add("dangerMode");

speak("تحذير الرسالة مشبوهة");

}else{

status.innerHTML="✔️ الرسالة آمنة";
status.className="safe speakable";

rec.className="recommendation recSafe speakable";
rec.innerHTML="✔️ لا يوجد تهديد واضح.";

document.body.classList.remove("dangerMode");

speak("الرسالة آمنة");

}

}

/* =====================
الصوت
===================== */

let currentLang="ar";

function speak(text){

speechSynthesis.cancel();

let msg=new SpeechSynthesisUtterance(text);

msg.lang=currentLang==="ar"?"ar-SA":"en-US";

msg.rate=0.9;

speechSynthesis.speak(msg);

}

document.addEventListener("mouseover",e=>{
if(e.target.classList.contains("speakable")){
speak(e.target.innerText);
}
});

msg.addEventListener("focus",()=>{
if(currentLang==="ar"){
speak("مكان إدخال الرسالة");
}else{
speak("Message input field");
}
});

/* =====================
تبديل اللغة
===================== */

function toggleLang(){

const btn=document.querySelector(".langBtn");

if(currentLang==="ar"){

currentLang="en";

btn.innerText="AR";

document.getElementById("subtitle").innerText="Suspicious Message Analysis Platform";

document.getElementById("threatTitle").innerText="Threat Status";

document.getElementById("riskLabel").innerText="Risk Level:";

msg.placeholder="Paste message here";

document.getElementById("rec").innerText="Waiting for analysis";

}else{

currentLang="ar";

btn.innerText="EN";

document.getElementById("subtitle").innerText="منصة تحليل الرسائل المشبوهة";

document.getElementById("threatTitle").innerText="حالة التهديد";

document.getElementById("riskLabel").innerText="نسبة الخطورة:";

msg.placeholder="الصق الرسالة هنا";

document.getElementById("rec").innerText="بانتظار التحليل";

}

}

/* =====================
خلفية Matrix
===================== */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="BLACKFALCONSOC01";
const matrix=letters.split("");

const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++){
drops[x]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
