<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{ --neon-green:#00ffcc; --danger-red:#ff0033; }
body{ margin:0; background:black; color:var(--neon-green); font-family:'Orbitron',sans-serif; overflow-x:hidden; transition:0.4s; }
canvas{ position:fixed; top:0; left:0; z-index:-1; }
.container{ text-align:center; margin-top:0px; padding-bottom: 0px; }

h1{ font-size:35px; text-shadow:0 0 15px var(--neon-green); margin-bottom: 5px; color: var(--neon-green) !important; }
.sub-title { font-size: 14px; letter-spacing: 2px; margin-bottom: 20px; color: var(--neon-green); }

textarea{ 
    width:85%; height:130px; background:rgba(0,0,0,0.7); 
    border:2px solid var(--neon-green) !important; 
    border-radius:15px; padding:20px; color:var(--neon-green) !important; 
    box-shadow:0 0 10px var(--neon-green) !important; 
    font-size: 18px; outline: none; 
}

.card{ width:80%; margin:25px auto; padding:25px; border-radius:20px; background:rgba(0,0,0,0.8); box-shadow:0 0 20px var(--neon-green); text-align: left; }
.bar-container { width: 100%; height: 10px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; }
.bar{ height:100%; background:var(--neon-green); width:0%; transition:0.8s; }

.recommendation-box { 
    width: 80%; margin: 20px auto; padding: 15px; 
    border: 1px solid var(--danger-red); border-radius: 10px; 
    background: rgba(255, 0, 51, 0.1); color: white; 
    display: none; text-align: center;
}

button{ padding:8px 20px; border:1px solid var(--neon-green); background:transparent; color:var(--neon-green); cursor:pointer; border-radius:10px; font-family: 'Orbitron'; }

.danger-bar { background: var(--danger-red) !important; }
.danger-text { color: var(--danger-red) !important; }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>🦅 BlackFalcon SOC</h1>
    <div class="sub-title">Advanced Security Operations Platform</div>

    <div style="margin-bottom: 15px;">
        <button id="langBtn" onclick="toggleLang()">EN / AR</button>
    </div>

    <textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

    <div class="card">
        <div id="statusLabel" style="font-size: 22px; font-weight: bold; margin-bottom: 10px;">Threat Status: CLEAN</div>
        <div class="info-line"><span id="riskText">Risk Score:</span> <span id="score">0</span>%</div>
        <div class="bar-container"><div class="bar" id="bar"></div></div>
        <div class="info-line" id="mitreDiv" style="display:none; color: var(--neon-green);">MITRE: T1566 - Phishing</div>
        <div class="info-line" id="incidentDiv" style="display:none; color: var(--neon-green);">Incident ID: INC-943219</div>
    </div>

    <div id="recBox" class="recommendation-box">
        <span id="recContent"></span>
    </div>
</div>

<script>
let currentLang = "ar";
let matrixColor = "#00ffcc";
let analysisTimeout;
const msgInput = document.getElementById("msg");

function speak(text) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = (currentLang === "ar") ? "ar-SA" : "en-US";
    utterance.rate = 0.9;
    window.speechSynthesis.speak(utterance);
}

msgInput.addEventListener("focus", () => {
    speak(currentLang === "ar" ? "أنت الآن في مربع إدخال النص" : "You are now in the text input field");
});

msgInput.addEventListener("input", () => {
    clearTimeout(analysisTimeout);
    analysisTimeout = setTimeout(() => { startAnalysis(); }, 1500);
});

function startAnalysis() {
    let text = msgInput.value.toLowerCase();
    if(text.length < 2) return;

    let score = 0;

    // ✅ نفس كلماتك العربية كاملة بدون حذف + إضافة الإنجليزي
    const suspiciousKeywords = [
        "$$$","€€€","جنيه إسترليني","خصم 50%","بضعة شلنات","نقبل الدفع النقدي عبر البطاقات","نقبل بطاقات الائتمان",
        "بسعر معقول","عرض مناسب","تجنب الإفلاس","سوء الائتمان","بنك","الإفلاس","مساومة","الفواتير","عنوان الفواتير",
        "مليار","مليار دولار","ملياردير","البطاقة مقبولة","البطاقات المقبولة","نقدي","مكافأة نقدية","سحب نقدي",
        "كاش كاش كاش","كازينو","سنتات مقابل الدولار","يفحص","شيك أو حوالة بريدية","احصل على خصمك","يكلف","التكاليف",
        "ائتمان","مكاتب الائتمان","بطاقة إئتمان","عروض بطاقات الائتمان","ائتمان أو مدين","اتفاق","دَين","تخفيض","دولارات",
        "ضاعف","ضاعف ثروتك","يكسب","اربح دولارات","اربح نقوداً","اكسب دخلاً إضافياً","اربح من المنزل","اربح شهرياً",
        "اكسب شهريًا","اكسب أسبوعياً","دخل سنوي","دخل سهل","شروط ميسرة","حر","مجاناً","مقابل دولار واحد فقط","دخول مجاني",
        "استشارة مجانية","هدية مجانية","استضافة مجانية","معلومات مجانية","الاستثمار الحر","عضوية مجانية","أموال مجانية",
        "معاينة مجانية","عرض سعر مجاني","تجربة مجانية","استرداد كامل المبلغ","التخلص من الديون","يتبرع","وديعة مضمونة",
        "زيادة الإيرادات","زيادة المبيعات/حركة المرور","أرباح فورية","دخل فوري","تأمين","استثمار","نصائح استثمارية","القروض",
        "اكسب دولارات","ضمان استرداد الأموال","القرض العقاري","أسعار الرهن العقاري","يعرض","مجاني بالكامل","دولار واحد فقط",
        "سعر","ضمان السعر","الأرباح","يقتبس","إعادة التمويل","وفر المال","وفر الكثير من المال","رهناً بالموافقة الائتمانية",
        "دولار أمريكي","لماذا تدفع أكثر؟","دخلك","مضمون بنسبة 100%","ادخل الآن","بادر بالتحرك سريعاً","عرض مذهل","قدم الآن",
        "كما شاهدتم على","أفضل عرض","ربح كبير","لا تفوت","انقر أدناه","انقر هنا","الصفقة ستنتهي قريباً","لا تحذف",
        "ضاعف أموالك","عرض حصري","عرض رائع","عضوية مجانية","احصل عليه الآن","أخبار رائعة","نتائج مضمونة","معلومات هامة",
        "زيادة المبيعات","توفير فوري","لفترة محدودة","قراءة ضرورية","للعملاء الجدد فقط","بدون شروط","بدون تكلفة","لا حاجة لفحص الائتمان",
        "لا يوجد أي التزام","بدون أي التزامات","مرة واحدة في العمر","متوفر هنا فقط","اطلب الآن","الأرباح المحتملة","ربح صافٍ",
        "خالٍ من المخاطر","دعوة خاصة","عرض خاص","هذا لن يدوم","عاجل","لن أصدق","تحقق من حسابك البنكي","رقم 1","مجاني 100%",
        "خصم 100%","راضٍ بنسبة 100%","دخل إضافي","مندهش","مدهش","عرض مذهل","أشياء رائعة","اندهش","كن متفاجئاً","كن مدير نفسك",
        "أفضل صفقة","أفضل عرض","أفضل سعر","أفضل الأسعار","مبالغ طائلة","علاوة","لا أستطيع العيش بدونها","توحيد الديون","ضاعف دخلك",
        "تم تخفيضها بشكل كبير","اكسب أموالاً إضافية","اكسب المال","توقع أن تربح","إضافي","نقود إضافية","دخل إضافي","رائع",
        "سيولة نقدية سريعة","الحرية المالية","بريد ذو أولوية مجاني","احصل على أموالك","صفقة رائعة","انضم إلى الملايين","أقل سعر",
        "اكسب المال","مليون دولار","ضمان استرداد الأموال","جائزة","يعد","رضاكم مضمون","وفر حتى","عرض ترويجي خاص","الأفضل",
        "الآلاف","عرض لا يُضاهى","لا يصدق","غير محدود","رائع","لن تصدق عينيك","وصول","ادخل الآن","يمثل","بادر بالتحرك فوراً",
        "تم الآن","بادر بالتحرك الآن!","فعل","الإجراء المطلوب","قدّم طلبك هنا","قدم الآن","قدم طلبك الآن!","قدم طلبك عبر الإنترنت",
        "انضم إلى العضوية","قبل فوات الأوان","كونك عضواً","يشتري","اشتر مباشرة","اشتري الآن","اشتر اليوم","يتصل","مكالمة مجانية",
        "اتصل الآن مجاناً","اتصل بي","اتصل الآن","اتصل الآن!","هل يمكننا الحصول على دقيقة من وقتك؟","ألغِ الآن","يلزم الإلغاء",
        "اطلب الآن","انقر","انقر أدناه","انقر هنا","انقر هنا للتحميل","انقر الآن","انقر على هذا الرابط","انقر للحصول على",
        "انقر للإزالة","اتصل بنا فوراً","الصفقة ستنتهي قريباً","افعل ذلك الآن","افعل ذلك اليوم","لا تحذف","لا تتردد","لا تضيع الوقت",

        // 🔥 إنجليزي مضاف
        "free money","guaranteed profit","no risk","limited offer","act now","claim now",
        "verify your account","account suspended","unusual activity detected","confirm identity",
        "secure your account","update your details","reset now","login immediately",
        "urgent action required","final notice","last warning","security alert",
        "you have won","winner","congratulations","claim your prize","reward waiting",
        "instant payout","fast cash","quick money","earn instantly","double earnings",
        "investment opportunity","high return","risk free investment","crypto profit",
        "bitcoin giveaway","airdrop","exclusive deal","vip offer","special promotion",
        "buy now","order now","limited stock","only today","offer expires",
        "click below","visit link","open link","download file","install now",
        "attachment included","see attachment","open attachment","invoice attached",
        "payment required","pending payment","billing issue","update payment info",
        "confirm payment","transaction failed","account locked","access denied",
        "unauthorized login","security breach","data leak","compromised account",
        "recover account","verify now","identity check","send code","enter code"
    ];

    suspiciousKeywords.forEach(k => {
        if(text.includes(k.toLowerCase())) {
            score += 10;
        }
    });

    if(score > 100) score = 100;

    updateUI(score, text);
}

function updateUI(score, text) {
    const bar = document.getElementById("bar");
    const scoreVal = document.getElementById("score");
    const statusLabel = document.getElementById("statusLabel");
    const recBox = document.getElementById("recBox");
    const recContent = document.getElementById("recContent");

    scoreVal.innerText = score;
    bar.style.width = score + "%";

    if(score > 30) {

        // ✅ MITRE متعدد
        let mitreTechniques = [];

        if(text.includes("link") || text.includes("click") || text.includes("http")){
            mitreTechniques.push("T1566 - Phishing");
        }

        if(text.includes("password") || text.includes("login") || text.includes("verify")){
            mitreTechniques.push("T1556 - Credential Harvesting");
        }

        if(text.includes("bank") || text.includes("account") || text.includes("credit")){
            mitreTechniques.push("T1650 - Financial Theft");
        }

        if(text.includes("attachment") || text.includes("download")){
            mitreTechniques.push("T1204 - User Execution");
        }

        if(text.includes("otp") || text.includes("code")){
            mitreTechniques.push("T1110 - OTP Abuse");
        }

        if(mitreTechniques.length === 0){
            mitreTechniques.push("T1566 - Phishing");
        }

        document.getElementById("mitreDiv").innerText = "MITRE: " + mitreTechniques.join(" | ");
        document.getElementById("mitreDiv").style.display = "block";

        matrixColor = "#ff0033";
        bar.classList.add("danger-bar");
        statusLabel.innerText = (currentLang==="ar")?"حالة التهديد: خطر عالي جداً":"Threat Status: HIGH RISK";
        statusLabel.classList.add("danger-text");

        let recText = (currentLang==="ar")?"تحذير: الرسالة تحتوي على مؤشرات احتيال قوية. لا تضغط أي رابط":"Warning: The message contains strong fraud indicators. Do NOT click links";
        recContent.innerText = recText;

        document.getElementById("incidentDiv").style.display = "block";
        recBox.style.display = "block";

        speak(recText);
    } else {
        matrixColor = "#00ffcc";
        bar.classList.remove("danger-bar");
        statusLabel.classList.remove("danger-text");
        statusLabel.innerText = (currentLang==="ar")?"حالة التهديد: آمن":"Threat Status: CLEAN";
        document.getElementById("mitreDiv").style.display = "none";
        document.getElementById("incidentDiv").style.display = "none";
        recBox.style.display = "none";

        if(msgInput.value.length > 5){
            speak((currentLang==="ar")?"الحالة آمنة":"Status is safe");
        }
    }
}

function toggleLang() {
    currentLang = (currentLang === "ar") ? "en" : "ar";
    msgInput.placeholder = (currentLang === "ar") ? "الصق الرسالة هنا..." : "Paste message here...";
    startAnalysis(); 
    speak(currentLang==="ar"?"اللغة العربية":"English language");
}

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const drops = Array(Math.floor(canvas.width/14)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = matrixColor;
    ctx.font = "14px monospace";
    drops.forEach((y, i) => {
        const text = Math.floor(Math.random()*2);
        ctx.fillText(text, i * 14, y * 14);
        if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(draw, 33);
</script>

</body>
</html>
