<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.5s;
}

body.dangerMode{
background:#140000;
box-shadow:inset 0 0 300px red;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.langWrapper{
text-align:center;
margin-top:20px;
}

.langBtn{
padding:8px 20px;
border-radius:20px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
}

.container{
text-align:center;
margin-top:40px;
}

h1{
font-size:40px;
text-shadow:0 0 25px #00f5d4;
}

.subtitle{
margin-bottom:30px;
color:#00f5d4aa;
}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
outline:none;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 30px #00f5d422;
text-align:left;
}

.progress{
height:10px;
background:#111;
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#ff0033;
transition:0.4s;
}

.recommendation{
width:80%;
margin:20px auto;
padding:20px;
border-radius:20px;
font-weight:bold;
}

.recSafe{
background:rgba(0,255,136,0.1);
border:2px solid #00ff88;
color:#00ff88;
}

.recDanger{
background:rgba(255,0,0,0.1);
border:2px solid red;
color:red;
}

.safe{color:#00ff88;}
.danger{color:red;}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="speakable">🦅 BlackFalcon SOC</h1>

<div class="subtitle speakable" id="subtitle">
منصة تحليل الرسائل المشبوهة
</div>

<div class="langWrapper">
<button class="langBtn" onclick="toggleLang()">EN</button>
</div>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">

<h2 class="speakable">حالة التهديد</h2>

<div id="status" class="speakable">—</div>

<div class="speakable">
نسبة الخطورة:
<span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div>MITRE: T1566 – Phishing</div>

</div>

<div id="rec" class="recommendation recSafe speakable">
بانتظار التحليل
</div>

</div>

<script>

/* قائمة الكلمات المشبوهة */

const suspiciousWords=[

"verify","verification","verify account","account verification",
"confirm account","confirm identity","identity verification",
"update account","update information","security alert",
"suspicious activity","account locked","account suspended",
"bank account","bank verification","bank alert",
"credit card","card details","card verification",
"billing information","payment alert","payment failed",
"bank transfer","wire transfer","confirm payment",
"refund request","refund notice","crypto investment",
"earn money fast","investment opportunity",
"paypal security","amazon security","apple id security",
"dhl shipment","fedex shipment","delivery notice",
"track your package","click here","tap here",
"secure link","access link","verify via link",
"otp","verification code","share code",
"urgent action required","final warning",
"lottery winner","you won","claim prize",
"gift card","special offer","bonus reward",

/* عربي */

"تحقق","تحقق من حسابك","تحقق من حسابك البنكي",
"التحقق من الحساب","التحقق من الهوية",
"تأكيد الحساب","تأكيد الهوية",
"تحديث الحساب","تحديث بياناتك","تحديث معلوماتك",
"تم تعليق الحساب","تم إيقاف الحساب",
"إعادة تفعيل الحساب","نشاط مشبوه",
"محاولة دخول مشبوهة","تنبيه أمني",
"تحذير أمني","رسالة أمنية",
"تحويل بنكي","تحويل الأموال","تحويل فوري",
"بطاقة بنكية","بطاقة ائتمان",
"رقم البطاقة","رمز التحقق",
"كود التفعيل","أدخل الرمز",
"أرسل الرمز","رمز sms",
"اضغط هنا","افتح الرابط",
"رابط التحقق","اتبع الرابط",
"تسجيل الدخول","الدخول الآن",
"تأكيد الدفع","فشل الدفع",
"استرداد المبلغ","طلب استرجاع",
"ربحت جائزة","مبروك",
"هدية مجانية","مكافأة مالية",
"عرض خاص","عرض محدود",
"فرصة استثمار","استثمار مربح",
"أرباح مضمونة","ضاعف أموالك",
"رسوم الشحن","تأكيد الشحنة",
"تتبع الشحنة","إجراء عاجل",
"تحرك الآن","آخر تحذير"

];

/* كشف الروابط */

function detectLinks(text){

let regex=/https?:\/\/[^\s]+/g;

let links=text.match(regex);

if(!links) return 0;

return links.length*15;

}

/* تأخير التحليل */

const msg=document.getElementById("msg");

let timer;

msg.addEventListener("input",()=>{

clearTimeout(timer);

timer=setTimeout(analyze,1500);

});

/* التحليل */

function analyze(){

let text=msg.value.toLowerCase();

let score=0;

suspiciousWords.forEach(word=>{
if(text.includes(word)){
score+=5;
}
});

score+=detectLinks(text);

if(score>100) score=100;

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>=40){

status.innerHTML="⚠️ رسالة مشبوهة";
status.className="danger speakable";

rec.className="recommendation recDanger speakable";
rec.innerHTML="لا تضغط الروابط ولا ترسل بياناتك.";

document.body.classList.add("dangerMode");

speak("تحذير الرسالة مشبوهة");

}else{

status.innerHTML="✔️ الرسالة آمنة";
status.className="safe speakable";

rec.className="recommendation recSafe speakable";
rec.innerHTML="لا يوجد تهديد واضح.";

document.body.classList.remove("dangerMode");

speak("الرسالة آمنة");

}

}

/* الصوت */

let currentLang="ar";

function speak(text){

speechSynthesis.cancel();

let msg=new SpeechSynthesisUtterance(text);

msg.lang=currentLang==="ar"?"ar-SA":"en-US";

speechSynthesis.speak(msg);

}

msg.addEventListener("mouseover",()=>{

if(currentLang==="ar"){
speak("مربع إدخال الرسالة");
}else{
speak("Message input field");
}

});

/* اللغة */

function toggleLang(){

const btn=document.querySelector(".langBtn");

if(currentLang==="ar"){

currentLang="en";
btn.innerText="AR";

document.getElementById("subtitle").innerText="Suspicious Message Analysis Platform";

msg.placeholder="Paste message here";

}else{

currentLang="ar";
btn.innerText="EN";

document.getElementById("subtitle").innerText="منصة تحليل الرسائل المشبوهة";

msg.placeholder="الصق الرسالة هنا";

}

}

/* Matrix */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCONSOC";
const matrix=letters.split("");

const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++){
drops[x]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
