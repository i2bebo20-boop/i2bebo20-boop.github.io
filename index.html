‏<!DOCTYPE html>
‏<html lang="ar">
‏<head>
‏<meta charset="UTF-8">
‏<title>BlackFalcon SOC</title>

‏<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

‏<style>
‏body{
‏margin:0;
‏background:black;
‏color:#00f5d4;
‏font-family:'Orbitron',sans-serif;
‏overflow:hidden;
‏transition:0.6s;
}

‏body.dangerMode{
‏background:#140000;
‏box-shadow:inset 0 0 300px #ff0033;
}

‏canvas{position:fixed;top:0;left:0;z-index:-1;}

‏.container{text-align:center;margin-top:70px;}

‏textarea{
‏width:80%;
‏height:130px;
‏background:rgba(0,0,0,0.6);
‏border:1px solid #00f5d4;
‏border-radius:20px;
‏padding:20px;
‏color:#00f5d4;
‏font-size:16px;
‏outline:none;
}

‏.card{
‏width:80%;
‏margin:30px auto;
‏padding:25px;
‏border-radius:25px;
‏background:rgba(0,0,0,0.6);
‏box-shadow:0 0 30px #00f5d422;
‏text-align:left;
}

‏.progress{
‏height:10px;
‏background:#111;
‏border-radius:20px;
‏overflow:hidden;
}

‏.bar{
‏height:100%;
‏width:0%;
‏background:#ff0033;
‏transition:0.4s;
}

‏.safe{color:#00ff88;}
‏.danger{color:#ff0033;}
‏</style>
‏</head>

‏<body>

‏<canvas id="matrix"></canvas>

‏<div class="container">

‏<h1 class="speakable">🦅 BlackFalcon SOC</h1>
‏<div class="speakable">منصة تحليل الرسائل المشبوهة</div>

‏<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

‏<div class="card">

‏<h2 class="speakable">حالة التهديد</h2>
‏<div id="status" class="speakable">—</div>

‏<div class="speakable">
نسبة الخطورة: <span id="score">0</span>%
‏</div>

‏<div class="progress">
‏<div class="bar" id="bar"></div>
‏</div>

‏<div id="mitre" class="speakable">MITRE: —</div>

‏</div>

‏<div id="rec" class="speakable safe">
✔️ بانتظار التحليل
‏</div>

‏</div>

‏<script>

/* ===== الصوت ===== */
‏function speak(text){
‏if(!text) return;
‏speechSynthesis.cancel();
‏let msg=new SpeechSynthesisUtterance(text);
‏msg.lang="ar-SA";
‏speechSynthesis.speak(msg);
}

/* قراءة عند المرور */
‏document.addEventListener("mouseover",e=>{
‏if(e.target.classList.contains("speakable")){
‏speak(e.target.innerText);
}
});

/* صوت مربع النص */
‏const msg=document.getElementById("msg");

‏msg.addEventListener("focus",()=>{
‏speak("مكان إدخال الرسالة");
});

/* ===== كلمات مشبوهة (كبيرة جداً) ===== */
‏const suspiciousWords=[

"تحقق من حسابك البنكي","تحقق من حسابك","تحديث الحساب","كلمة المرور",
‏"otp","رمز التحقق","بطاقة ائتمان","رقم البطاقة","cvv","iban","swift",

"اضغط هنا","انقر هنا","عرض محدود","عرض خاص","فرصة لا تعوض",
"ربح سريع","اربح الآن","مجاناً","هدية مجانية","جائزة","فزت",

"تحويل بنكي","حوالة عاجلة","استثمار","مضاعفة أموالك",
"بيتكوين","crypto","bitcoin","double your money",

‏"http://","https://","bit.ly","tinyurl",".ru",".cn",".tk",

‏"verify your account","account suspended","reset password",
‏"update payment","bank transfer","credit card","claim prize",
‏"urgent action","limited offer","click here now","act now",

/* إضافاتك */
"خصم 50%","بنك","الإفلاس","نقدي","مكافأة نقدية","كاش",
"قرض","استرداد","استثمار مضمون","أرباح فورية",
"عرض مذهل","لا تفوت","عاجل","اطلب الآن","سجل الآن",

‏"free money","guaranteed profit","risk free","fast cash",
‏"easy money","bonus","reward","lottery","winner"

];

/* ===== تحليل ===== */
‏let timer;

‏msg.addEventListener("input",()=>{
‏clearTimeout(timer);
‏timer=setTimeout(analyze,800);
});

‏function analyze(){

‏let text=msg.value.toLowerCase();
‏let score=0;

‏suspiciousWords.forEach(w=>{
‏if(text.includes(w)) score+=10;
});

‏if(text.includes("http")) score+=20;

‏if(score>100) score=100;

/* نوع الهجوم */
‏let type="—";

‏if(text.includes("verify") || text.includes("otp")){
‏type="Phishing";
}
‏else if(text.includes("bank") || text.includes("card")){
‏type="سرقة بيانات";
}
‏else if(text.includes("bitcoin") || text.includes("investment")){
‏type="احتيال مالي";
}
‏else if(text.includes("http")){
‏type="رابط ضار";
}

‏document.getElementById("score").innerText=score;
‏document.getElementById("bar").style.width=score+"%";
‏document.getElementById("mitre").innerText="MITRE: "+type;

‏let status=document.getElementById("status");
‏let rec=document.getElementById("rec");

‏if(score>30){

‏status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
‏rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";
‏rec.className="danger speakable";

‏document.body.classList.add("dangerMode");

/* صوت */
‏speak("تحذير الرسالة غير آمنة");

‏}else{

‏status.innerHTML="<span class='safe'>✔️ آمن</span>";
‏rec.innerHTML="✔️ لا يوجد تهديد واضح";
‏rec.className="safe speakable";

‏document.body.classList.remove("dangerMode");

‏speak("الرسالة آمنة");
}

}

‏/* ===== Matrix ===== */
‏const canvas=document.getElementById("matrix");
‏const ctx=canvas.getContext("2d");

‏canvas.height=window.innerHeight;
‏canvas.width=window.innerWidth;

‏const letters="01BLACKFALCON";
‏const fontSize=14;
‏const columns=canvas.width/fontSize;
‏const drops=[];

‏for(let i=0;i<columns;i++){drops[i]=1;}

‏function draw(){

‏ctx.fillStyle="rgba(0,0,0,0.05)";
‏ctx.fillRect(0,0,canvas.width,canvas.height);

‏ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

‏for(let i=0;i<drops.length;i++){
‏let text=letters[Math.floor(Math.random()*letters.length)];
‏ctx.fillText(text,i*fontSize,drops[i]*fontSize);
‏drops[i]++;
‏if(drops[i]*fontSize>canvas.height) drops[i]=0;
}

}

‏setInterval(draw,35);

‏</script>
‏</body>
‏</html>
