<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.5s;
}

.alert-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,0,0,0.3);
z-index:0;
display:none;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

.logo{font-size:60px;}
.title{font-size:22px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
margin-top:20px;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
}

.bar{
height:10px;
background:#ff0033;
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
margin-top:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<div id="alertBg" class="alert-bg"></div>
<canvas id="matrix"></canvas>

<div class="container">

<div class="logo">🦅</div>
<div class="title" id="title">BlackFalcon SOC</div>

<button class="btn" onclick="toggleLang()" id="langBtn">EN</button>

<textarea id="msg"></textarea>

<div class="card">
<div id="status">—</div>
<div id="riskText">Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec"></div>

</div>

<script>

let lang="ar";

/* ===== ترجمة كاملة ===== */
const t={
ar:{
placeholder:"الصق الرسالة هنا...",
safe:"✔️ آمن",
unsafe:"⚠️ تهديد",
recSafe:"لا يوجد تهديد، تابع بحذر",
recDanger:"لا تتفاعل مع الرسالة. أبلغ فريق الأمن السيبراني (SOC) أو CERT فوراً.",
risk:"نسبة الخطورة",
type:"نوع التهديد",
mitre:"مايتر أتاك"
},
en:{
placeholder:"Paste message here...",
safe:"✔️ SAFE",
unsafe:"⚠️ THREAT",
recSafe:"No threat detected, proceed with caution",
recDanger:"Do not interact. Report to SOC or CERT immediately.",
risk:"Risk",
type:"Type",
mitre:"MITRE ATT&CK"
}
};

/* ===== صوت قوي ===== */
function speak(text){
speechSynthesis.cancel();

let u=new SpeechSynthesisUtterance(text);
u.lang = (lang==="ar") ? "ar-SA" : "en-US";
u.rate=1;
u.pitch=1;

speechSynthesis.speak(u);
}

/* ===== تحديث اللغة ===== */
function updateLang(){
msg.placeholder=t[lang].placeholder;
document.getElementById("riskText").innerHTML=t[lang].risk+": <span id='score'>"+document.getElementById("score").innerText+"</span>%";
document.getElementById("langBtn").innerText = (lang==="ar") ? "EN" : "AR";
}

/* ===== تبديل ===== */
function toggleLang(){
lang = (lang==="ar") ? "en" : "ar";
updateLang();
analyze(); // إعادة تحليل عشان يترجم النتيجة
}

/* ===== كلمات ===== */
const words=["verify","otp","bank","password","http","bitcoin","تحقق","كلمة المرور","البنك"];

/* ===== تحليل ===== */
let timer;
const msg=document.getElementById("msg");

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1000);
});

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

words.forEach(w=>{
if(text.includes(w)) score+=15;
});

if(text.includes("http")) score+=30;
if(score>100) score=100;

/* MITRE */
let type="Safe", mitre="None";

if(text.includes("verify")||text.includes("تحقق")){
type="Phishing";
mitre="T1566";
}
else if(text.includes("password")||text.includes("otp")){
type="Credential Theft";
mitre="T1003";
}
else if(text.includes("http")){
type="Malicious Link";
mitre="T1071";
}

/* عرض */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText=t[lang].type+": "+type;
document.getElementById("mitre").innerText=t[lang].mitre+": "+mitre;

let status=document.getElementById("status");
let rec=document.getElementById("rec");
let alertBg=document.getElementById("alertBg");

/* خطر */
if(score>30){

alertBg.style.display="block";

status.innerHTML="<span class='danger'>"+t[lang].unsafe+"</span>";
rec.innerHTML="🚨 "+t[lang].recDanger;

speak(t[lang].unsafe + ". " + t[lang].recDanger);

}

/* آمن */
else{

alertBg.style.display="none";

status.innerHTML="<span class='safe'>"+t[lang].safe+"</span>";
rec.innerHTML="✔️ "+t[lang].recSafe;

speak(t[lang].safe + ". " + t[lang].recSafe);

}

}

/* أول تشغيل */
updateLang();

/* ===== MATRIX ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>

</body>
</html>
