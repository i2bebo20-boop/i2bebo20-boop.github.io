<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{ --neon-green:#00ffcc; --danger-red:#ff0033; }
body{ margin:0; background:black; color:var(--neon-green); font-family:'Orbitron',sans-serif; overflow-x:hidden; transition:0.4s; }
canvas{ position:fixed; top:0; left:0; z-index:-1; }
.container{ text-align:center; margin-top:40px; padding-bottom:50px; }
h1{ font-size:35px; text-shadow:0 0 15px var(--neon-green); margin-bottom:5px; color:var(--neon-green)!important; }
.sub-title{ font-size:14px; letter-spacing:2px; margin-bottom:20px; color:var(--neon-green); }
textarea{
    width:85%; height:130px; background:rgba(0,0,0,0.7);
    border:2px solid var(--neon-green)!important;
    border-radius:15px; padding:20px; color:var(--neon-green)!important;
    box-shadow:0 0 10px var(--neon-green)!important;
    font-size:18px; outline:none;
}
.card{ width:80%; margin:25px auto; padding:25px; border-radius:20px; background:rgba(0,0,0,0.8); box-shadow:0 0 20px var(--neon-green); text-align:left; }
.bar-container{ width:100%; height:10px; background:#222; border-radius:10px; margin:15px 0; overflow:hidden; }
.bar{ height:100%; background:var(--neon-green); width:0%; transition:0.8s; }
.recommendation-box{
    width:80%; margin:20px auto; padding:15px;
    border:1px solid var(--danger-red); border-radius:10px;
    background:rgba(255,0,51,0.1); color:white;
    display:none; text-align:center;
}
button{ padding:8px 20px; border:1px solid var(--neon-green);
    background:transparent; color:var(--neon-green);
    cursor:pointer; border-radius:10px; font-family:'Orbitron';
}
.danger-bar{ background:var(--danger-red)!important; }
.danger-text{ color:var(--danger-red)!important; }
</style>
</head>

<canvas id="matrix"></canvas>

    <h1>🦅 BlackFalcon SOC</h1>
    <div class="sub-title">Advanced Security Operations Platform</div>

    <div style="margin-bottom:15px;">

    <div class="card">

        <div>Risk Score: <span id="score">0</span>%</div>
        <div class="bar-container"><div class="bar" id="bar"></div></div>
    </div>

    <div id="recBox" class="recommendation-box">

</div>

    u.rate = 0.9;
    window.speechSynthesis.speak(u);
}

msgInput.addEventListener("input", ()=>{

    analysisTimeout = setTimeout(()=>{ startAnalysis(); }, 1200);
});

"paypal","apple id","bank account","verify now","urgent","login","otp","crypto","bitcoin","wallet"

];

/* 🔥 تحليل */
function startAnalysis(){

    let text = msgInput.value.toLowerCase();
    let score = 0;
    let hits = 0;

    words.forEach(w=>{
        if(text.includes(w.toLowerCase())){
            score += 6;
            hits++;
        }
    });

    if(hits > 5) score += 20;
    if(hits > 10) score += 30;
    if(hits > 20) score += 50;

    if(text.includes("http") && hits > 3){
        score += 25;
    }

    if(score > 100) score = 100;

    updateUI(score);
}

/* 🎯 UI */
function updateUI(score){

    const bar = document.getElementById("bar");
    const statusLabel = document.getElementById("statusLabel");

    document.getElementById("score").innerText = score;
    bar.style.width = score + "%";

    if(score > 25){
        matrixColor = "#ff0033";
        bar.classList.add("danger-bar");
        statusLabel.classList.add("danger-text");
        statusLabel.innerText = "🚨 خطر عالي جداً";
        speak("تحذير خطر عالي جداً");
    } else {
        matrixColor = "#00ffcc";
        bar.classList.remove("danger-bar");
        statusLabel.classList.remove("danger-text");
        statusLabel.innerText = "آمن";
    }
}

/* 🌐 لغة */
function toggleLang(){
    currentLang = currentLang==="ar" ? "en" : "ar";
    speak("تم تغيير اللغة");
}

/* Matrix */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const drops = Array(Math.floor(canvas.width/14)).fill(1);

function draw(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = matrixColor;
    ctx.font = "14px monospace";
    drops.forEach((y,i)=>{
        const text = Math.floor(Math.random()*2);
        ctx.fillText(text,i*14,y*14);
        if(y*14 > canvas.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    });
}
setInterval(draw,33);

</script>

</body>
