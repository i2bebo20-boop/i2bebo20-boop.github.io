<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.5s;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

.logo{font-size:60px;}
.title{font-size:22px;margin-bottom:10px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 25px #00f5d433;
}

.bar{
height:10px;
background:#ff0033;
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
margin:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="logo">🦅</div>
<div class="title">BlackFalcon SOC</div>

<!-- زر اللغة تحت الاسم -->
<button class="btn" onclick="toggleLang()">EN / AR</button>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

let currentLang="ar";

/* ===== صوت ===== */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

/* ===== إدخال ===== */
const msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
speak(currentLang==="ar"?"مكان إدخال الرسالة":"Enter message field");
});

/* ===== كلمات قوية / متوسطة ===== */
const highRisk=[
"password","otp","verify","bank","bitcoin","crypto",
"كلمة المرور","رمز","تحقق","البنك"
];

const mediumRisk=[
"http","https","bit.ly","tinyurl","click","urgent",
"login","account","free","winner","جائزة","اضغط"
];

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();

let score=0;

/* حساب متقدم */
highRisk.forEach(w=>{
if(text.includes(w)) score+=25;
});

mediumRisk.forEach(w=>{
if(text.includes(w)) score+=15;
});

/* روابط */
if(text.includes("http")||text.includes("bit.ly")||text.includes("tinyurl")){
score+=35;
}

/* تكرار */
let repeat=(text.match(/http|verify|otp|bank/g)||[]).length;
score += repeat * 10;

if(score>100) score=100;

/* ===== MITRE ATT&CK ===== */
let type="Safe";
let mitre="None";

if(text.includes("verify")||text.includes("تحقق")){
type="Phishing";
mitre="TA0001 - Initial Access | T1566 Phishing";
}
else if(text.includes("password")||text.includes("otp")){
type="Credential Theft";
mitre="TA0006 - Credential Access | T1003";
}
else if(text.includes("bitcoin")||text.includes("crypto")){
type="Financial Scam";
mitre="TA0040 - Impact";
}
else if(text.includes("http")){
type="Malicious Link";
mitre="TA0011 - Command & Control | T1071";
}

/* عرض */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+type+" | "+mitre;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

/* ===== خطر ===== */
if(score>30){

document.body.style.background="#200000";

/* توصيات احترافية */
if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ تهديد عالي</span>";
rec.innerHTML="🚨 يوصى بعدم التفاعل مع الرسالة. قم بإبلاغ فريق الأمن السيبراني (SOC) فوراً، وتواصل مع الجهات المختصة مثل CERT. لا تشارك أي بيانات حساسة.";
speak("تحذير تهديد عالي. يوصى بإبلاغ فريق الأمن السيبراني وعدم مشاركة البيانات");
}else{
status.innerHTML="<span class='danger'>⚠️ HIGH RISK</span>";
rec.innerHTML="🚨 Do not interact. Report to SOC team immediately and contact CERT. Do not share sensitive data.";
speak("High risk detected. Report to security operations center immediately");
}

}

/* ===== آمن ===== */
else{

document.body.style.background="black";

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد. يمكنك المتابعة مع الحذر العام.";
speak("لا يوجد تهديد");
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat detected. Proceed with general caution.";
speak("No threat detected");
}

}

}

/* ===== لغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";
msg.placeholder=currentLang==="ar"?"الصق الرسالة هنا":"Paste message here";
}

/* ===== MATRIX ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>

</body>
</html>
