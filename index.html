<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

.logo{font-size:60px;}
.title{font-size:22px;margin-bottom:15px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 25px #00f5d433;
}

.bar{height:10px;background:#ff0033;width:0%;transition:0.4s;}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
margin:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="logo">🦅</div>
<div class="title">BlackFalcon SOC</div>

<button class="btn" onclick="generatePDF()">ADVANCED REPORT</button>

<textarea id="msg" placeholder="Paste suspicious message..."></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk Score: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec">✔️ Waiting analysis</div>

</div>

<script>

/* ===== صوت احترافي ===== */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang="en-US";
speechSynthesis.speak(u);
}

const msg=document.getElementById("msg");

/* ===== تحليل متقدم ===== */
const patterns = [
{type:"Phishing", mitre:"T1566", keywords:["verify","otp","account","login","reset password"]},
{type:"Data Theft", mitre:"T1041", keywords:["bank","card","cvv","iban"]},
{type:"Financial Scam", mitre:"T1587", keywords:["bitcoin","investment","profit","money"]},
{type:"Malicious Link", mitre:"T1204", keywords:["http","bit.ly","tinyurl"]}
];

let lastResult="", lastType="", lastMitre="", lastRec="", lastMsg="";

let timer;
msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;
let detectedType="Safe";
let mitre="None";

/* تحليل ذكي */
patterns.forEach(p=>{
p.keywords.forEach(k=>{
if(text.includes(k)){
score+=15;
detectedType=p.type;
mitre=p.mitre;
}
});
});

if(text.includes("verify your bank account")) score+=40;
if(text.includes("http")) score+=20;

if(score>100) score=100;

/* توصية */
let recommendation="No threat detected";

if(score>30){
recommendation="Do NOT click links or share sensitive data. Verify sender.";
}

/* UI */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+detectedType;
document.getElementById("mitre").innerText="MITRE: "+mitre;

if(score>30){
document.getElementById("status").innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
}else{
document.getElementById("status").innerHTML="<span class='safe'>✔️ SAFE</span>";
}

document.getElementById("rec").innerText=recommendation;

/* حفظ */
lastResult=score>30?"UNSAFE":"SAFE";
lastType=detectedType;
lastMitre=mitre;
lastRec=recommendation;

/* 🔊 صوت ذكي */
speak("Analysis complete. Result " + lastResult + ". " + recommendation);

}

/* ===== تقرير احترافي 🔥 ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

/* خلفية */
doc.setFillColor(0,0,0);
doc.rect(0,0,210,297,"F");

/* لون */
doc.setTextColor(0,255,200);

/* لوقو */
doc.setFontSize(50);
doc.text("🦅",105,35,null,null,"center");

/* عنوان */
doc.setFontSize(20);
doc.text("BlackFalcon SOC",105,55,null,null,"center");

doc.setFontSize(12);
doc.text("Advanced Threat Intelligence Report",105,65,null,null,"center");

/* خط */
doc.line(20,75,190,75);

/* Box */
doc.rect(15,85,180,170);

/* محتوى */
doc.setFontSize(11);

doc.text("Analyzed Message:",20,100);
doc.text(doc.splitTextToSize(lastMsg||"Empty",170),20,110);

doc.text("Result: "+lastResult,20,140);
doc.text("Threat Type: "+lastType,20,150);
doc.text("MITRE Technique: "+lastMitre,20,160);
doc.text("Risk Score: "+document.getElementById("score").innerText+"%",20,170);

doc.text("Recommendation:",20,190);
doc.text(doc.splitTextToSize(lastRec,170),20,200);

/* Footer */
doc.text("Generated by BlackFalcon SOC Engine",105,270,null,null,"center");

doc.save("BlackFalcon_Advanced_Report.pdf");

speak("Advanced report generated");

}

/* ===== MATRIX ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>

</body>
</html>
