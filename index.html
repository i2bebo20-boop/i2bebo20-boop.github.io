<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Falcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#00ff9c;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
margin-top:60px;
}

h1{
font-size:40px;
text-shadow:0 0 20px #00ff9c;
}

.controls{
margin:20px;
}

button{
padding:10px 25px;
border-radius:20px;
border:1px solid #00ff9c;
background:transparent;
color:#00ff9c;
cursor:pointer;
margin:5px;
}

textarea{
width:80%;
height:140px;
background:black;
border:1px solid #00ff9c;
border-radius:20px;
padding:20px;
color:#00ff9c;
font-size:16px;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,.7);
text-align:left;
}

.progress{
height:10px;
background:#111;
border-radius:20px;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:red;
}

.rec{
width:80%;
margin:auto;
padding:20px;
border-radius:20px;
}

.safe{
border:2px solid #00ff9c;
color:#00ff9c;
}

.danger{
border:2px solid red;
color:red;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="speak">🦅 Falcon SOC</h1>

<div class="controls">

<button id="langBtn" class="speak">Language</button>
<button id="reportBtn" class="speak">Report</button>

</div>

<textarea id="msg" placeholder="Paste message here"></textarea>

<div class="card">

<h2 class="speak">Threat Status</h2>

<div id="status" class="speak">-</div>

<div class="speak">
Risk Level :
<span id="score">0</span>%
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div style="margin-top:15px">

<strong class="speak">MITRE ATT&CK :</strong>

<span id="type" class="speak">-</span>

</div>

</div>

<div id="rec" class="rec safe speak">
Waiting for analysis
</div>

</div>

<script>

let lang="en"
let audioEnabled=false
let dangerMode=false

document.body.addEventListener("click",()=>{
audioEnabled=true
})

function speak(text){

if(!audioEnabled)return

speechSynthesis.cancel()

let u=new SpeechSynthesisUtterance(text)

u.lang="en-US"

speechSynthesis.speak(u)

}

/* قراءة العناصر بالماوس */

document.addEventListener("mouseover",e=>{

if(e.target.classList.contains("speak")){

let t=e.target.innerText

if(t && t.length<120)speak(t)

}

})

/* مربع النص للمكفوفين */

const msg=document.getElementById("msg")

msg.addEventListener("mouseenter",()=>{

speak("You are at the message input field")

})

/* القائمة الكبيرة للكلمات المشبوهة */

const suspiciousWords=[

"verify","verification","account","bank","password","confirm",
"login","click","transfer","crypto","bitcoin","wallet",
"gift","winner","prize","urgent","security","alert",
"suspended","limited","reset","update","billing",
"payment","invoice","transaction","claim","reward",
"lottery","jackpot","bonus","promotion","congratulations",

"تحقق","تأكيد","حساب","بنكي","كلمة المرور",
"الدخول","اضغط","تحويل","جائزة","مبروك",
"فزت","رابط","تحديث","أمني","تنبيه",
"إعادة تعيين","فاتورة","دفع","معاملة",
"هدية","مكافأة","عرض","تسجيل الدخول",
"حسابك معلق","تأكيد الهوية"

]

function detectLinks(text){

let r=/https?:\/\/[^\s]+/g

let links=text.match(r)

if(!links)return 0

return links.length*30

}

function attackType(text){

if(text.includes("password")||text.includes("login")){

return "Credential Harvesting – MITRE T1056"

}

if(text.includes("http")){

return "Malicious Link – MITRE T1204"

}

return "Phishing – MITRE T1566"

}

/* التحليل */

let timer

msg.addEventListener("input",()=>{

clearTimeout(timer)

timer=setTimeout(analyze,3000)

})

function analyze(){

let text=msg.value.toLowerCase()

let score=0

suspiciousWords.forEach(w=>{
if(text.includes(w))score+=10
})

score+=detectLinks(text)

if(score>100)score=100

scoreEl.innerText=score

bar.style.width=score+"%"

let type=attackType(text)

typeEl.innerText=type

if(score>=30){

dangerMode=true

status.innerText="⚠ Suspicious message"

rec.className="rec danger"

rec.innerText="Do not click links or share sensitive data"

speak("Suspicious message. Attack type "+type)

}else{

dangerMode=false

status.innerText="✔ Message safe"

rec.className="rec safe"

rec.innerText="No threat detected"

speak("Message safe")

}

}

/* التقرير */

reportBtn.onclick=function(){

let report=

`FALCON SOC REPORT

Threat Status: ${status.innerText}

Risk Level: ${scoreEl.innerText}%

Attack Type: ${typeEl.innerText}

Recommendation:
${rec.innerText}

Analyzed Message:
${msg.value}

Generated by Falcon SOC`

let w=window.open()

w.document.write("<pre>"+report+"</pre>")

}

const scoreEl=document.getElementById("score")
const bar=document.getElementById("bar")
const status=document.getElementById("status")
const typeEl=document.getElementById("type")
const rec=document.getElementById("rec")
const reportBtn=document.getElementById("reportBtn")

/* خلفية Matrix */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01FALCONSOC"
const matrix=letters.split("")

const fontSize=16
const columns=canvas.width/fontSize

const drops=[]

for(let x=0;x<columns;x++)drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle=dangerMode?"red":"#00ff9c"

ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=matrix[Math.floor(Math.random()*matrix.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){

drops[i]=0

}

drops[i]++

}

}

setInterval(draw,35)

</script>

</body>
</html>
