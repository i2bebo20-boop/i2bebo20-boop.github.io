<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.6s;
}

body.dangerMode{
background:#140000;
box-shadow:inset 0 0 300px #ff0033;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
outline:none;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 30px #00f5d422;
text-align:left;
}

.progress{
height:10px;
background:#111;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#ff0033;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
margin:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}

.reportBox{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
border:2px solid #00f5d4;
padding:25px;
border-radius:20px;
width:350px;
box-shadow:0 0 30px #00f5d4;
z-index:999;
display:none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<button class="btn" onclick="toggleLang()">EN / AR</button>
<button class="btn" onclick="showReport()">REPORT</button>

<h1 class="speakable">🦅 BlackFalcon SOC</h1>
<div class="speakable" id="subtitle">منصة تحليل الرسائل المشبوهة</div>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">

<h2 class="speakable" id="threatTitle">حالة التهديد</h2>
<div id="status" class="speakable">—</div>

<div class="speakable">
<span id="riskLabel">نسبة الخطورة:</span> <span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="mitre" class="speakable">MITRE: —</div>

</div>

<div id="rec" class="speakable safe">
✔️ بانتظار التحليل
</div>

</div>

<!-- تقرير -->
<div class="reportBox" id="reportBox"></div>

<script>

let currentLang="ar";
let timer;

/* ===== الصوت ===== */
function speak(text){
if(!text) return;
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(msg);
}

/* ===== كلمات ضخمة ===== */
const suspiciousWords=[
"تحقق من حسابك البنكي","تحقق من حسابك","otp","verify","bank","password",
"credit card","bitcoin","http","urgent","click here","free money",
"مجاناً","جائزة","اضغط هنا","تحويل بنكي","استثمار","ربح سريع",
"عرض محدود","عرض خاص","فرصة","كسب المال","راتب عالي","استرجاع حساب",
"account suspended","reset password","update payment","claim prize",
"limited offer","act now","bonus","reward","lottery","winner",

/* كلماتك الكثيرة */
"خصم 50%","بنك","الإفلاس","نقدي","مكافأة نقدية","كاش",
"قرض","استثمار مضمون","أرباح فورية","عرض مذهل","لا تفوت","عاجل",
"اطلب الآن","سجل الآن","free money","guaranteed profit",
"fast cash","easy money","double your money","earn money fast",
"investment opportunity","risk free","exclusive offer"
];

/* ===== تحليل ===== */

const msg=document.getElementById("msg");

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200); /* تأخير */
});

let lastResult="",lastType="",lastRec="";

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

/* 💥 رفع خطورة العبارة */
if(text.includes("تحقق من حسابك البنكي")){
score=100;
}

/* كلمات */
suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=15;
});

if(text.includes("http")) score+=25;

if(score>100) score=100;

/* نوع الهجوم */
let type="—";

if(text.includes("تحقق")||text.includes("verify")||text.includes("otp")){
type=currentLang==="ar"?"تصيد احتيالي":"Phishing";
}
else if(text.includes("bank")||text.includes("card")){
type=currentLang==="ar"?"سرقة بيانات":"Data Theft";
}
else if(text.includes("bitcoin")||text.includes("investment")){
type=currentLang==="ar"?"احتيال مالي":"Financial Scam";
}
else if(text.includes("http")){
type=currentLang==="ar"?"رابط ضار":"Malicious Link";
}

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("mitre").innerText="MITRE: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>25){

document.body.classList.add("dangerMode");

if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";
speak("تحذير الرسالة غير آمنة. لا تضغط الروابط ولا تشارك بياناتك");
lastResult="غير آمن";
lastRec="لا تضغط الروابط ولا تشارك بياناتك";
}else{
status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
rec.innerHTML="⚠️ Do not click links or share data";
speak("Warning. Message is unsafe. Do not click links");
lastResult="UNSAFE";
lastRec="Do not click links or share data";
}

lastType=type;

}else{

document.body.classList.remove("dangerMode");

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد واضح";
speak("الرسالة آمنة");
lastResult="آمن";
lastRec="لا يوجد تهديد واضح";
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat detected";
speak("This message is safe");
lastResult="SAFE";
lastRec="No threat detected";
}

lastType=type;

}

}

/* ===== اللغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";
document.getElementById("subtitle").innerText=
currentLang==="ar"?"منصة تحليل الرسائل المشبوهة":"Suspicious Message Analyzer";
}

/* ===== تقرير احترافي ===== */
function showReport(){

let box=document.getElementById("reportBox");

box.style.display="block";

box.innerHTML=`
<h2>🦅 BlackFalcon SOC</h2>
<hr>
<p><b>${currentLang==="ar"?"النتيجة":"Result"}:</b> ${lastResult}</p>
<p><b>${currentLang==="ar"?"نوع الهجوم":"Threat Type"}:</b> ${lastType}</p>
<p><b>${currentLang==="ar"?"التوصية":"Recommendation"}:</b> ${lastRec}</p>
<br>
<button onclick="document.getElementById('reportBox').style.display='none'">Close</button>
`;

}

/* ===== Matrix ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}

}

setInterval(draw,35);

</script>
</body>
</html>
