<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<style>

body{
margin:0;
background:black;
color:#00ffe1;
font-family:Arial;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
padding-top:60px;
}

h1{
font-size:55px;
text-shadow:0 0 25px #00ffe1;
}

textarea{
width:80%;
height:150px;
background:rgba(0,0,0,.7);
border:1px solid #00ffe1;
border-radius:20px;
padding:20px;
color:white;
font-size:16px;
margin-top:30px;
}

.card{
width:80%;
margin:auto;
margin-top:30px;
background:rgba(0,0,0,.6);
padding:30px;
border-radius:20px;
text-align:right;
}

.progress{
height:10px;
background:#111;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:red;
}

.result{
width:80%;
margin:auto;
margin-top:20px;
padding:20px;
border-radius:20px;
}

.safe{
border:2px solid #00ffe1;
color:#00ffe1;
}

.danger{
border:2px solid red;
color:red;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="speak">BlackFalcon SOC</h1>

<textarea id="msg" class="speak" data-label="مربع كتابة الرسالة"></textarea>

<div class="card speak" data-label="لوحة تحليل التهديد">

<h2>حالة التهديد</h2>

<div id="status">-</div>

<br>

نسبة الخطورة

<span id="score">0</span>%

<div class="progress">

<div id="bar" class="bar"></div>

</div>

<br>

نوع التهديد

<div id="attack">-</div>

</div>

<div id="rec" class="result safe speak" data-label="التوصية">

بانتظار التحليل

</div>

</div>

<script>

let audioEnabled=false
let danger=false

document.body.onclick=()=>audioEnabled=true

function speak(text){

if(!audioEnabled)return

speechSynthesis.cancel()

let u=new SpeechSynthesisUtterance(text)

u.lang="ar-SA"

speechSynthesis.speak(u)

}

/* قراءة العناصر عند مرور الماوس */

document.querySelectorAll(".speak").forEach(el=>{

el.addEventListener("mouseenter",()=>{

let name=el.dataset.label || el.innerText

if(name)speak(name)

})

})

/* الكلمات المشبوهة */

const words=[

/* بنوك */

"bank","account","banking","iban","swift",

/* تسجيل دخول */

"login","signin","password","username","verification","verify","confirm","security code",

/* أموال */

"transfer","payment","invoice","billing","transaction","crypto","bitcoin","wallet",

/* احتيال */

"urgent","suspended","limited","reset","update","claim","reward","prize","winner","lottery",

/* روابط */

"http","https","bit.ly","tinyurl","shorturl",

/* عربي */

"بنك","حساب","تحقق","تأكيد","كلمة المرور","رمز التحقق",
"تحويل","دفع","فاتورة","معاملة","جائزة","مبروك",
"رابط","اضغط","مهم","عاجل","تحديث","إعادة تعيين"

]

/* تحليل */

let timer

msg.addEventListener("input",()=>{

clearTimeout(timer)

timer=setTimeout(analyze,3000)

})

function mitre(text){

if(text.includes("login")||text.includes("password"))

return "Credential Harvesting - MITRE T1056"

if(text.includes("http"))

return "Malicious Link - MITRE T1204"

return "Phishing - MITRE T1566"

}

function analyze(){

let text=msg.value.toLowerCase()

let score=0

words.forEach(w=>{

if(text.includes(w))score+=10

})

if(score>100)score=100

scoreEl.innerText=score

bar.style.width=score+"%"

let type=mitre(text)

attack.innerText=type

if(score>=40){

danger=true

status.innerText="رسالة مشبوهة"

rec.className="result danger"

rec.innerText="التوصية: لا تضغط الروابط ولا تشارك بياناتك"

speak("تحذير. الرسالة مشبوهة. التوصية. لا تضغط على الروابط ولا تشارك بياناتك")

}else{

danger=false

status.innerText="الرسالة آمنة"

rec.className="result safe"

rec.innerText="لا يوجد تهديد"

speak("الرسالة آمنة. لا يوجد تهديد")

}

}

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01BLACKFALCONSOC"
const fontSize=14

const columns=canvas.width/fontSize

const drops=[]

for(let i=0;i<columns;i++)drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle=danger?"red":"#00ffe1"

ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){

drops[i]=0

}

drops[i]++

}

}

setInterval(draw,35)

const scoreEl=document.getElementById("score")
const bar=document.getElementById("bar")

</script>

</body>
</html>
