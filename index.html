‏<!DOCTYPE html>
‏<html lang="ar">
‏<head>
‏<meta charset="UTF-8">
‏<title>BlackFalcon SOC</title>

‏<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

‏<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

‏<style>
‏body{
‏margin:0;
‏background:black;
‏color:#00f5d4;
‏font-family:'Orbitron',sans-serif;
‏overflow:hidden;
‏transition:0.6s;
}

‏body.dangerMode{
‏background:#140000;
‏box-shadow:inset 0 0 300px #ff0033;
}

‏canvas{position:fixed;top:0;left:0;z-index:-1;}

‏.container{text-align:center;margin-top:40px;}

‏.logo{
‏font-size:80px;
‏text-shadow:0 0 40px #00f5d4;
}

‏.project{
‏font-size:32px;
‏margin-top:-10px;
}

‏textarea{
‏width:80%;
‏height:130px;
‏background:rgba(0,0,0,0.6);
‏border:1px solid #00f5d4;
‏border-radius:20px;
‏padding:20px;
‏color:#00f5d4;
‏font-size:16px;
‏outline:none;
}

‏.card{
‏width:80%;
‏margin:30px auto;
‏padding:25px;
‏border-radius:25px;
‏background:rgba(0,0,0,0.6);
‏box-shadow:0 0 30px #00f5d422;
‏text-align:left;
}

‏.progress{
‏height:10px;
‏background:#111;
‏border-radius:20px;
‏overflow:hidden;
}

‏.bar{
‏height:100%;
‏width:0%;
‏background:#ff0033;
‏transition:0.4s;
}

‏.safe{color:#00ff88;}
‏.danger{color:#ff0033;}

‏.btn{
‏padding:10px 18px;
‏margin:8px;
‏border:1px solid #00f5d4;
‏background:transparent;
‏color:#00f5d4;
‏cursor:pointer;
‏border-radius:15px;
}

‏</style>
‏</head>

‏<body>

‏<canvas id="matrix"></canvas>

‏<div class="container">

‏<div class="logo speakable">🦅</div>
‏<div class="project speakable">BlackFalcon SOC</div>

‏<div>
‏<button class="btn speakable" onclick="toggleLang()">EN / AR</button>
‏<button class="btn speakable" onclick="generatePDF()">REPORT</button>
‏</div>

‏<textarea id="msg" placeholder="الصق الرسالة هنا..." class="speakable"></textarea>

‏<div class="card">

‏<h2 class="speakable" id="threatTitle">حالة التهديد</h2>
‏<div id="status" class="speakable">—</div>

‏<div class="speakable">
‏<span id="riskLabel">نسبة الخطورة:</span> <span id="score">0</span>%
‏</div>

‏<div class="progress">
‏<div class="bar" id="bar"></div>
‏</div>

‏<div id="mitre" class="speakable">MITRE: —</div>

‏</div>

‏<div id="rec" class="speakable safe">
✔️ بانتظار التحليل
‏</div>

‏</div>

‏<script>

‏let currentLang="ar";
‏let lastResult="", lastType="", lastRec="";

/* ===== الصوت ===== */
‏function speak(text){
‏if(!text) return;

‏let msg=new SpeechSynthesisUtterance(text);
‏msg.lang=currentLang==="ar"?"ar-SA":"en-US";

‏speechSynthesis.cancel();
‏speechSynthesis.speak(msg);
}

/* قراءة عند المرور */
‏document.addEventListener("mouseover",e=>{
‏if(e.target.classList.contains("speakable")){
‏speak(e.target.innerText);
}
});

/* مربع النص */
‏const msg=document.getElementById("msg");

‏msg.addEventListener("focus",()=>{
‏speak(currentLang==="ar"?
"أنت في مربع إدخال الرسالة":
‏"You are in the message input field");
});

/* ===== كلمات مشبوهة قوية ===== */
‏const suspiciousWords=[
"تحقق من حسابك البنكي","تحقق من حسابك","otp","verify",
‏"bank","password","credit card","bitcoin","http",
‏"urgent","click here","free money","مجاناً","جائزة",
"اضغط هنا","تحويل بنكي","استثمار","ربح سريع",
‏"verify your bank account","update banking info",
‏"account suspended","reset password","limited offer",
‏"earn money fast","double your money","crypto"
];

/* ===== تحليل ===== */
‏let timer;

‏msg.addEventListener("input",()=>{
‏clearTimeout(timer);
‏timer=setTimeout(analyze,1200);
});

‏function analyze(){

‏let text=msg.value.toLowerCase();
‏let score=0;

/* رفع خطورة */
‏if(text.includes("تحقق من حسابك البنكي")) score+=70;

‏suspiciousWords.forEach(w=>{
‏if(text.includes(w)) score+=15;
});

‏if(text.includes("http")) score+=25;

‏if(score>100) score=100;

/* نوع الهجوم */
‏let type="—";

‏if(text.includes("verify")||text.includes("تحقق")) type="Phishing";
‏else if(text.includes("bank")) type="Data Theft";
‏else if(text.includes("bitcoin")) type="Financial Scam";
‏else if(text.includes("http")) type="Malicious Link";

‏document.getElementById("score").innerText=score;
‏document.getElementById("bar").style.width=score+"%";
‏document.getElementById("mitre").innerText="MITRE: "+type;

‏let status=document.getElementById("status");
‏let rec=document.getElementById("rec");

‏if(score>30){

‏document.body.classList.add("dangerMode");

‏if(currentLang==="ar"){
‏status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
‏rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";
‏speak("تحذير. الرسالة غير آمنة. لا تضغط الروابط");
‏lastResult="غير آمن";
‏lastRec="لا تضغط الروابط ولا تشارك بياناتك";
‏}else{
‏status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
‏rec.innerHTML="⚠️ Do not click links or share data";
‏speak("Warning. This message is unsafe");
‏lastResult="UNSAFE";
‏lastRec="Do not click links or share data";
}

‏lastType=type;

‏}else{

‏document.body.classList.remove("dangerMode");

‏if(currentLang==="ar"){
‏status.innerHTML="<span class='safe'>✔️ آمن</span>";
‏rec.innerHTML="✔️ لا يوجد تهديد واضح";
‏speak("الرسالة آمنة");
‏lastResult="آمن";
‏lastRec="لا يوجد تهديد واضح";
‏}else{
‏status.innerHTML="<span class='safe'>✔️ SAFE</span>";
‏rec.innerHTML="✔️ No threat detected";
‏speak("This message is safe");
‏lastResult="SAFE";
‏lastRec="No threat detected";
}

‏lastType=type;
}

}

/* ===== لغة ===== */
‏function toggleLang(){
‏currentLang=currentLang==="ar"?"en":"ar";

‏if(currentLang==="en"){
‏msg.placeholder="Paste message here";
‏document.getElementById("threatTitle").innerText="Threat Status";
‏document.getElementById("riskLabel").innerText="Risk Score:";
‏}else{
‏msg.placeholder="الصق الرسالة هنا";
‏document.getElementById("threatTitle").innerText="حالة التهديد";
‏document.getElementById("riskLabel").innerText="نسبة الخطورة:";
}
}

‏/* ===== PDF احترافي ===== */
‏function generatePDF(){

‏const { jsPDF } = window.jspdf;
‏let doc=new jsPDF();

/* خلفية */
‏doc.setFillColor(0,0,0);
‏doc.rect(0,0,210,297,"F");

/* عنوان */
‏doc.setTextColor(0,255,200);
‏doc.setFontSize(20);
‏doc.text("BlackFalcon SOC",20,20);

‏doc.setFontSize(14);
‏doc.text("Security Report",20,35);

/* بيانات */
‏doc.setTextColor(255,255,255);
‏doc.setFontSize(12);

‏doc.text("Result: "+lastResult,20,60);
‏doc.text("Threat Type: "+lastType,20,75);
‏doc.text("Recommendation:",20,90);

/* تقسيم التوصية */
‏let lines=doc.splitTextToSize(lastRec,160);
‏doc.text(lines,20,100);

‏doc.text("Generated by BlackFalcon SOC",20,140);

‏doc.save("BlackFalcon_Report.pdf");
}

‏/* ===== Matrix ===== */
‏const canvas=document.getElementById("matrix");
‏const ctx=canvas.getContext("2d");

‏canvas.height=window.innerHeight;
‏canvas.width=window.innerWidth;

‏const letters="01BLACKFALCON";
‏const fontSize=14;
‏const columns=canvas.width/fontSize;
‏const drops=[];

‏for(let i=0;i<columns;i++){drops[i]=1;}

‏function draw(){

‏ctx.fillStyle="rgba(0,0,0,0.05)";
‏ctx.fillRect(0,0,canvas.width,canvas.height);

‏ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

‏for(let i=0;i<drops.length;i++){
‏let text=letters[Math.floor(Math.random()*letters.length)];
‏ctx.fillText(text,i*fontSize,drops[i]*fontSize);
‏drops[i]++;
‏if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

‏setInterval(draw,35);

‏</script>
‏</body>
‏</html>
