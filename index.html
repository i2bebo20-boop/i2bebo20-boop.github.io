<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon X</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:black;
color:#00ffe0;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

.container{text-align:center;margin-top:50px;}

.logo{
width:90px;
filter:drop-shadow(0 0 20px #00ffe0);
}

textarea{
width:80%;
height:130px;
background:#000;
border:1px solid #00ffe0;
border-radius:15px;
color:#00ffe0;
padding:15px;
}

.card{
width:80%;
margin:20px auto;
padding:20px;
background:#000000aa;
border-radius:20px;
box-shadow:0 0 25px #00ffe0;
}

.bar{
height:12px;
background:linear-gradient(to right,#00ff88,#ff0033);
width:0%;
border-radius:10px;
transition:0.4s;
}

button{
margin:5px;
padding:8px 15px;
background:none;
border:1px solid #00ffe0;
color:#00ffe0;
cursor:pointer;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}
</style>
</head>

<body>

<div class="container">

<img src="https://cdn-icons-png.flaticon.com/512/616/616554.png" class="logo">
<h1>BlackFalcon X</h1>

<button onclick="toggleVoice()">🎙️ تشغيل / إيقاف الصوت</button>
<button onclick="generatePDF()">📄 تقرير</button>

<textarea id="msg" placeholder="الصق الرسالة هنا"></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
</div>

<div id="rec">✔️ جاهز</div>

</div>

<script>

let lastResult="", lastType="", lastRec="", lastMsg="";
let voiceMode = true;
let timer;

/* 🔊 نطق */
function speak(t){
if(!voiceMode) return;
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(t);
u.lang="ar-SA";
u.rate=0.9;
speechSynthesis.speak(u);
}

/* 🔊 قراءة النتائج */
function speakAll(){
let text = "نتيجة التحليل " + lastResult +
". نسبة الخطر " + document.getElementById("score").innerText +
" بالمئة. نوع التهديد " + lastType +
". التوصية " + lastRec;
speak(text);
}

/* كلمات مشبوهة */
const words=[
"otp","password","bank","bitcoin","crypto","login",
"http","verify","urgent","click","free",
"تحقق","بنك","كلمة المرور","رابط","جائزة","اضغط"
];

const msg=document.getElementById("msg");

/* ⏳ تحليل بعد 2 ثانية توقف الكتابة */
msg.addEventListener("input",()=>{
clearTimeout(timer);
timer = setTimeout(()=>{
analyze();
},2000);
});

/* 🧠 تحليل الرسائل */
function analyze(){
let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;

if(text.includes("otp")) score+=30;
if(text.includes("password")) score+=25;
if(text.includes("http")) score+=20;
if(text.includes("bank")) score+=20;
if(text.includes("bitcoin")) score+=20;
if(text.includes("تحقق")) score+=25;

if(score>100) score=100;

let type="Safe";

if(text.includes("تحقق")||text.includes("verify")) type="Phishing";
else if(text.includes("bank")) type="Data Theft";
else if(text.includes("bitcoin")) type="Financial Scam";
else if(text.includes("http")) type="Malicious Link";

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+type;

if(score>40){
document.getElementById("status").innerHTML="<span class='danger'>⚠️ خطر</span>";
document.getElementById("rec").innerHTML="⚠️ لا تضغط أي رابط";
lastResult="خطر";
lastRec="لا تضغط أي رابط ولا تشارك بياناتك";
}else{
document.getElementById("status").innerHTML="<span class='safe'>✔️ آمن</span>";
document.getElementById("rec").innerHTML="✔️ لا يوجد تهديد";
lastResult="آمن";
lastRec="لا يوجد تهديد";
}

lastType=type;

/* 🔊 صوت فقط بعد التحليل */
speakAll();
}

/* 🎙️ تشغيل/إيقاف الصوت */
function toggleVoice(){
voiceMode=!voiceMode;
alert(voiceMode?"تم تشغيل الصوت":"تم إيقاف الصوت");
}

/* 🎙️ أوامر صوتية دايم */
function startContinuousVoice(){
let recg = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recg.lang="ar-SA";
recg.continuous=true;
recg.interimResults=false;

recg.onresult = function(e){
let cmd = e.results[e.results.length-1][0].transcript;
if(cmd.includes("حلل")) analyze();
if(cmd.includes("تقرير")) generatePDF();
if(cmd.includes("امسح")) { msg.value=""; speak("تم مسح النص"); }
};

recg.onerror = recg.start;
recg.onend = recg.start; // دايم
recg.start();
}

/* 📄 تقرير PDF */
function generatePDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.setFillColor(0,0,0);
doc.rect(0,0,210,297,"F");
doc.setTextColor(0,255,200);

/* لوقو */
doc.addImage("https://cdn-icons-png.flaticon.com/512/616/616554.png","PNG",85,10,40,40);

doc.setFontSize(16);
doc.text("BlackFalcon X Report",105,60,null,null,"center");

doc.setFontSize(11);
doc.text("Message:",20,80);
doc.text(doc.splitTextToSize(lastMsg||"Empty",170),20,90);

doc.text("Result: "+lastResult,20,130);
doc.text("Type: "+lastType,20,140);
doc.text("Risk: "+document.getElementById("score").innerText+"%",20,150);

doc.text("Recommendation:",20,165);
doc.text(lastRec,20,175);

doc.save("BlackFalconX.pdf");
speak("تم إنشاء التقرير");
}

/* 🔊 بدء كل شيء دايم عند تحميل الصفحة */
window.onload = () => {
speak("تم تشغيل نظام بلاك فالكون. النظام جاهز للتحليل الصوتي");
startContinuousVoice();
};
</script>

</body>
</html>
