<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--neon-green:#00ffcc;
--danger-red:#ff0033;
}

body{
margin:0;
background:black;
color:var(--neon-green);
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.3s;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
margin-top:60px;
}

h1{
font-size:40px;
text-shadow:0 0 15px var(--neon-green);
}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.7);
border:1px solid var(--neon-green);
border-radius:20px;
padding:20px;
color:var(--neon-green);
margin-top:20px;
box-shadow:0 0 10px var(--neon-green);
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.7);
box-shadow:0 0 20px var(--neon-green);
}

.bar{
height:10px;
background:var(--neon-green);
width:0%;
transition:0.3s;
}

.safe{color:#00ff88;}
.danger{color:var(--danger-red);}

button{
padding:8px 15px;
border:1px solid var(--neon-green);
background:transparent;
color:var(--neon-green);
cursor:pointer;
border-radius:10px;
}

/* 🔴 فقط وقت الخطر */
.danger-mode{
color:var(--danger-red);
}

.danger-mode textarea,
.danger-mode .card{
border-color:var(--danger-red);
box-shadow:0 0 15px var(--danger-red);
}

.danger-mode .bar{
background:var(--danger-red);
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<button onclick="toggleLang()">AR / EN</button>

<textarea id="msg" placeholder="الصق الرسالة هنا"></textarea>

<div class="card">
<div id="status">—</div>
<div id="riskLabel">Risk</div>
<div><span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec"></div>

</div>

<script>

/* 🌐 */
let currentLang="ar";

/* 🔊 صوت */
let audioEnabled=false;

function speak(text){
if(!audioEnabled) return;
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

/* تفعيل */
msg.addEventListener("focus",()=>{
audioEnabled=true;
speak(currentLang==="ar"?"مربع إدخال النص":"Text input field");
});

/* 🧠 تحليل قوي */
msg.addEventListener("input",analyze);

function analyze(){

let text=msg.value.toLowerCase();
let score=0;
let type="Safe";
let mitre="None";

/* كلمات خطيرة */
const high=["password","otp","bank","verify","login","كلمة المرور","تحقق"];
high.forEach(w=>{ if(text.includes(w)) score+=25; });

/* روابط */
let urlRegex=/(https?:\/\/[^\s]+)/g;
let urls=text.match(urlRegex);

if(urls){

urls.forEach(url=>{

score+=20;

/* روابط مختصرة */
if(url.includes("bit.ly")||url.includes("tinyurl")){
score+=30;
type="phishing";
}

/* دومين غريب */
if(url.match(/\.(ru|xyz|tk|ml)/)){
score+=25;
type="phishing";
}

/* خداع */
if(url.includes("paypal")||url.includes("bank")){
score+=25;
type="phishing";
}

});

}

/* كلمات نصب */
if(text.includes("win")||text.includes("prize")||text.includes("جائزة")){
score+=20;
type="scam";
}

/* malware */
if(text.includes("apk")||text.includes("exe")){
score+=30;
type="malware";
}

if(score>100) score=100;

/* MITRE */
if(type==="phishing") mitre="T1566";
if(type==="malware") mitre="T1204";
if(type==="scam") mitre="T1656";

/* عرض */
score.innerText=score;
bar.style.width=score+"%";

document.getElementById("type").innerText="Type: "+type;
document.getElementById("mitre").innerText="MITRE: "+mitre;

/* حالة */
if(score>30){

document.body.classList.add("danger-mode");

status.innerHTML="<span class='danger'>⚠️ THREAT</span>";
rec.innerText="Do not interact";

speak("Threat detected");

}else{

document.body.classList.remove("danger-mode");

status.innerHTML="<span class='safe'>✔ SAFE</span>";
rec.innerText="No threat";

speak("Safe");

}

}

/* 🌐 */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";
msg.placeholder=currentLang==="ar"?"الصق الرسالة":"Paste message";
}

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let letters="01ABC";
let drops=[];

for(let i=0;i<canvas.width/14;i++){drops[i]=1;}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("danger-mode")?"#ff0033":"#00ffcc";

for(let i=0;i<drops.length;i++){

let t=letters[Math.random()*letters.length|0];
ctx.fillText(t,i*14,drops[i]*14);

if(drops[i]*14>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;
}

}

setInterval(draw,33);

</script>

</body>
</html>
