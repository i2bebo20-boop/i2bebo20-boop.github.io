<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.5s;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

.logo{font-size:60px;}
.title{font-size:22px;margin-bottom:20px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 25px #00f5d433;
}

.bar{
height:10px;
background:#ff0033;
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
margin:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="logo">🦅</div>
<div class="title">BlackFalcon SOC</div>

<button class="btn" onclick="toggleLang()">EN / AR</button>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

let currentLang="ar";
let lastResult="", lastType="", lastRec="", lastMsg="";

/* ===== صوت ===== */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

/* ===== إدخال ===== */
const msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
speak(currentLang==="ar"?"مكان إدخال الرسالة":"Enter message field");
});

/* ===== كلمات مشبوهة (موسعة 🔥) ===== */
const suspiciousWords=[
"تحقق","حسابك","البنك","كلمة المرور","otp","رمز التحقق",
"bank","password","verify","login","urgent","alert",
"http","https","bit.ly","tinyurl","click here","اضغط هنا",
"free","gift","winner","lottery","prize","جائزة","مجانا",
"bitcoin","crypto","wallet","استثمار","ربح","عرض حصري",
"account suspended","تم ايقاف الحساب","security alert",
"update info","confirm identity","paypal","visa","mastercard",
"limited offer","act now","danger","risk","warning",
"click link","login now","secure your account"
];

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;

/* حساب */
suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=8;
});

if(text.includes("http")||text.includes("bit.ly")||text.includes("tinyurl")) score+=30;

if(score>100) score=100;

/* ===== MITRE ===== */
let type="Safe";
let mitre="None";

if(text.includes("verify")||text.includes("تحقق")){
type="Phishing";
mitre="T1566 - Phishing";
}
else if(text.includes("password")||text.includes("otp")){
type="Credential Theft";
mitre="T1003 - Credential Access";
}
else if(text.includes("bitcoin")||text.includes("crypto")){
type="Financial Scam";
mitre="Impact - Financial Theft";
}
else if(text.includes("http")){
type="Malicious Link";
mitre="T1071 - Command & Control";
}

/* عرض */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+type+" | "+mitre;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

/* ===== خطر ===== */
if(score>30){

document.body.style.background="#200000";

if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";
speak("تحذير. الرسالة غير آمنة. لا تضغط الروابط ولا تشارك بياناتك");
}else{
status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
rec.innerHTML="⚠️ Do not click links or share data";
speak("Warning. Unsafe message. Do not click links or share data");
}

lastResult="UNSAFE";

}

/* ===== آمن ===== */
else{

document.body.style.background="black";

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد";
speak("الرسالة آمنة");
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat detected";
speak("Message is safe");
}

lastResult="SAFE";

}

lastType=type;

}

/* ===== لغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";
msg.placeholder=currentLang==="ar"?"الصق الرسالة هنا":"Paste message here";
}

/* ===== MATRIX 🔥 ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>

</body>
</html>
