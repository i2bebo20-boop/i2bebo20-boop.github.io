<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<title>Falcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:.5s;
}

body.dangerMode{
background:#140000;
box-shadow:inset 0 0 250px red;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
margin-top:50px;
}

h1{
font-size:40px;
text-shadow:0 0 25px #00f5d4;
}

/* أزرار */

.controls{
margin-top:25px;
margin-bottom:35px;
}

button{
padding:10px 25px;
border-radius:20px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
margin:5px;
}

/* مربع النص */

textarea{
width:80%;
height:140px;
background:rgba(0,0,0,.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
}

/* كرت */

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,.6);
box-shadow:0 0 30px #00f5d422;
text-align:left;
}

/* شريط الخطورة */

.progress{
height:10px;
background:#111;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:red;
transition:.4s;
}

/* توصيات */

.rec{
width:80%;
margin:20px auto;
padding:20px;
border-radius:20px;
font-weight:bold;
}

.safe{
border:2px solid #00ff88;
color:#00ff88;
}

.danger{
border:2px solid red;
color:red;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="speak">🦅 Falcon SOC</h1>

<div id="subtitle" class="speak">
منصة تحليل الرسائل المشبوهة
</div>

<div class="controls">

<button onclick="toggleLang()" class="speak">
Language
</button>

<button onclick="generateReport()" class="speak">
Report
</button>

</div>

<textarea id="msg" placeholder="الصق الرسالة هنا..." class="speak"></textarea>

<div class="card">

<h2 class="speak">Threat Status</h2>

<div id="status" class="speak">—</div>

<div class="speak">
Risk Level :
<span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div style="margin-top:15px">

<strong class="speak">MITRE ATT&CK :</strong>

<span id="type" class="speak">—</span>

</div>

</div>

<div id="rec" class="rec safe speak">

Waiting for analysis

</div>

</div>

<script>

let lang="ar";
let audioEnabled=false;

/* تفعيل الصوت بعد أول نقرة */

document.body.addEventListener("click",()=>{
audioEnabled=true;
});

/* الكلمات المشبوهة */

const words=[
"verify","account","bank","password","confirm",
"login","click","transfer","crypto","gift",

"تحقق","حساب","بنكي","كلمة المرور",
"تأكيد","الدخول","اضغط","تحويل"
];

/* كشف الروابط */

function detectLinks(text){

let r=/https?:\/\/[^\s]+/g;

let links=text.match(r);

if(!links)return 0;

return links.length*30;

}

/* نوع الهجوم */

function attackType(text){

if(text.includes("password")||text.includes("كلمة المرور")){

return "Credential Harvesting – MITRE T1056";

}

if(text.includes("http")){

return "Malicious Link – MITRE T1204";

}

return "Phishing – MITRE T1566";

}

/* التحليل */

let timer;

msg.addEventListener("input",()=>{

clearTimeout(timer);

timer=setTimeout(analyze,3000);

});

function analyze(){

let text=msg.value.toLowerCase();

let score=0;

words.forEach(w=>{
if(text.includes(w))score+=15;
});

score+=detectLinks(text);

if(score>100)score=100;

scoreEl.innerText=score;

bar.style.width=score+"%";

let type=attackType(text);

typeEl.innerText=type;

if(score>=30){

document.body.classList.add("dangerMode");

status.innerText="⚠️ Suspicious message";

rec.className="rec danger";

rec.innerText="Do not click links or share sensitive data";

speak("Suspicious message. Attack type "+type);

}else{

document.body.classList.remove("dangerMode");

status.innerText="✔️ Message safe";

rec.className="rec safe";

rec.innerText="No threat detected";

speak("Message safe. No threat detected");

}

}

/* الصوت */

function speak(text){

if(!audioEnabled)return;

speechSynthesis.cancel();

let u=new SpeechSynthesisUtterance(text);

u.lang="en-US";

speechSynthesis.speak(u);

}

/* قراءة العناصر */

document.addEventListener("mouseover",(e)=>{

if(e.target.classList.contains("speak")){

let t=e.target.innerText || e.target.placeholder;

if(t && t.length<120){

speak(t);

}

}

});

/* اللغة */

function toggleLang(){

if(lang=="ar"){

lang="en";

subtitle.innerText="Suspicious Message Analyzer";

msg.placeholder="Paste message here";

}else{

lang="ar";

subtitle.innerText="منصة تحليل الرسائل المشبوهة";

msg.placeholder="الصق الرسالة هنا";

}

}

/* تقرير */

function generateReport(){

let report=

`FALCON SOC REPORT

Threat Status: ${status.innerText}

Risk Level: ${scoreEl.innerText}%

Attack Type: ${typeEl.innerText}

Recommendation:
${rec.innerText}

Analyzed Message:
${msg.value}

Generated by Falcon SOC`;

let w=window.open();

w.document.write("<pre>"+report+"</pre>");

}

/* عناصر */

const scoreEl=document.getElementById("score");
const bar=document.getElementById("bar");
const status=document.getElementById("status");
const typeEl=document.getElementById("type");
const rec=document.getElementById("rec");
const msg=document.getElementById("msg");

/* Matrix */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="FALCONSOC01";
const matrix=letters.split("");

const size=14;
const columns=canvas.width/size;
const drops=[];

for(let x=0;x<columns;x++)drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){

let text=matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*size,drops[i]*size);

if(drops[i]*size>canvas.height && Math.random()>0.975)drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
