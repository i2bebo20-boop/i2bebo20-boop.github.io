<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>BlackFalcon SOC</title>

<style>

body{
margin:0;
background:black;
color:#00ffe1;
font-family:Arial;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
padding-top:70px;
}

h1{
font-size:55px;
text-shadow:0 0 25px #00ffe1;
}

button{
padding:10px 30px;
border-radius:20px;
background:transparent;
border:1px solid #00ffe1;
color:#00ffe1;
cursor:pointer;
}

textarea{

width:80%;
height:150px;

background:rgba(0,0,0,.7);
border:1px solid #00ffe1;
border-radius:20px;

padding:20px;
color:white;
font-size:16px;

margin-top:30px;

}

.card{

width:80%;
margin:auto;
margin-top:30px;

background:rgba(0,0,0,.6);

padding:30px;
border-radius:20px;

text-align:right;

}

.progress{
height:10px;
background:#111;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:red;
}

.result{

width:80%;
margin:auto;
margin-top:20px;

padding:20px;

border-radius:20px;

}

.safe{
border:2px solid #00ffe1;
color:#00ffe1;
}

.danger{
border:2px solid red;
color:red;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="speak">BlackFalcon SOC</h1>

<button id="lang">EN</button>

<br>

<textarea id="msg" placeholder="الصق الرسالة هنا"></textarea>

<div class="card">

<h2 class="speak">حالة التهديد</h2>

<div id="status">-</div>

<br>

نسبة الخطورة

<span id="score">0</span>%

<div class="progress">

<div id="bar" class="bar"></div>

</div>

<br>

نوع التهديد

<div id="attack">-</div>

</div>

<div id="rec" class="result safe">

بانتظار التحليل

</div>

</div>

<script>

let audioEnabled=false
let danger=false

document.body.onclick=()=>audioEnabled=true

function speak(text){

if(!audioEnabled)return

speechSynthesis.cancel()

let u=new SpeechSynthesisUtterance(text)

u.lang="ar-SA"

speechSynthesis.speak(u)

}

/* مربع النص */

const msg=document.getElementById("msg")

msg.addEventListener("mouseenter",()=>{

speak("أنت الآن عند مربع كتابة الرسالة")

})

/* الكلمات المشبوهة */

const words=[

"bank","account","verify","login","password",
"click","urgent","crypto","bitcoin","transfer",

"تحقق","حساب","كلمة المرور","تحويل",
"جائزة","اضغط","رابط","مبروك"

]

let timer

msg.addEventListener("input",()=>{

clearTimeout(timer)

timer=setTimeout(analyze,2500)

})

function analyze(){

let text=msg.value.toLowerCase()

let score=0

words.forEach(w=>{

if(text.includes(w))score+=15

})

if(text.includes("http"))score+=30

if(score>100)score=100

document.getElementById("score").innerText=score

document.getElementById("bar").style.width=score+"%"

if(score>40){

danger=true

status.innerText="رسالة مشبوهة"

attack.innerText="Phishing Attack"

rec.className="result danger"

rec.innerText="لا تضغط على الروابط ولا تشارك معلوماتك"

speak("تحذير. الرسالة مشبوهة")

}else{

danger=false

status.innerText="الرسالة آمنة"

attack.innerText="No Attack"

rec.className="result safe"

rec.innerText="لم يتم اكتشاف تهديد"

speak("الرسالة آمنة")

}

}

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01BLACKFALCON"
const fontSize=14

const columns=canvas.width/fontSize

const drops=[]

for(let i=0;i<columns;i++)drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle=danger?"red":"#00ffe1"

ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){

drops[i]=0

}

drops[i]++

}

}

setInterval(draw,33)

</script>

</body>
</html>
