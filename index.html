<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{ --neon-green:#00ffcc; --danger-red:#ff0033; }
body{ margin:0; background:black; color:var(--neon-green); font-family:'Orbitron',sans-serif; overflow-x:hidden; }
canvas{ position:fixed; top:0; left:0; z-index:-1; }
.container{ text-align:center; }

textarea{ width:85%; height:130px; background:rgba(0,0,0,0.7); border:2px solid var(--neon-green); border-radius:15px; padding:20px; color:var(--neon-green); }

.card{ width:80%; margin:20px auto; padding:20px; background:rgba(0,0,0,0.8); box-shadow:0 0 20px var(--neon-green); }

.bar{ height:10px; background:var(--neon-green); width:0%; transition:0.5s; }

.danger{ color:var(--danger-red); }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
<h1>🦅 BlackFalcon SOC</h1>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">SAFE</div>
<div>Score: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="mitre"></div>
</div>

<div id="rec"></div>
</div>

<script>
let msg=document.getElementById("msg");

function speak(t){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(t);
u.lang="ar-SA";
speechSynthesis.speak(u);
}

msg.addEventListener("input",()=>setTimeout(analyze,1000));

function analyze(){
let text=msg.value.toLowerCase();
let score=0;

// 🔥 كل الكلمات (عربي + إنجليزي كاملة)
const words=[
"تحقق من حسابك البنكي","http",
"بنك","احتيال","اختراق","كلمة المرور","otp","login","verify","account","password",
"free money","guaranteed profit","no risk","limited offer","act now","claim now",
"verify your account","account suspended","unusual activity detected","confirm identity",
"secure your account","update your details","reset now","login immediately",
"urgent action required","final notice","last warning","security alert",
"you have won","winner","congratulations","claim your prize","reward waiting",
"instant payout","fast cash","quick money","earn instantly","double earnings",
"investment opportunity","high return","risk free investment","crypto profit",
"bitcoin giveaway","airdrop","exclusive deal","vip offer","special promotion",
"buy now","order now","limited stock","only today","offer expires",
"click below","visit link","open link","download file","install now",
"attachment included","see attachment","open attachment","invoice attached",
"payment required","pending payment","billing issue","update payment info",
"confirm payment","transaction failed","account locked","access denied",
"unauthorized login","security breach","data leak","compromised account",
"recover account","verify now","identity check","send code","enter code"
"تحقق من حسابك البنكي","تحقق من حسابك","تحديث الحساب","تحديث بياناتك","تأكيد الهوية",
"تأكيد بياناتك","قم بتسجيل الدخول","تسجيل الدخول الآن","أدخل كلمة المرور","إعادة تعيين كلمة المرور",
"تم اختراق حسابك","تم إيقاف حسابك","حسابك معلق","نشاط غير معتاد","محاولة تسجيل دخول",
"تم رصد نشاط مشبوه","تنبيه أمني","تحذير أمني","إشعار نهائي","آخر تحذير","يلزم اتخاذ إجراء",
"قم بالتحقق الآن","تحقق الآن","اضغط هنا","انقر هنا","انقر على الرابط","افتح الرابط",
"حمل الآن","تحميل فوري","افتح المرفق","راجع المرفق","فاتورة مرفقة","مستند مرفق",
"دفع مطلوب","مشكلة في الدفع","فشل العملية","تحديث معلومات الدفع","تأكيد الدفع",
"تم سحب مبلغ","تمت عملية شراء","تم خصم مبلغ","حوالة مالية","تحويل مالي",
"جائزة","ربحت","مبروك","أنت فائز","اربح الآن","فرصة ربح","سحب عشوائي",
"مكافأة نقدية","جائزة كبرى","هدية مجانية","عرض مجاني","عرض حصري","عرض خاص",
"لفترة محدودة","سارع الآن","لا تفوت","عرض ينتهي قريباً","فرصة لا تعوض",
"اربح المال","دخل إضافي","دخل سريع","اربح من المنزل","استثمار","استثمار مضمون",
"أرباح مضمونة","بدون مخاطرة","مخاطر صفر","مكاسب فورية","مضاعفة الأرباح",
"عملة رقمية","بيتكوين","عملات مشفرة","استثمار رقمي","تداول",
"حساب بنكي","بطاقة ائتمان","بطاقة مدى","بطاقة بنكية","بيانات البطاقة",
"رمز التحقق","رمز otp","أدخل الرمز","أرسل الرمز","تأكيد الرمز",
"بياناتك الشخصية","معلومات حساسة","رقم الهوية","رقم البطاقة",
"الوصول غير مصرح","تم اختراق البيانات","تسريب بيانات","اختراق أمني",
"رابط آمن","دخول آمن","حماية الحساب","تأمين الحساب"
];

words.forEach(w=>{
if(text.includes(w)) score+=10;
});

// 🔥 كلمات حساسة
["password","otp","login","bank","تحقق من حسابك البنكي","http"].forEach(k=>{
if(text.includes(k)) score+=25;
});

// 🔥 تكرار قوي
let wc={};
text.split(" ").forEach(w=>wc[w]=(wc[w]||0)+1);

Object.values(wc).forEach(c=>{
if(c>=20) score+=80;
});

// AUTO
if(score>=70) score=100;

update(score,text);
}

function update(score,text){

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");
let mitre=document.getElementById("mitre");

if(score>30){

status.innerText="🚨 CRITICAL";
status.classList.add("danger");

// MITRE
let m=[];
if(text.includes("http")) m.push("T1566 Phishing");
if(text.includes("password")||text.includes("login")) m.push("Credential Theft");
if(text.includes("bank")) m.push("Financial Fraud");
if(text.includes("otp")) m.push("OTP Abuse");
if(m.length==0) m.push("T1566 Phishing");

mitre.innerText="MITRE: "+m.join(" | ");

// 🔥 توصيات SOC حقيقية
let recs=[];

if(text.includes("http")) recs.push("لا تضغط أي رابط مشبوه");
if(text.includes("password")) recs.push("لا تدخل كلمة المرور خارج النظام الرسمي");
if(text.includes("bank")) recs.push("استخدم تطبيق البنك الرسمي فقط للتحقق");
if(text.includes("otp")) recs.push("لا تشارك رمز التحقق مطلقاً");

recs.push("اعزل الرسالة فوراً من بيئة العمل");
recs.push("أبلغ فريق الأمن السيبراني مباشرة");
recs.push("افحص الجهاز باستخدام برنامج حماية محدث");
recs.push("راجع سجلات الدخول للحسابات المرتبطة");

let final=recs.join(" | ");
rec.innerText=final;

// 🔊 صوت
speak("تحذير خطر عالي");
setTimeout(()=>speak(final),1500);

}else{
status.innerText="SAFE";
rec.innerText="";
mitre.innerText="";
speak("الحالة آمنة");
}
}

// شاشة لا محدودة
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

let drops=Array(Math.floor(canvas.width/14)).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00ffcc";
drops.forEach((y,i)=>{
ctx.fillText(Math.random()>0.5?1:0,i*14,y*14);
if(y*14>canvas.height) drops[i]=0;
drops[i]++;
});
}
setInterval(draw,33);
</script>

</body>
</html>
