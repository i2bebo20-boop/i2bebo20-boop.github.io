<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--neon-green:#00ffcc;
--danger-red:#ff0033;
}

body{
margin:0;
background:black;
color:var(--neon-green);
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

.container{
text-align:center;
margin-top:60px;
}

h1{
font-size:40px;
text-shadow:0 0 15px var(--neon-green);
}

textarea{
width:80%;
height:130px;
margin-top:20px;
background:rgba(0,0,0,0.7);
border:1px solid var(--neon-green);
border-radius:20px;
padding:20px;
color:var(--neon-green);
box-shadow:0 0 10px var(--neon-green);
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.7);
box-shadow:0 0 20px var(--neon-green);
}

.bar{
height:10px;
background:var(--neon-green);
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:var(--danger-red);}

button{
padding:8px 15px;
border:1px solid var(--neon-green);
background:transparent;
color:var(--neon-green);
border-radius:10px;
cursor:pointer;
}

.danger-mode{
color:var(--danger-red);
}

.danger-mode textarea,
.danger-mode .card{
border-color:var(--danger-red);
box-shadow:0 0 15px var(--danger-red);
}

</style>
</head>

<body>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<textarea id="msg" placeholder="الصق الرسالة هنا"></textarea>

<button onclick="toggleLang()">AR / EN</button>

<div class="card">
<div id="status">—</div>
<div id="riskLabel">درجة الخطر</div>
<div><span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec"></div>

</div>

<script>

let currentLang="ar";
let analyzeTimer=null;
let audioEnabled=false;

/* 🔊 صوت */
function speak(text){
if(!audioEnabled) return;

speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
u.rate=0.9;
speechSynthesis.speak(u);
}

/* 👆 عند الضغط على مربع النص */
let msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
if(!audioEnabled){
audioEnabled=true;
let unlock=new SpeechSynthesisUtterance(" ");
unlock.volume=0;
speechSynthesis.speak(unlock);
}

if(currentLang==="ar"){
speak("مربع كتابة النص");
}else{
speak("Text input field");
}
});

/* 🌐 اللغة */
const lang={
ar:{
risk:"درجة الخطر",
safe:"✔️ آمن",
danger:"⚠️ تهديد",
recSafe:"لا يوجد تهديد",
recDanger:"لا تتفاعل مع الرسالة"
},
en:{
risk:"Risk",
safe:"✔️ SAFE",
danger:"⚠️ THREAT",
recSafe:"No threat detected",
recDanger:"Do not interact"
}
};

/* 🧠 التحليل مع تأخير */
msg.addEventListener("input",()=>{

clearTimeout(analyzeTimer);

analyzeTimer=setTimeout(()=>{
analyze();
},1200); // تأخير 1.2 ثانية

});

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

/* كلمات احتيالية قوية */
const high=[
"password","otp","bank","crypto","bitcoin",
"كلمة المرور",
"تحقق",
"تحقق من حسابك البنكي",
"تحقق من حسابك البنكي الآن",
"bank verification",
"verify your bank",
"verify your account",
"your account is suspended"
];

/* كلمات متوسطة */
const medium=[
"http","https","bit.ly",
"click","urgent","login","account",
"اضغط","فوراً","عاجل"
];

high.forEach(w=>{ if(text.includes(w)) score+=25; });
medium.forEach(w=>{ if(text.includes(w)) score+=15; });

if((text.match(/http/g)||[]).length>1) score+=20;
if(text.includes("@")) score+=10;

if(score>100) score=100;

/* عرض */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");

/* الحالة */
if(score>30){

document.body.classList.add("danger-mode");

status.innerHTML="<span class='danger'>"+lang[currentLang].danger+"</span>";
rec.innerText=lang[currentLang].recDanger;

speak(lang[currentLang].danger);

}else{

document.body.classList.remove("danger-mode");

status.innerHTML="<span class='safe'>"+lang[currentLang].safe+"</span>";
rec.innerText=lang[currentLang].recSafe;

speak(lang[currentLang].safe);

}

}

/* تغيير اللغة */
function toggleLang(){

currentLang=currentLang==="ar"?"en":"ar";
document.getElementById("riskLabel").innerText=lang[currentLang].risk;

speak(currentLang==="ar"?"تم تغيير اللغة":"Language changed");

}

</script>

</body>
</html>
