<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.6s;
}

body.dangerMode{
background:#1a0000;
box-shadow:inset 0 0 250px #ff0033;
animation:flash 0.6s infinite alternate;
}

@keyframes flash{
from{box-shadow:inset 0 0 150px #ff0033;}
to{box-shadow:inset 0 0 300px #ff0000;}
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:100px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
outline:none;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 30px #00f5d422;
text-align:left;
}

.progress{
height:10px;
background:#111;
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#ff0033;
transition:0.5s;
}

.recommendation{
width:80%;
margin:20px auto;
padding:20px;
border-radius:20px;
font-weight:bold;
transition:0.4s;
}

.recSafe{
background:rgba(0,255,136,0.15);
border:2px solid #00ff88;
color:#00ff88;
}

.recDanger{
background:rgba(255,0,51,0.15);
border:2px solid #ff0033;
color:#ff0033;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<h2>حالة التهديد</h2>
<div id="status">—</div>
<div>نسبة الخطورة: <span id="score">0</span>%</div>

<div class="progress"><div class="bar" id="bar"></div></div>
<div id="mitre">MITRE: —</div>
<div>رقم الحادثة: <span id="incident">—</span></div>
</div>

<div class="recommendation recSafe" id="rec">
✔️ بانتظار التحليل...
</div>

</div>

<script>

let rainColor="#00f5d4";
let currentRisk=0;

/* ===== صوت ===== */
function speak(text){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.lang="ar-SA";
msg.rate=0.95;
speechSynthesis.speak(msg);
}

/* ===== القائمة الضخمة جداً ===== */

const suspiciousWords=[

/* بنوك عربي */
"تحقق من حسابك البنكي","تحقق من حسابك","تحديث بياناتك البنكية",
"تم تجميد حسابك","تم إيقاف حسابك","حسابك موقوف",
"نشاط غير معتاد","تنبيه أمني عاجل",
"أدخل بياناتك","الرقم السري","رمز التحقق","رمز التفعيل",
"كلمة المرور","إعادة تعيين كلمة المرور",
"بيانات البطاقة","رقم البطاقة","بطاقتك الائتمانية",
"رقم الآيبان","رقم الحساب","رمز cvv","otp",
"تحويل بنكي عاجل","حوالة عاجلة",
"استرجاع حسابك","استعادة الحساب",
"تحديث معلومات الدفع","فشل عملية الدفع",

/* استثمار عربي */
"استثمار مضمون","ربح يومي","أرباح مضمونة",
"مضاعفة أموالك","دخل ثابت مضمون",
"فرصة لا تعوض","عرض محدود","لفترة محدودة",
"اضغط هنا","انقر هنا الآن",
"اكسب المال من المنزل","وظيفة براتب عالي",
"سجل الآن","احصل على مكافأة",
"استلم جائزتك","فزت بجائزة",
"تهانينا لقد ربحت","سحب نقدي فوري",
"بيتكوين","عملة رقمية","تداول فوري",

/* توصيل عربي */
"شحنة معلقة","فشل تسليم الشحنة",
"ادفع رسوم الشحن","رسوم جمركية مستحقة",
"تأكيد عنوان الشحن","تتبع الشحنة الآن",

/* ابتزاز عربي */
"لدينا صورك","تم اختراق جهازك",
"ادفع خلال 24 ساعة","سننشر معلوماتك",
"تم تسجيلك بالكاميرا",

/* English Banking */
"verify your bank account","verify your account",
"account suspended","account locked",
"unusual activity detected","security alert",
"reset your password","confirm your identity",
"update payment information","bank transfer",
"credit card number","card details",
"cvv","iban number","swift code",
"enter verification code","one time password",

/* English Scam */
"claim your prize","you won",
"urgent action required","limited time offer",
"click here now","act immediately",
"double your money","guaranteed profit",
"crypto investment","bitcoin investment",
"earn money fast","work from home offer",

/* Delivery English */
"delivery failed","package on hold",
"customs fee required","track your parcel",

/* Extortion English */
"we hacked your device","we recorded you",
"pay within 24 hours","your data will be leaked",

/* روابط */
".ru",".cn",".tk",".gq",".ml",
"bit.ly","tinyurl","shorturl",
"http://","https://",

/* تقني */
"remote access","anydesk","teamviewer",
"install this app","download attachment",
"open attached file","enable macros"

];

let timer;

document.getElementById("msg").addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,600);
});

function analyze(){

let text=document.getElementById("msg").value.toLowerCase();
let matches=0;

suspiciousWords.forEach(word=>{
if(text.includes(word.toLowerCase())) matches++;
});

let risk=Math.min(matches*6,100);
currentRisk=risk;

document.getElementById("score").innerText=risk;
document.getElementById("bar").style.width=risk+"%";
document.getElementById("incident").innerText="INC-"+Math.floor(Math.random()*999999);

let rec=document.getElementById("rec");

if(risk>0){

document.body.classList.add("dangerMode");
rainColor="#ff0033";

document.getElementById("status").innerHTML="<span class='danger'>غير آمن</span>";
document.getElementById("mitre").innerText="MITRE: T1566 – Phishing";

rec.classList.remove("recSafe");
rec.classList.add("recDanger");
rec.innerText="⚠️ تحذير: الرسالة غير آمنة. لا تضغط روابط ولا تشارك بياناتك.";

speak("تنبيه. الرسالة غير آمنة.");

}else{

document.body.classList.remove("dangerMode");
rainColor="#00f5d4";

document.getElementById("status").innerHTML="<span class='safe'>آمن</span>";
document.getElementById("mitre").innerText="MITRE: —";

rec.classList.remove("recDanger");
rec.classList.add("recSafe");
rec.innerText="✔️ الرسالة تبدو آمنة.";

speak("الرسالة آمنة.");

}

}

/* Matrix */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];
for(let i=0;i<columns;i++){drops[i]=Math.random()*canvas.height;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle=rainColor;
ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
ctx.fillText("0",i*fontSize,drops[i]);
drops[i]+=fontSize;
if(drops[i]>canvas.height){drops[i]=0;}
}
}
setInterval(draw,35);

</script>
</body>
</html>
