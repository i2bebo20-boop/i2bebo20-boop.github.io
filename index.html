<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.5s;
}

body.dangerMode{
background:#140000;
box-shadow:inset 0 0 250px red;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
margin-top:50px;
}

h1{
font-size:40px;
text-shadow:0 0 25px #00f5d4;
}

.langWrapper{
margin-top:25px;
margin-bottom:35px;
}

.langBtn{
padding:10px 25px;
border-radius:20px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
}

textarea{
width:80%;
height:140px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
outline:none;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 30px #00f5d422;
text-align:left;
}

.progress{
height:10px;
background:#111;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:red;
transition:0.4s;
}

.recommendation{
width:80%;
margin:20px auto;
padding:20px;
border-radius:20px;
font-weight:bold;
}

.recSafe{
background:rgba(0,255,136,0.1);
border:2px solid #00ff88;
color:#00ff88;
}

.recDanger{
background:rgba(255,0,0,0.1);
border:2px solid red;
color:red;
}

.highlight{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<div id="subtitle">منصة تحليل الرسائل المشبوهة</div>

<div class="langWrapper">
<button class="langBtn" onclick="toggleLang()">EN</button>
</div>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">

<h2 id="threatTitle">حالة التهديد</h2>

<div id="status">—</div>

<div>
<span id="riskText">نسبة الخطورة</span> :
<span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div style="margin-top:15px">

<strong id="typeLabel">نوع التهديد:</strong>

<span id="type">—</span>

</div>

</div>

<div id="rec" class="recommendation recSafe">

بانتظار التحليل

</div>

</div>

<script>

let lang="ar";

const suspiciousWords=[
"verify","account","bank","password","confirm",
"login","click","transfer","crypto","gift",

"تحقق","حساب","بنكي","كلمة المرور",
"تأكيد","الدخول","اضغط","تحويل"
];

/* كشف الروابط */

function detectLinks(text){

let regex=/https?:\/\/[^\s]+/g;

let links=text.match(regex);

if(!links) return 0;

return links.length*30;

}

/* تأخير التحليل 3 ثواني */

let timer;

document.getElementById("msg").addEventListener("input",()=>{

clearTimeout(timer);

timer=setTimeout(analyze,3000);

});

/* تحديد نوع الهجوم */

function detectAttackType(text){

if(text.includes("password")||text.includes("كلمة المرور")){
return lang=="ar"?"سرقة بيانات الدخول":"Credential Harvesting";
}

if(text.includes("http")||text.includes("www")){
return lang=="ar"?"رابط خبيث":"Malicious Link";
}

return lang=="ar"?"تصيد احتيالي":"Phishing";

}

function analyze(){

let text=document.getElementById("msg").value.toLowerCase();

let score=0;

suspiciousWords.forEach(word=>{

if(text.includes(word)){
score+=15;
}

});

score+=detectLinks(text);

if(score>100)score=100;

document.getElementById("score").innerText=score;

document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");
let type=document.getElementById("type");

let attackType=detectAttackType(text);

if(score>=30){

document.body.classList.add("dangerMode");

status.innerText= lang=="ar" ? "⚠️ رسالة مشبوهة" : "⚠️ Suspicious message";

type.innerText=attackType;

rec.className="recommendation recDanger";

rec.innerText= lang=="ar"
? "لا تضغط الروابط ولا ترسل بياناتك."
: "Do not click links or share sensitive data.";

speak(
lang=="ar"
? "الرسالة مشبوهة. نوع الهجوم "+attackType+" . لا تضغط الروابط ولا ترسل بياناتك"
: "The message is suspicious. Attack type "+attackType+" . Do not click links or share sensitive data"
);

}else{

document.body.classList.remove("dangerMode");

status.innerText= lang=="ar" ? "✔️ الرسالة آمنة" : "✔️ Message is safe";

type.innerText="-";

rec.className="recommendation recSafe";

rec.innerText= lang=="ar"
? "لا يوجد تهديد واضح."
: "No clear threat detected.";

speak(
lang=="ar"
? "الرسالة آمنة. لا يوجد تهديد واضح"
: "The message is safe. No threat detected"
);

}

}

/* الصوت */

function speak(text){

speechSynthesis.cancel();

let msg=new SpeechSynthesisUtterance(text);

msg.lang= lang=="ar" ? "ar-SA" : "en-US";

speechSynthesis.speak(msg);

}

/* صوت مربع الإدخال */

document.getElementById("msg").addEventListener("mouseenter",function(){

speak(lang=="ar"?"مربع إدخال الرسالة":"Message input field");

});

/* تغيير اللغة */

function toggleLang(){

let btn=document.querySelector(".langBtn");

if(lang=="ar"){

lang="en";
btn.innerText="AR";

document.getElementById("subtitle").innerText="Suspicious Message Analyzer";
document.getElementById("threatTitle").innerText="Threat Status";
document.getElementById("riskText").innerText="Risk Level";
document.getElementById("typeLabel").innerText="Threat Type";
document.getElementById("msg").placeholder="Paste message here";

}else{

lang="ar";
btn.innerText="EN";

document.getElementById("subtitle").innerText="منصة تحليل الرسائل المشبوهة";
document.getElementById("threatTitle").innerText="حالة التهديد";
document.getElementById("riskText").innerText="نسبة الخطورة";
document.getElementById("typeLabel").innerText="نوع التهديد";
document.getElementById("msg").placeholder="الصق الرسالة هنا";

}

}

/* Matrix */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCONSOC";
const matrix=letters.split("");

const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++){
drops[x]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
