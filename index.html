<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

/* خلفية خفيفة 🔴 */
.alert{
position:fixed;
width:100%;
height:100%;
background:rgba(255,0,0,0.12);
display:none;
z-index:0;
}

.container{
text-align:center;
margin-top:60px;
}

.logo{font-size:60px;}

.lang-btn{
margin-top:10px;
}

textarea{
width:80%;
height:140px;
margin-top:20px;
background:rgba(0,0,0,0.6);
border:2px solid #00f5d4;
border-radius:20px;
color:#00f5d4;
padding:15px;
}

.card{
width:80%;
margin:30px auto;
padding:20px;
border-radius:20px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
}

.bar{
height:8px;
background:red;
width:0%;
transition:0.4s;
}

.btn{
padding:8px 15px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<div id="alert" class="alert"></div>

<div class="container">

<div class="logo">🦅</div>

<div class="lang-btn">
<button class="btn" onclick="toggleLang()" data-voice="lang">EN / AR</button>
</div>

<textarea id="msg" data-voice="input"></textarea>

<div class="card">
<div id="status" data-voice="status">—</div>
<div id="riskText" data-voice="risk">Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type" data-voice="type">Type: —</div>
<div id="mitre" data-voice="mitre">MITRE: —</div>
</div>

<div id="rec" data-voice="rec"></div>

</div>

<script>

let lang="ar";

/* ===== ترجمة ===== */
const t={
ar:{
input:"مربع إدخال النص أو الرابط",
statusSafe:"آمن",
statusDanger:"تهديد",
recDanger:"لا تتفاعل مع الرسالة. أبلغ فريق الأمن السيبراني فوراً",
recSafe:"لا يوجد تهديد واضح",
risk:"نسبة الخطورة",
type:"نوع التهديد",
mitre:"مايتر أتاك",
lang:"زر تغيير اللغة"
},
en:{
input:"Input field for message or link",
statusSafe:"SAFE",
statusDanger:"THREAT",
recDanger:"Do not interact. Report to SOC immediately",
recSafe:"No threat detected",
risk:"Risk",
type:"Type",
mitre:"MITRE ATT&CK",
lang:"Language switch button"
}
};

/* ===== صوت ===== */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang = (lang==="ar")?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

/* ===== Hover لكل العناصر 🔥 ===== */
document.querySelectorAll("[data-voice]").forEach(el=>{
el.addEventListener("mouseover",()=>{
let key = el.getAttribute("data-voice");
if(t[lang][key]){
speak(t[lang][key]);
}
});
});

/* ===== تحليل ===== */
const msg=document.getElementById("msg");

msg.addEventListener("input", analyze);

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

/* كلمات قوية */
["password","otp","verify","bank","تحقق","كلمة المرور"].forEach(w=>{
if(text.includes(w)) score+=25;
});

/* روابط */
if(text.includes("http")||text.includes("bit.ly")) score+=40;

if(score>100) score=100;

/* MITRE */
let type="Safe", mitre="None";

if(text.includes("verify")){type="Phishing"; mitre="T1566";}
if(text.includes("password")){type="Credential Theft"; mitre="T1003";}
if(text.includes("http")){type="Malicious Link"; mitre="T1071";}

/* عرض */
scoreEl.innerText=score;
bar.style.width=score+"%";
typeEl.innerText=t[lang].type+": "+type;
mitreEl.innerText=t[lang].mitre+": "+mitre;

if(score>30){

alert.style.display="block";

status.innerText=t[lang].statusDanger;
rec.innerText=t[lang].recDanger;

speak(t[lang].statusDanger + " " + t[lang].recDanger);

}else{

alert.style.display="none";

status.innerText=t[lang].statusSafe;
rec.innerText=t[lang].recSafe;

speak(t[lang].statusSafe);

}

}

/* عناصر */
const scoreEl=document.getElementById("score");
const bar=document.getElementById("bar");
const typeEl=document.getElementById("type");
const mitreEl=document.getElementById("mitre");
const status=document.getElementById("status");
const rec=document.getElementById("rec");
const alert=document.getElementById("alert");

/* ===== لغة ===== */
function toggleLang(){
lang = (lang==="ar")?"en":"ar";
analyze();
}

</script>

</body>
</html>
