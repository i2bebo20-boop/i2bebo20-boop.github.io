<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:black; /* خلفية سوداء ثابتة */
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

.container{text-align:center;margin-top:70px;}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
}

.bar{
height:10px;
background:red;
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
margin:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<button class="btn" onclick="toggleLang()">EN / AR</button>
<button class="btn" onclick="generatePDF()">REPORT</button>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

let currentLang="ar";
let lastResult="", lastType="", lastRec="", lastMsg="";

/* ===== صوت ===== */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

/* مربع النص */
const msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
speak(currentLang==="ar"?"أدخل الرسالة":"Enter message");
});

/* ===== كلمات مشبوهة ===== */
const suspiciousWords=[
"تحقق من حسابك البنكي","verify your bank account",
"otp","bank","password","bitcoin","http","urgent",
"free money","click here","مجاناً","جائزة","اضغط هنا",
"استثمار","ربح سريع","عرض حصري","winner","lottery"
];

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,2000); // ينتظر ثانيتين بعد الكتابة
});

function analyze(){

let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;

if(text.includes("تحقق من حسابك البنكي")) score+=60;

suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=10;
});

if(text.includes("http")) score+=25;

if(score>100) score=100;

/* نوع الهجوم */
let type="Safe";

if(text.includes("verify")||text.includes("تحقق")) type="Phishing";
else if(text.includes("bank")) type="Data Theft";
else if(text.includes("bitcoin")) type="Financial Scam";
else if(text.includes("http")) type="Malicious Link";

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>30){

if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";
speak("تحذير الرسالة غير آمنة");
lastResult="UNSAFE";
lastRec="Do not click links or share data";
}else{
status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
rec.innerHTML="⚠️ Do not click links or share data";
speak("Warning unsafe message");
lastResult="UNSAFE";
lastRec="Do not click links or share data";
}

}else{

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد";
speak("الرسالة آمنة");
lastResult="SAFE";
lastRec="No threat detected";
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat detected";
speak("Message is safe");
lastResult="SAFE";
lastRec="No threat detected";
}

}

lastType=type;

}

/* ===== اللغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";

msg.placeholder=currentLang==="ar"?"الصق الرسالة هنا":"Paste message here";
}

/* ===== PDF ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

/* خلفية */
doc.setFillColor(0,0,0);
doc.rect(0,0,210,297,"F");

/* لون */
doc.setTextColor(0,255,200);

/* لوقو جديد: 🦅 نسر */
doc.setFontSize(30);
doc.text("🦅",105,30,null,null,"center");

/* عنوان */
doc.setFontSize(18);
doc.text("BlackFalcon SOC",105,45,null,null,"center");

doc.setFontSize(12);
doc.text("Security Report",105,55,null,null,"center");

/* خط */
doc.line(20,65,190,65);

/* محتوى */
doc.setFontSize(11);

doc.text("Message:",20,80);
doc.text(doc.splitTextToSize(lastMsg||"Empty",170),20,90);

doc.text("Result: "+lastResult,20,120);
doc.text("Type: "+lastType,20,130);
doc.text("Risk: "+document.getElementById("score").innerText+"%",20,140);

doc.text("Recommendation:",20,155);
doc.text(doc.splitTextToSize(lastRec,170),20,165);

/* Footer */
doc.text("Generated by BlackFalcon SOC",105,280,null,null,"center");

doc.save("BlackFalcon_Report.pdf");

/* صوت */
speak(currentLang==="ar"?"تم إنشاء التقرير":"Report generated");

}

</script>

</body>
</html>
