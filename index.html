<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:70px;}

.logo{
font-size:60px;
}

.title{
font-size:22px;
margin-bottom:20px;
}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 25px #00f5d433;
}

.bar{
height:10px;
background:#ff0033;
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

.btn{
padding:8px 15px;
margin:10px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="logo">🦅</div>
<div class="title">BlackFalcon SOC</div>

<button class="btn" onclick="generatePDF()">تقرير</button>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div>نسبة الخطورة: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">النوع: —</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

let lastResult="", lastType="", lastRec="", lastMsg="";

/* 🔊 صوت عربي */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang="ar-SA";
speechSynthesis.speak(u);
}

const msg=document.getElementById("msg");

/* كلمات */
const words=[
"تحقق","otp","bank","http","bitcoin","ربح","جائزة","اضغط"
];

/* تحليل */
let timer;
msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;

words.forEach(w=>{
if(text.includes(w)) score+=15;
});

if(text.includes("http")) score+=25;
if(text.includes("تحقق من حسابك البنكي")) score+=40;

if(score>100) score=100;

let type="آمن";

if(text.includes("تحقق")) type="تصيد احتيالي";
else if(text.includes("bank")) type="سرقة بيانات";
else if(text.includes("bitcoin")) type="احتيال مالي";
else if(text.includes("http")) type="رابط ضار";

/* UI */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="النوع: "+type;

if(score>30){
document.getElementById("status").innerHTML="<span class='danger'>⚠️ غير آمن</span>";
document.getElementById("rec").innerText="⚠️ لا تضغط الروابط ولا تشارك بياناتك";

lastResult="UNSAFE";
lastRec="Do NOT click links or share sensitive data";
}else{
document.getElementById("status").innerHTML="<span class='safe'>✔️ آمن</span>";
document.getElementById("rec").innerText="✔️ لا يوجد تهديد";

lastResult="SAFE";
lastRec="No threat detected";
}

lastType=type;

/* 🔊 صوت عربي كامل */
speak("نتيجة التحليل " + (score>30?"غير آمن":"آمن") + ". " + document.getElementById("rec").innerText);

}

/* ===== PDF احترافي ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

/* خلفية */
doc.setFillColor(0,0,0);
doc.rect(0,0,210,297,"F");

/* لون */
doc.setDrawColor(0,255,200);
doc.setTextColor(0,255,200);

/* 🔥 رسم لوقو (بدل الإيموجي) */
doc.circle(105,30,10); // رأس
doc.line(105,40,105,55); // جسم
doc.line(105,45,95,55); // جناح
doc.line(105,45,115,55); // جناح

/* عنوان */
doc.setFontSize(18);
doc.text("BlackFalcon SOC",105,65,null,null,"center");

doc.setFontSize(11);
doc.text("Security Analysis Report",105,75,null,null,"center");

/* خط */
doc.line(20,85,190,85);

/* محتوى */
doc.setFontSize(11);

doc.text("Analyzed Message:",20,100);
doc.text(doc.splitTextToSize(lastMsg||"Empty",170),20,110);

doc.text("Result: "+lastResult,20,140);
doc.text("Threat Type: "+lastType,20,150);
doc.text("Risk Score: "+document.getElementById("score").innerText+"%",20,160);

doc.text("Recommendation:",20,180);
doc.text(doc.splitTextToSize(lastRec,170),20,190);

/* Footer */
doc.text("Generated by BlackFalcon SOC",105,280,null,null,"center");

doc.save("BlackFalcon_Report.pdf");

/* صوت */
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance("Report generated");
u.lang="en-US";
speechSynthesis.speak(u);

}

/* ===== MATRIX ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>

</body>
</html>
