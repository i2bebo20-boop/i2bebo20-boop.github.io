<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<style>

body{
margin:0;
background:black;
color:#00ffd5;
font-family:Arial;
overflow:hidden;
transition:0.5s;
text-align:center;
}

body.danger{
background:#200000;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
margin-top:40px;
}

.langBtn{
margin-top:25px;
padding:10px 25px;
border-radius:20px;
border:1px solid #00ffd5;
background:transparent;
color:#00ffd5;
cursor:pointer;
}

textarea{
width:80%;
height:130px;
margin-top:25px;
background:#000;
border:1px solid #00ffd5;
border-radius:15px;
padding:15px;
color:#00ffd5;
font-size:16px;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
background:#000;
border-radius:20px;
}

.progress{
height:10px;
background:#222;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:red;
}

.recommendation{
margin-top:20px;
padding:15px;
border-radius:15px;
}

.safe{
border:2px solid #00ff88;
color:#00ff88;
}

.dangerRec{
border:2px solid red;
color:red;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 id="title">🦅 BlackFalcon SOC</h1>
<div id="subtitle">منصة تحليل الرسائل المشبوهة</div>

<button class="langBtn" onclick="toggleLang()">EN</button>

<br>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">

<h2 id="threatTitle">حالة التهديد</h2>

<div id="status">—</div>

<div>
<span id="riskText">نسبة الخطورة</span> :
<span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<div id="rec" class="recommendation safe">
بانتظار التحليل
</div>

</div>

<script>

/* اللغة */

let lang="ar";

/* الكلمات المشبوهة */

const suspiciousWords=[

"verify account","bank account","confirm identity","security alert",
"account suspended","click here","gift card","crypto investment",
"bitcoin payment","urgent action","lottery winner","claim prize",
"limited offer","open link","verify identity","password reset",
"update account","payment required","billing problem",
"delivery notice","shipment problem","confirm payment",
"confirm transaction","wire transfer","bank transfer",
"confirm card","card verification","enter card number",
"submit card details","crypto opportunity","forex profit",
"earn money fast","double money","free money","you won",

"تحقق","تحقق من حسابك","تحقق من حسابك البنكي",
"تحديث الحساب","تأكيد الحساب","التحقق من الهوية",
"تم ايقاف الحساب","تم تعليق الحساب",
"تنبيه أمني","تحذير أمني",
"تحويل بنكي","تحويل الأموال",
"بطاقة ائتمان","رقم البطاقة",
"رمز التحقق","كود التحقق",
"اضغط هنا","افتح الرابط",
"الدخول الآن","تسجيل الدخول",
"جائزة","لقد فزت","مبروك",
"استثمار سريع","ربح سريع",
"فرصة استثمار","أرباح مضمونة",
"هدية مجانية","عرض خاص",
"تأكيد الدفع","فشل الدفع",
"طلب استرجاع","استرداد المبلغ",
"تتبع الشحنة","رسوم الشحن",
"إجراء عاجل","آخر تحذير"

];

/* كشف الروابط */

function detectLinks(text){

let regex=/https?:\/\/[^\s]+/g;

let links=text.match(regex);

if(!links) return 0;

return links.length*30;

}

/* تحليل بعد تأخير */

let timer;

document.getElementById("msg").addEventListener("input",()=>{

clearTimeout(timer);

timer=setTimeout(analyze,1500);

});

function analyze(){

let text=document.getElementById("msg").value.toLowerCase();

let score=0;

suspiciousWords.forEach(word=>{

if(text.includes(word)){
score+=15;
}

});

score+=detectLinks(text);

if(score>100)score=100;

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>=30){

document.body.classList.add("danger");

status.innerText= lang=="ar" ? "⚠️ رسالة مشبوهة" : "⚠️ Suspicious message";

rec.className="recommendation dangerRec";

rec.innerText= lang=="ar"
? "لا تضغط الروابط ولا ترسل بياناتك."
: "Do not click links or share your data.";

speak(lang=="ar" ? "الرسالة مشبوهة" : "The message is suspicious");

}else{

document.body.classList.remove("danger");

status.innerText= lang=="ar" ? "✔️ الرسالة آمنة" : "✔️ Message is safe";

rec.className="recommendation safe";

rec.innerText= lang=="ar"
? "لا يوجد تهديد واضح."
: "No clear threat detected.";

speak(lang=="ar" ? "الرسالة آمنة" : "The message is safe");

}

}

/* الصوت */

function speak(text){

speechSynthesis.cancel();

let utter=new SpeechSynthesisUtterance(text);

utter.lang= lang=="ar" ? "ar-SA" : "en-US";

speechSynthesis.speak(utter);

}

/* قراءة أي عنصر */

document.addEventListener("mouseover",function(e){

let t=e.target.innerText||e.target.placeholder;

if(t && t.length<100){
speak(t);
}

});

/* تغيير اللغة */

function toggleLang(){

let btn=document.querySelector(".langBtn");

if(lang=="ar"){

lang="en";
btn.innerText="AR";

document.getElementById("subtitle").innerText="Suspicious Message Analyzer";
document.getElementById("threatTitle").innerText="Threat Status";
document.getElementById("riskText").innerText="Risk Level";
document.getElementById("msg").placeholder="Paste message here";

}else{

lang="ar";
btn.innerText="EN";

document.getElementById("subtitle").innerText="منصة تحليل الرسائل المشبوهة";
document.getElementById("threatTitle").innerText="حالة التهديد";
document.getElementById("riskText").innerText="نسبة الخطورة";
document.getElementById("msg").placeholder="الصق الرسالة هنا";

}

}

/* Matrix */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCONSOC";
const matrix=letters.split("");

const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++){
drops[x]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("danger")?"red":"#00ffd5";

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
