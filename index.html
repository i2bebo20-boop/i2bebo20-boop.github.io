<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:50px;}

.logo{
font-size:70px;
margin-bottom:10px;
}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
}

.card{
width:80%;
margin:20px auto;
padding:20px;
border-radius:20px;
background:rgba(0,0,0,0.6);
}

.progress{
height:10px;
background:#111;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#ff0033;
}

.btn{
padding:8px 15px;
margin:5px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="logo">🦅</div>
<h1 class="speakable">BlackFalcon SOC</h1>

<button class="btn" onclick="toggleLang()">EN / AR</button>
<button class="btn" onclick="generatePDF()">REPORT</button>

<br><br>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">

<div id="status" class="speakable">—</div>

<div>
<span id="riskLabel">نسبة الخطورة:</span>
<span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="mitre">MITRE: —</div>

</div>

<div id="rec" class="safe">بانتظار التحليل</div>

</div>

<script>

let currentLang="ar";
let lastResult="", lastType="", lastRec="";
let lastText="";

/* ===== الصوت ===== */
function speak(text){
if(!text) return;
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(msg);
}

/* قراءة عند المرور */
document.addEventListener("mouseover",e=>{
if(e.target.classList.contains("speakable")){
speak(e.target.innerText);
}
});

/* مربع النص */
const msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
speak(currentLang==="ar"?
"أنت في مربع كتابة الرسالة":
"You are in message input");
});

/* ===== كلمات مشبوهة ===== */
const suspiciousWords=[
"تحقق من حسابك البنكي","verify your bank account",
"otp","رمز التحقق","password","كلمة المرور",
"credit card","بطاقة","bank","بنك",
"click here","اضغط هنا","urgent","عاجل",
"free money","مجاناً","جائزة","winner",
"http","https","bit.ly","tinyurl"
];

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();
lastText=msg.value;

let score=0;

if(text.includes("تحقق من حسابك البنكي")) score+=60;

suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=10;
});

if(text.includes("http")) score+=25;

if(score>100) score=100;

/* نوع الهجوم */
let type="—";

if(text.includes("verify")||text.includes("تحقق")) type="Phishing";
else if(text.includes("bank")) type="Data Theft";
else if(text.includes("bitcoin")) type="Financial Scam";
else if(text.includes("http")) type="Malicious Link";

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("mitre").innerText="MITRE: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>30){

status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";

lastResult="غير آمن";
lastRec="لا تضغط الروابط ولا تشارك بياناتك";

speak("تحذير الرسالة غير آمنة");

}else{

status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد واضح";

lastResult="آمن";
lastRec="لا يوجد تهديد واضح";

speak("الرسالة آمنة");
}

lastType=type;

}

/* ===== اللغة ===== */
function toggleLang(){

currentLang=currentLang==="ar"?"en":"ar";

if(currentLang==="en"){
document.getElementById("riskLabel").innerText="Risk:";
msg.placeholder="Paste message here";
}else{
document.getElementById("riskLabel").innerText="نسبة الخطورة:";
msg.placeholder="الصق الرسالة هنا";
}

}

/* ===== PDF احترافي ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

/* لوقو */
doc.setFontSize(40);
doc.text("🦅",105,30,null,null,"center");

/* اسم المشروع */
doc.setFontSize(18);
doc.text("BlackFalcon SOC",105,45,null,null,"center");

/* خط فاصل */
doc.line(20,50,190,50);

/* النص */
doc.setFontSize(12);
doc.text("النص المدخل:",20,65);
doc.text(lastText || "-",20,75);

/* النتائج */
doc.text("النتيجة: "+lastResult,20,100);
doc.text("نوع التهديد: "+lastType,20,110);
doc.text("التوصية: "+lastRec,20,120);

doc.save("BlackFalcon_Report.pdf");

}

/* ===== Matrix ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>
</body>
</html>
