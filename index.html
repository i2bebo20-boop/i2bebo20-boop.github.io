<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<!-- عنوان الصفحة -->
<title>BlackFalcon SOC</title>

<!-- خط احترافي -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* متغيرات الألوان */
:root{ 
--neon-green:#00ffcc;  /* اللون الأساسي */
--danger-red:#ff0033;  /* لون الخطر */
}

/* تصميم الصفحة */
body{
margin:0;
background:black;
color:var(--neon-green);
font-family:'Orbitron',sans-serif;
overflow-x:hidden;
transition:0.4s;
}

/* خلفية الماتريكس */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* الحاوية الرئيسية */
.container{
text-align:center;
margin-top:40px;
padding-bottom:50px;
}

/* العنوان */
h1{
font-size:35px;
text-shadow:0 0 15px var(--neon-green);
}

/* مربع الإدخال */
textarea{ 
width:85%;
height:130px;
background:rgba(0,0,0,0.7); 
border:2px solid var(--neon-green);
border-radius:15px;
padding:20px;
color:var(--neon-green);
box-shadow:0 0 10px var(--neon-green);
font-size:18px;
}

/* صندوق النتائج */
.card{
width:80%;
margin:25px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.8);
box-shadow:0 0 20px var(--neon-green);
}

/* شريط النسبة */
.bar-container{
width:100%;
height:10px;
background:#222;
border-radius:10px;
margin:15px 0;
}

.bar{
height:100%;
background:var(--neon-green);
width:0%;
transition:0.8s;
}

/* لون الخطر */
.danger-bar{ background:var(--danger-red); }
.danger-text{ color:var(--danger-red); }

</style>
</head>

<body>

<!-- خلفية الماتريكس -->
<canvas id="matrix"></canvas>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<!-- زر تغيير اللغة -->
<button onclick="toggleLang()">EN / AR</button>

<!-- مربع الإدخال -->
<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<!-- صندوق النتائج -->
<div class="card">

<div id="statusLabel">Threat Status: CLEAN</div>

<div>
Risk: <span id="score">0</span>%
</div>

<div class="bar-container">
<div class="bar" id="bar"></div>
</div>

<!-- معلومات الهجوم -->
<div id="mitreDiv" style="display:none;">MITRE: T1566 - Phishing</div>

</div>

</div>

<script>

/* اللغة الحالية */
let currentLang = "ar";

/* لون الماتريكس */
let matrixColor = "#00ffcc";

/* عنصر الإدخال */
const msgInput = document.getElementById("msg");

/* =========================
   🔥 قائمة الكلمات (كلها هنا)
   ========================= */

const bigWordList = `

$$$ €€€ جنيه إسترليني خصم 50% بضعة شلنات نقبل الدفع النقدي عبر البطاقات
نقبل بطاقات الائتمان بسعر معقول عرض مناسب تجنب الإفلاس سوء الائتمان بنك
الإفلاس مساومة الفواتير مليار مليار دولار ملياردير البطاقة مقبولة كاش
كازينو شيك حوالة بريدية ائتمان دين قرض استثمار تأمين
اربح اربح من المنزل دخل إضافي دخل سهل مجاني مجاناً عرض مجاني
loan credit card bank account billing invoice payment required
free win winner cash bonus offer deal limited
click here act now apply now buy now subscribe
exclusive guarantee 100% risk free no obligation
verify account update account reset password security alert
login now confirm identity phishing hack breach malware
virus trojan ransomware casino bet gambling jackpot lottery prize

`;

/* تحويل النص إلى مصفوفة كلمات */
const keys = bigWordList.toLowerCase().split(/\s+/);

/* =========================
   🎤 الصوت
   ========================= */
function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = currentLang === "ar" ? "ar-SA" : "en-US";
speechSynthesis.speak(u);
}

/* عند الكتابة يبدأ التحليل */
msgInput.addEventListener("input", startAnalysis);

/* =========================
   🧠 تحليل النص
   ========================= */
function startAnalysis(){

let text = msgInput.value.toLowerCase();

/* نسبة الخطورة */
let score = 0;

/* مقارنة النص بالكلمات */
keys.forEach(k=>{
if(text.includes(k)){
score += 2; /* كل كلمة ترفع الخطورة */
}
});

/* حد أقصى */
if(score > 100) score = 100;

/* تحديث الواجهة */
updateUI(score);

}

/* =========================
   📊 تحديث النتائج
   ========================= */
function updateUI(score){

const bar = document.getElementById("bar");
const status = document.getElementById("statusLabel");

document.getElementById("score").innerText = score;
bar.style.width = score+"%";

/* إذا خطر */
if(score > 30){

matrixColor = "#ff0033";

bar.classList.add("danger-bar");
status.classList.add("danger-text");

status.innerText = currentLang === "ar" ? "غير آمن" : "UNSAFE";

document.getElementById("mitreDiv").style.display="block";

/* صوت تحذير */
speak(currentLang==="ar"?"تحذير خطر":"Warning danger");

}

/* إذا آمن */
else{

matrixColor = "#00ffcc";

bar.classList.remove("danger-bar");
status.classList.remove("danger-text");

status.innerText = currentLang === "ar" ? "آمن" : "SAFE";

document.getElementById("mitreDiv").style.display="none";

}

}

/* =========================
   🌐 تغيير اللغة
   ========================= */
function toggleLang(){

currentLang = currentLang === "ar" ? "en" : "ar";

speak(currentLang==="ar"?"تم تغيير اللغة":"Language changed");

}

/* =========================
   💻 الماتريكس
   ========================= */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const drops = Array(Math.floor(canvas.width/14)).fill(1);

/* رسم الخلفية */
function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=matrixColor;
ctx.font="14px monospace";

drops.forEach((y,i)=>{
const text=Math.floor(Math.random()*2);
ctx.fillText(text,i*14,y*14);

if(y*14>canvas.height) drops[i]=0;

drops[i]++;
});

}

setInterval(draw,33);

</script>

</body>
</html>
