<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
    --neon-green:#00ffcc;
    --danger-red:#ff0033;
}
body{
    margin:0;
    background:black;
    color:var(--neon-green);
    font-family:'Orbitron',sans-serif;
    overflow-x:hidden;
    transition:0.4s;
}
canvas{
    position:fixed;
    top:0; left:0;
    z-index:-1;
}
.container{
    text-align:center;
    margin-top:40px;
    padding-bottom: 50px;
}
h1{
    font-size:35px;
    text-shadow:0 0 15px var(--neon-green);
    margin-bottom: 5px;
}
.sub-title {
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 20px;
}
textarea{
    width:85%;
    height:150px;
    background:rgba(0,0,0,0.6);
    border:2px solid var(--neon-green);
    border-radius:15px;
    padding:15px;
    color:var(--neon-green);
    box-shadow:0 0 15px var(--neon-green);
    font-family: sans-serif;
    font-size: 16px;
}
.card{
    width:85%;
    margin:25px auto;
    padding:20px;
    border-radius:15px;
    background:rgba(0,0,0,0.8);
    text-align: left;
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
}
.status-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
.risk-text { margin: 10px 0; font-size: 18px; }
.bar-container {
    width: 100%;
    height: 12px;
    background: #222;
    border-radius: 10px;
    margin: 15px 0;
    overflow: hidden;
}
.bar{
    height:100%;
    background:var(--neon-green);
    width:0%;
    transition:0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.mitre-mini {
    margin-top: 15px;
    font-size: 16px;
    display: none;
}
.incident-id {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
    display: none;
}
.recommendation-box {
    width: 85%;
    margin: 20px auto;
    padding: 15px;
    border: 1px solid var(--danger-red);
    border-radius: 10px;
    background: rgba(255, 0, 51, 0.1);
    color: white;
    font-size: 14px;
    display: none;
    text-align: left;
}
button{
    padding:8px 20px;
    border:1px solid var(--neon-green);
    background:transparent;
    color:var(--neon-green);
    cursor:pointer;
    border-radius:20px;
    font-family: 'Orbitron';
}
/* Danger Mode Styles */
.danger-mode { color: var(--danger-red); }
.danger-mode h1 { text-shadow: 0 0 15px var(--danger-red); }
.danger-mode textarea { border-color: var(--danger-red); box-shadow: 0 0 15px var(--danger-red); color: white; }
.danger-mode .card { box-shadow: 0 0 20px rgba(255, 0, 51, 0.3); }
.danger-mode .bar { background: var(--danger-red); }
.danger-mode button { border-color: var(--danger-red); color: var(--danger-red); }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>🦅 BlackFalcon SOC</h1>
    <div class="sub-title">Advanced Security Operations Platform</div>

    <div style="margin-bottom: 20px;">
        <button onclick="toggleLang()">🌍 Language</button>
        <button onclick="exportReport()">Export Report</button>
    </div>

    <textarea id="msg" placeholder="تحقق من حسابك..."></textarea>

    <div class="card" id="mainCard">
        <div class="status-title">Threat Status</div>
        <div id="riskLevel" class="risk-text">CLEAN</div>
        <div class="risk-text">Risk Score: <span id="score">0</span>%</div>
        
        <div class="bar-container">
            <div class="bar" id="bar"></div>
        </div>

        <div id="mitreLabel" class="mitre-mini">MITRE: T1566 - Phishing</div>
        <div id="incidentLabel" class="incident-id">Incident ID: INC-943219</div>
    </div>

    <div id="recBox" class="recommendation-box">
        ⚠️ <strong>Recommendation:</strong> Do NOT click any links. Block sender and report immediately.
    </div>
</div>

<script>
// الكلمات المفتاحية للتحليل (نفس القائمة التي وفرتها سابقاً)
const highKeywords = ["تحقق من حسابك","password","otp","bank","crypto","كلمة المرور","تحقق","verify","account suspended","login"]; 

let currentLang = "ar";
const msgInput = document.getElementById("msg");

msgInput.addEventListener("input", () => {
    let text = msgInput.value.toLowerCase();
    let score = 0;

    highKeywords.forEach(w => {
        if(text.includes(w.toLowerCase())) score += 25;
    });

    if(score > 100) score = 100;

    updateUI(score);
});

function updateUI(score) {
    const bar = document.getElementById("bar");
    const scoreText = document.getElementById("score");
    const riskLevel = document.getElementById("riskLevel");
    const mitre = document.getElementById("mitreLabel");
    const incident = document.getElementById("incidentLabel");
    const recBox = document.getElementById("recBox");
    const body = document.body;

    scoreText.innerText = score;
    bar.style.width = score + "%";

    if(score > 30) {
        body.classList.add("danger-mode");
        riskLevel.innerText = "HIGH RISK";
        mitre.style.display = "block";
        incident.style.display = "block";
        recBox.style.display = "block";
        matrixColor = "#ff0033";
    } else {
        body.classList.remove("danger-mode");
        riskLevel.innerText = "CLEAN";
        mitre.style.display = "none";
        incident.style.display = "none";
        recBox.style.display = "none";
        matrixColor = "#00ffcc";
    }
}

// Matrix Animation
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);
let matrixColor = "#00ffcc";

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = matrixColor;
    ctx.font = fontSize + "px monospace";
    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(draw, 33);

function toggleLang() { alert("Language switched"); }
function exportReport() { alert("Report Exported"); }
</script>

</body>
</html>
