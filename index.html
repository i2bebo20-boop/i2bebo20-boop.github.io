<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--neon-green:#00ffcc;
--danger-red:#ff0033;
}

body{
margin:0;
background:black;
color:var(--neon-green);
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.4s;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
text-align:center;
margin-top:60px;
}

h1{
font-size:40px;
text-shadow:0 0 15px var(--neon-green);
}

.lang-btn{
margin-top:10px;
}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.7);
border:1px solid var(--neon-green);
border-radius:20px;
padding:20px;
color:var(--neon-green);
margin-top:20px;
box-shadow:0 0 10px var(--neon-green);
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.7);
box-shadow:0 0 20px var(--neon-green);
}

.bar{
height:10px;
background:var(--neon-green);
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:var(--danger-red);}

button{
padding:8px 15px;
border:1px solid var(--neon-green);
background:transparent;
color:var(--neon-green);
cursor:pointer;
border-radius:10px;
}

/* 🔴 وضع الخطر */
.danger-mode{
color:var(--danger-red);
}

.danger-mode textarea,
.danger-mode .card,
.danger-mode button{
border-color:var(--danger-red);
box-shadow:0 0 15px var(--danger-red);
}

.danger-mode .bar{
background:var(--danger-red);
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<div class="lang-btn">
<button id="langBtn" onclick="toggleLang()">AR / EN</button>
</div>

<textarea id="msg"></textarea>

<div class="card">
<div id="status">—</div>
<div id="riskLabel">Risk</div>
<div><span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec"></div>

</div>

<script>

let currentLang="ar";

/* 🔊 صوت مع تأخير */
let speakTimer;
function speak(text){
clearTimeout(speakTimer);
speakTimer=setTimeout(()=>{
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang=currentLang==="ar"?"ar-SA":"en-US";
u.rate=0.9;
speechSynthesis.speak(u);
},1200);
}

/* 🚨 إنذار */
function alarm(){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
osc.type="square";
osc.frequency.setValueAtTime(700,ctx.currentTime);
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),200);
}

/* 🌐 لغة */
const lang={
ar:{
placeholder:"الصق الرسالة هنا",
risk:"درجة الخطر",
safe:"✔️ آمن",
danger:"⚠️ تهديد",
recSafe:"لا يوجد تهديد",
recDanger:"لا تتفاعل مع الرسالة"
},
en:{
placeholder:"Paste message",
risk:"Risk",
safe:"✔️ SAFE",
danger:"⚠️ THREAT",
recSafe:"No threat detected",
recDanger:"Do not interact"
}
};

/* 👆 صوت عند الضغط */
let msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
speak(currentLang==="ar"?
"أنت الآن في مربع إدخال النص":
"You are now in the text input field");
});

/* 🖱️ Hover ذكي */
document.addEventListener("mouseenter",(e)=>{
let el=e.target;

if(el.id==="msg") speak(currentLang==="ar"?"مربع إدخال النص":"Text input");
if(el.id==="langBtn") speak(currentLang==="ar"?"زر تغيير اللغة":"Language button");

},true);

/* تحليل */
const high=["password","otp","bank","crypto","كلمة المرور"];
const medium=["http","bit.ly","click","urgent","اضغط"];

msg.addEventListener("input",analyze);

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

high.forEach(w=>{ if(text.includes(w)) score+=25; });
medium.forEach(w=>{ if(text.includes(w)) score+=15; });

if(score>100) score=100;

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>30){

document.body.classList.add("danger-mode");

status.innerHTML="<span class='danger'>"+lang[currentLang].danger+"</span>";
rec.innerText=lang[currentLang].recDanger;

alarm();
speak(lang[currentLang].danger);

}else{

document.body.classList.remove("danger-mode");

status.innerHTML="<span class='safe'>"+lang[currentLang].safe+"</span>";
rec.innerText=lang[currentLang].recSafe;

speak(lang[currentLang].safe);

}

}

/* تغيير اللغة */
function toggleLang(){

currentLang=currentLang==="ar"?"en":"ar";

msg.placeholder=lang[currentLang].placeholder;
document.getElementById("riskLabel").innerText=lang[currentLang].risk;

speak(currentLang==="ar"?"تم تغيير اللغة":"Language changed");

}

/* 🟢 MATRIX احترافي */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];
for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ffcc";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;
}

}

setInterval(draw,33);

</script>

</body>
</html>
