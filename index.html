<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--neon-green:#00ffcc;
--danger-red:#ff0033;
}
body{
margin:0;
background:black;
color:var(--neon-green);
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.4s;
}
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}
.container{
text-align:center;
margin-top:60px;
}
h1{
font-size:40px;
text-shadow:0 0 15px var(--neon-green);
}
.lang-btn{
margin-top:10px;
}
textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.7);
border:1px solid var(--neon-green);
border-radius:20px;
padding:20px;
color:var(--neon-green);
margin-top:20px;
box-shadow:0 0 10px var(--neon-green);
}
.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.7);
box-shadow:0 0 20px var(--neon-green);
}
.bar{
height:10px;
background:var(--neon-green);
width:0%;
transition:0.4s;
}
.safe{color:#00ff88;}
.danger{color:var(--danger-red);}
button{
padding:8px 15px;
border:1px solid var(--neon-green);
background:transparent;
color:var(--neon-green);
cursor:pointer;
border-radius:10px;
}
.danger-mode{
color:var(--danger-red);
}
.danger-mode textarea,
.danger-mode .card,
.danger-mode button{
border-color:var(--danger-red);
box-shadow:0 0 15px var(--danger-red);
}
.danger-mode .bar{
background:var(--danger-red);
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>🦅 BlackFalcon SOC</h1>

<div class="lang-btn">
<button id="langBtn" onclick="toggleLang()">AR / EN</button>
</div>

<textarea id="msg" placeholder="الصق الرسالة هنا"></textarea>

<div class="card">
<div id="status">—</div>
<div id="riskLabel">درجة الخطر</div>
<div><span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
<div id="mitre">MITRE: —</div>
</div>

<div id="rec"></div>

</div>

<script>

let currentLang = "ar";
let speakTimer;
let analyzeTimer;
let audioEnabled = false;

function speak(text){
    if(!audioEnabled) return;
    clearTimeout(speakTimer);
    speakTimer = setTimeout(() => {
        speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(text);
        u.lang = currentLang === "ar" ? "ar-SA" : "en-US";
        u.rate = 0.9;
        speechSynthesis.speak(u);
    }, 600);
}

let msg = document.getElementById("msg");

msg.addEventListener("focus", () => {
    if(!audioEnabled){
        audioEnabled = true;
        let unlock = new SpeechSynthesisUtterance(" ");
        unlock.volume = 0;
        speechSynthesis.speak(unlock);
    }
    speak(currentLang==="ar"?"أنت الآن في مربع إدخال النص":"You are now in the text input field");
});

// 🧠 تحليل فعلي (pattern + behavior + context)
msg.addEventListener("input", () => {
    clearTimeout(analyzeTimer);
    analyzeTimer = setTimeout(analyze, 1000);
});

function analyze(){
    let text = msg.value.toLowerCase();
    let score = 0;
    let indicators = [];

    // 🔍 اكتشاف روابط مشبوهة
    if(text.match(/http|bit\.ly|tinyurl|t\.co/)){
        score += 20;
        indicators.push("link");
    }

    // 🔍 كلمات حساسة
    if(text.match(/password|otp|verify|login|كلمة المرور|رمز/)){
        score += 25;
        indicators.push("credential");
    }

    // 🔍 ضغط واستعجال
    if(text.match(/urgent|immediately|now|حالاً|فوراً/)){
        score += 15;
        indicators.push("urgency");
    }

    // 🔍 فلوس / بنك
    if(text.match(/bank|iban|credit|visa|paypal|بنك|بطاقة/)){
        score += 25;
        indicators.push("financial");
    }

    // 🔍 جوائز وهمية
    if(text.match(/winner|prize|gift|free|ربحت/)){
        score += 20;
        indicators.push("scam");
    }

    // 🔍 انتحال
    if(text.match(/absher|nafath|dhl|aramex|apple|google|حكومي/)){
        score += 20;
        indicators.push("impersonation");
    }

    // 🎯 تحليل ذكي بالسياق
    if(indicators.includes("link") && indicators.includes("credential")){
        score += 20;
    }

    if(score > 100) score = 100;

    // 🎯 تحديد نوع الهجوم
    let type = "—";
    let mitre = "—";

    if(indicators.includes("financial")){
        type = currentLang==="ar"?"احتيال مالي":"Financial Phishing";
        mitre = "TA0001 → Initial Access | T1566.002 Phishing Link → T1056 Credential Harvesting";
    }
    else if(indicators.includes("credential")){
        type = currentLang==="ar"?"سرقة بيانات":"Credential Theft";
        mitre = "TA0006 → Credential Access | T1110 Brute Force / T1556 Modify Auth";
    }
    else if(indicators.includes("impersonation")){
        type = currentLang==="ar"?"انتحال جهة":"Impersonation Attack";
        mitre = "TA0001 Initial Access | T1585 Establish Accounts";
    }
    else if(indicators.includes("scam")){
        type = currentLang==="ar"?"احتيال":"Scam";
        mitre = "TA0001 | T1566 Phishing";
    }

    document.getElementById("score").innerText = score;
    document.getElementById("bar").style.width = score + "%";
    document.getElementById("type").innerText = "Type: " + type;
    document.getElementById("mitre").innerText = "MITRE: " + mitre;

    let status = document.getElementById("status");
    let rec = document.getElementById("rec");

    if(score > 30){
        document.body.classList.add("danger-mode");
        status.innerText = currentLang==="ar"?"غير آمن":"UNSAFE";
        rec.innerText = currentLang==="ar"?
        "لا تضغط الروابط ولا تدخل بياناتك":
        "Do not click links or enter data";
        matrixColor = "#ff0033";
    } else {
        document.body.classList.remove("danger-mode");
        status.innerText = currentLang==="ar"?"آمن":"SAFE";
        rec.innerText = currentLang==="ar"?
        "لا يوجد تهديد واضح":
        "No clear threat";
        matrixColor = "#00ffcc";
    }

    if(audioEnabled){
        setTimeout(readFullResult, 500);
    }
}

// 🔊 صوت ذكي شامل
function readFullResult(){
    let score = document.getElementById("score").innerText;
    let type = document.getElementById("type").innerText;
    let rec = document.getElementById("rec").innerText;

    let text;

    if(currentLang==="ar"){
        text = `النتيجة ${score} بالمئة. ${type}. ${rec}`;
    } else {
        text = `Risk is ${score} percent. ${type}. ${rec}`;
    }

    speak(text);
}

// 🌐 لغة
function toggleLang(){
    currentLang = currentLang === "ar" ? "en" : "ar";
    msg.placeholder = currentLang==="ar"?"الصق الرسالة هنا":"Paste message";
    document.getElementById("riskLabel").innerText = currentLang==="ar"?"درجة الخطر":"Risk";
    speak(currentLang==="ar"?"تم تغيير اللغة":"Language changed");
}

// 🟢 MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for(let i=0; i<columns; i++){ drops[i] = 1; }

let matrixColor = "#00ffcc";

function draw(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = matrixColor;
    ctx.font = fontSize + "px monospace";

    for(let i=0; i<drops.length; i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }
        drops[i]++;
    }
}

setInterval(draw, 33);

</script>

</body>
</html>
