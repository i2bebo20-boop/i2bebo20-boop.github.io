<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--neon-green:#00ffcc;
--danger-red:#ff0033;
}
body{
margin:0;
background:black;
color:var(--neon-green);
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.4s;
}
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}
.container{
text-align:center;
margin-top:60px;
}
h1{
font-size:40px;
text-shadow:0 0 15px var(--neon-green);
}
.lang-btn{
margin-top:10px;
}
textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.7);
border:1px solid var(--neon-green);
border-radius:20px;
padding:20px;
color:var(--neon-green);
margin-top:20px;
box-shadow:0 0 10px var(--neon-green);
}
.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.7);
box-shadow:0 0 20px var(--neon-green);
}
.bar{
height:10px;
background:var(--neon-green);
width:0%;
transition:0.4s;
}
.safe{color:#00ff88;}
.danger{color:var(--danger-red);}
button{
padding:8px 15px;
border:1px solid var(--neon-green);
background:transparent;
color:var(--neon-green);
cursor:pointer;
border-radius:10px;
}
.danger-mode{
color:var(--danger-red);
}
.danger-mode textarea,
.danger-mode .card,
.danger-mode button{
border-color:var(--danger-red);
box-shadow:0 0 15px var(--danger-red);
}
.danger-mode .bar{
background:var(--danger-red);
}
table{
color:var(--neon-green);
width:100%;
border-collapse:collapse;
}
th, td{
padding:5px;
border-bottom:1px solid var(--neon-green);
text-align:left;
}
</style>
</head>

</div>

let audioEnabled = false;

function speak(text){
    if(!audioEnabled) return;
    clearTimeout(speakTimer);
    speakTimer = setTimeout(() => {
        speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(text);
        u.lang = currentLang === "ar" ? "ar-SA" : "en-US";
        u.rate = 0.9;
        speechSynthesis.speak(u);
    }, 600);
}

let msg = document.getElementById("msg");

msg.addEventListener("focus", () => {
    if(!audioEnabled){
        audioEnabled = true;
        let unlock = new SpeechSynthesisUtterance(" ");
        unlock.volume = 0;
        speechSynthesis.speak(unlock);
    }
    speak(currentLang==="ar"?"أنت الآن في مربع إدخال النص":"You are now in the text input field");
});

const medium = ["http","https","bit.ly","click","urgent","login","account","اضغط"];

msg.addEventListener("input", () => {
    clearTimeout(analyzeTimer);
    analyzeTimer = setTimeout(analyze, 1000);
});

function analyze(){
    let text = msg.value.toLowerCase();
    let score = 0;

    high.forEach(w=>{ if(text.includes(w.toLowerCase())) score += 10; }); 
    medium.forEach(w=>{ if(text.includes(w.toLowerCase())) score += 15; });

    if(score>100) score=100;

    document.getElementById("score").innerText = score;
    document.getElementById("bar").style.width=score+"%";

    let status=document.getElementById("status");
    let rec=document.getElementById("rec");
    const mitreSection = document.getElementById("mitreSection");
    const mitreTableBody = document.querySelector("#mitreTable tbody");

    if(score>30){
        document.body.classList.add("danger-mode");
        status.innerText = currentLang==="ar"?"غير آمن":"UNSAFE";
        rec.innerText = currentLang==="ar"?"لا تضغط الروابط ولا تدخل بياناتك":"Do not click links or enter data";
        matrixColor="#ff0033";
        mitreSection.style.display="block";
    } else {
        document.body.classList.remove("danger-mode");
        status.innerText = currentLang==="ar"?"آمن":"SAFE";
        rec.innerText = currentLang==="ar"?"لا يوجد تهديد واضح":"No clear threat";
        matrixColor="#00ffcc";
        mitreSection.style.display="none";
    }

    // MITRE ATT&CK Table
    mitreTableBody.innerHTML="";
    if(score>30){
        const techniques = [
            {name:"Phishing",desc:"رسائل مزيفة تحاول خداع المستخدم لإدخال بياناته الشخصية أو المالية.",detect:"مراقبة الروابط المشبوهة، التدريب على التوعية الأمنية."},
            {name:"Spear Phishing",desc:"هجمات تصيد موجهة تستهدف أشخاص محددين بمعلومات دقيقة لجعل الرسائل مقنعة.",detect:"تحليل سلوك البريد الإلكتروني، تفعيل مصادقة متعددة العوامل."},
            {name:"Credential Access",desc:"محاولة سرقة بيانات الدخول مثل كلمات المرور والـOTP.",detect:"مراقبة محاولات الدخول غير العادية، استخدام كلمات مرور قوية ومحدثة."},
            {name:"Malicious Links",desc:"روابط تؤدي لمواقع احتيالية أو تحميل برامج ضارة.",detect:"فحص الروابط قبل الضغط، استخدام فلترة URL."}
        ];

        techniques.forEach(t=>{
            const row = document.createElement("tr");
            row.innerHTML = `<td>${t.name}</td><td>${t.desc}</td><td>${t.detect}</td>`;
            mitreTableBody.appendChild(row);
        });
    }

    if(audioEnabled){ setTimeout(readFullResult,500); }
}

function readFullResult(){
    let score=document.getElementById("score").innerText;
    let rec=document.getElementById("rec").innerText;
    let resultText=score>30?(currentLang==="ar"?"غير آمن":"UNSAFE"):(currentLang==="ar"?"آمن":"SAFE");
    speak(`${resultText}. ${rec}`);
}

function toggleLang(){
    currentLang = currentLang==="ar"?"en":"ar";
    msg.placeholder=currentLang==="ar"?"الصق الرسالة هنا":"Paste message";
    document.getElementById("riskLabel").innerText=currentLang==="ar"?"درجة الخطر":"Risk";
    speak(currentLang==="ar"?"تم تغيير اللغة":"Language changed");
}

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

let matrixColor="#00ffcc";

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle=matrixColor;
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
            drops[i]=0;
        }
        drops[i]++;
    }
}

setInterval(draw,33);

</script>
