<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:60px;}

.logo svg{
width:90px;
fill:#00f5d4;
}

.title{
font-size:22px;
margin:10px 0;
}

/* أزرار */
.top-buttons{
margin-bottom:20px;
}

.btn{
padding:10px 18px;
margin:5px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
border-radius:10px;
transition:0.3s;
}

.btn:hover{
background:#00f5d4;
color:black;
}

/* الإدخال */
textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
}

/* كرت */
.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:20px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 25px #00f5d433;
}

.bar{
height:10px;
background:#ff0033;
width:0%;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff0033;}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<!-- 🦅 لوقو نسر -->
<div class="logo">
<svg viewBox="0 0 64 64">
<path d="M32 2 L42 22 L62 24 L46 38 L50 58 L32 48 L14 58 L18 38 L2 24 L22 22 Z"/>
</svg>
</div>

<div class="title">BlackFalcon SOC</div>

<div class="top-buttons">
<button class="btn" onclick="toggleLang()">EN / AR</button>
<button class="btn" onclick="generatePDF()">REPORT</button>
</div>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div><span id="riskText">نسبة الخطورة:</span> <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">—</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

let lang="ar";
let lastResult="", lastType="", lastRec="", lastMsg="";

/* صوت */
function speak(text){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang = lang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(u);
}

const msg=document.getElementById("msg");

/* تحليل */
let timer;
msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;

const words=["verify","otp","bank","http","bitcoin","جائزة","تحقق","اضغط"];

words.forEach(w=>{
if(text.includes(w)) score+=15;
});

if(text.includes("http")) score+=25;
if(text.includes("تحقق من حسابك البنكي")) score+=40;

if(score>100) score=100;

let type="Safe";

if(text.includes("verify")||text.includes("تحقق")) type="Phishing";
else if(text.includes("bank")) type="Data Theft";
else if(text.includes("bitcoin")) type="Financial Scam";
else if(text.includes("http")) type="Malicious Link";

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText = (lang==="ar"?"النوع: ":"Type: ")+type;

if(score>30){
document.getElementById("status").innerHTML="<span class='danger'>⚠️ "+(lang==="ar"?"غير آمن":"UNSAFE")+"</span>";
lastResult="UNSAFE";
lastRec="Do NOT click links or share sensitive data";
}else{
document.getElementById("status").innerHTML="<span class='safe'>✔️ "+(lang==="ar"?"آمن":"SAFE")+"</span>";
lastResult="SAFE";
lastRec="No threat detected";
}

document.getElementById("rec").innerText = lang==="ar"
? (score>30?"⚠️ لا تضغط الروابط":"✔️ لا يوجد تهديد")
: lastRec;

lastType=type;

/* صوت */
if(lang==="ar"){
speak("نتيجة التحليل " + (score>30?"غير آمن":"آمن"));
}else{
speak("Result " + lastResult);
}

}

/* تبديل اللغة */
function toggleLang(){
lang = lang==="ar"?"en":"ar";

msg.placeholder = lang==="ar"?"الصق الرسالة هنا":"Paste message here";
document.getElementById("riskText").innerText = lang==="ar"?"نسبة الخطورة:":"Risk Score:";
}

/* PDF */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFillColor(0,0,0);
doc.rect(0,0,210,297,"F");

doc.setTextColor(0,255,200);

/* لوقو نسر */
doc.setDrawColor(0,255,200);
doc.triangle(105,25,95,45,115,45,"S");

/* عنوان */
doc.setFontSize(18);
doc.text("BlackFalcon SOC",105,60,null,null,"center");

doc.setFontSize(12);
doc.text("Security Report",105,70,null,null,"center");

doc.line(20,80,190,80);

/* محتوى */
doc.setFontSize(11);

doc.text("Message:",20,100);
doc.text(doc.splitTextToSize(lastMsg||"Empty",170),20,110);

doc.text("Result: "+lastResult,20,140);
doc.text("Type: "+lastType,20,150);
doc.text("Risk: "+document.getElementById("score").innerText+"%",20,160);

doc.text("Recommendation:",20,180);
doc.text(doc.splitTextToSize(lastRec,170),20,190);

doc.save("BlackFalcon_Report.pdf");

/* صوت */
let u=new SpeechSynthesisUtterance("Report generated");
u.lang="en-US";
speechSynthesis.speak(u);

}

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}
}

setInterval(draw,35);

</script>

</body>
</html>
