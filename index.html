<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:#00f5d4;
font-family:'Orbitron',sans-serif;
overflow:hidden;
transition:0.5s;
}

body.dangerMode{
background:#140000;
box-shadow:inset 0 0 300px red;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.langBtn{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
padding:8px 20px;
border-radius:20px;
border:1px solid #00f5d4;
background:transparent;
color:#00f5d4;
cursor:pointer;
}

.container{
text-align:center;
margin-top:80px;
}

textarea{
width:80%;
height:130px;
background:rgba(0,0,0,0.6);
border:1px solid #00f5d4;
border-radius:20px;
padding:20px;
color:#00f5d4;
font-size:16px;
outline:none;
}

.card{
width:80%;
margin:30px auto;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.6);
box-shadow:0 0 30px #00f5d422;
text-align:left;
}

.progress{
height:10px;
background:#111;
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:red;
transition:0.4s;
}

.recSafe{color:#00ff88;}
.recDanger{color:red;}
</style>
</head>

<body>

<button class="langBtn speakable" onclick="toggleLang()">EN</button>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="speakable">🦅 BlackFalcon SOC</h1>
<div class="speakable" id="subtitle">منصة تحليل الرسائل المشبوهة</div>

<textarea id="msg" class="speakable" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">

<h2 class="speakable" id="threatTitle">حالة التهديد</h2>

<div id="status" class="speakable">—</div>

<div class="speakable">
<span id="riskLabel">نسبة الخطورة:</span>
<span id="score">0</span>%
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="mitre" class="speakable">MITRE: —</div>

</div>

<div id="rec" class="speakable recSafe">
✔️ بانتظار التحليل
</div>

</div>

<script>

/* ===== اللغة ===== */
let currentLang="ar";

/* ===== الصوت ===== */
function speak(text){
if(!text) return;
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.lang=currentLang==="ar"?"ar-SA":"en-US";
speechSynthesis.speak(msg);
}

/* قراءة أي عنصر */
document.addEventListener("mouseover",e=>{
if(e.target.classList.contains("speakable")){
speak(e.target.innerText);
}
});

/* مربع الإدخال */
msg.addEventListener("focus",()=>{
speak(currentLang==="ar"?"مكان إدخال الرسالة":"Message input field");
});

/* ===== قائمة ضخمة ===== */
const suspiciousWords = [
"تحقق من حسابك البنكي","تحقق من حسابك","تحديث الحساب","كلمة المرور","otp",
"credit card","bank","login","verify","account suspended",
"http://","https://","bit.ly","tinyurl",
"crypto","bitcoin","investment","double your money","free money",
"urgent","click here","act now","limited time","offer","guaranteed",
"prize","lottery","winner","cash","bonus","reward",
"bank transfer","wire transfer","iban","swift","cvv",
"verify your account","reset password","security alert",
"unusual activity","account locked","payment declined",
"refund","invoice","urgent payment","tax refund","government grant"
];

/* ===== تحليل ===== */
let timer;
const msg=document.getElementById("msg");

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,900);
});

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

/* حساب الخطورة */
suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=7;
});

if(text.includes("http") || text.includes("bit.ly")) score+=20;

if(score>100) score=100;

/* تحديد نوع الهجوم */
let attackType="—";

if(text.includes("verify") || text.includes("login") || text.includes("otp")){
attackType="Phishing (T1566)";
}
else if(text.includes("bank") || text.includes("card") || text.includes("cvv")){
attackType="Credential Theft";
}
else if(text.includes("bitcoin") || text.includes("investment")){
attackType="Financial Scam";
}
else if(text.includes("http") || text.includes("bit.ly")){
attackType="Malicious Link";
}

/* عرض */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("mitre").innerText="MITRE: "+attackType;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>30){

status.innerHTML=currentLang==="ar"?"⚠️ غير آمن":"⚠️ Unsafe";
status.className="recDanger speakable";

rec.innerHTML=currentLang==="ar"
?"⚠️ لا تضغط الروابط ولا تشارك بياناتك"
:"Do not click links or share data";

rec.className="recDanger speakable";

document.body.classList.add("dangerMode");

/* صوت */
speak(currentLang==="ar"
?"تحذير الرسالة مشبوهة"
:"Warning message is suspicious");

}else{

status.innerHTML=currentLang==="ar"?"✔️ آمن":"✔️ Safe";
status.className="recSafe speakable";

rec.innerHTML=currentLang==="ar"
?"✔️ لا يوجد تهديد واضح"
:"No threat detected";

rec.className="recSafe speakable";

document.body.classList.remove("dangerMode");

speak(currentLang==="ar"
?"الرسالة آمنة"
:"Message is safe");
}

}

/* ===== اللغة ===== */
function toggleLang(){

const btn=document.querySelector(".langBtn");

if(currentLang==="ar"){
currentLang="en";
btn.innerText="AR";
document.getElementById("subtitle").innerText="Suspicious Message Analysis";
document.getElementById("threatTitle").innerText="Threat Status";
document.getElementById("riskLabel").innerText="Risk Level:";
msg.placeholder="Paste message here";
}else{
currentLang="ar";
btn.innerText="EN";
document.getElementById("subtitle").innerText="منصة تحليل الرسائل المشبوهة";
document.getElementById("threatTitle").innerText="حالة التهديد";
document.getElementById("riskLabel").innerText="نسبة الخطورة:";
msg.placeholder="الصق الرسالة هنا";
}

}

/* ===== Matrix ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}

}

setInterval(draw,35);

</script>
</body>
</html>
