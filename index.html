<!-- أضف هذا داخل <head> -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let currentLang="ar";
let voiceEnabled=false;

/* ===== تفعيل الصوت (مهم) ===== */
document.addEventListener("click",()=>{
voiceEnabled=true;
});

/* ===== الصوت ===== */
function speak(text){
if(!voiceEnabled) return;

speechSynthesis.cancel();

let msg=new SpeechSynthesisUtterance(text);
msg.lang=currentLang==="ar"?"ar-SA":"en-US";
msg.rate=0.9;

speechSynthesis.speak(msg);
}

/* قراءة عند المرور */
document.addEventListener("mouseover",e=>{
if(e.target.classList.contains("speakable")){
speak(e.target.innerText);
}
});

/* صوت مربع النص */
const msg=document.getElementById("msg");

msg.addEventListener("mouseenter",()=>{
speak(currentLang==="ar"?
"أنت الآن في مربع إدخال النص":
"You are in the text input field");
});

/* ===== قائمة كلمات ضخمة ===== */
const suspiciousWords=[

"تحقق من حسابك البنكي","تحقق من حسابك","حسابك البنكي","تحديث الحساب",
"كلمة المرور","otp","رمز التحقق","بطاقة ائتمان","رقم البطاقة",
"cvv","iban","swift","تحويل بنكي","حوالة عاجلة",

"اضغط هنا","انقر هنا","عرض محدود","عرض خاص","فرصة لا تعوض",
"ربح سريع","اربح الآن","مجاناً","هدية مجانية","جائزة","فزت",

"bitcoin","crypto","double your money","free money","urgent",
"click here","verify your account","account suspended",

"http://","https://","bit.ly","tinyurl",".ru",".cn",".tk",

/* كلماتك الجديدة */
"خصم 50%","نقدي","كاش","مكافأة نقدية","قرض","استثمار مضمون",
"أرباح فورية","عرض مذهل","لا تفوت","عاجل","اطلب الآن",
"سجل الآن","مليون دولار","ربح صافٍ","خالٍ من المخاطر",

"guaranteed profit","risk free","fast cash","easy money",
"lottery","winner","bonus","reward"

];

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200); // تأخير مريح
});

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

/* رفع الخطورة */
suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=15;
});

/* روابط */
if(text.includes("http")) score+=25;

if(score>100) score=100;

/* نوع الهجوم */
let type="—";

if(text.includes("تحقق") || text.includes("verify")){
type=currentLang==="ar"?"تصيد احتيالي":"Phishing";
}
else if(text.includes("bank") || text.includes("بطاقة")){
type=currentLang==="ar"?"سرقة بيانات":"Data Theft";
}
else if(text.includes("bitcoin") || text.includes("استثمار")){
type=currentLang==="ar"?"احتيال مالي":"Financial Scam";
}
else if(text.includes("http")){
type=currentLang==="ar"?"رابط ضار":"Malicious Link";
}

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("mitre").innerText="MITRE: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>40){

document.body.classList.add("dangerMode");

if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";
speak("تحذير. الرسالة غير آمنة. لا تضغط الروابط");
}else{
status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
rec.innerHTML="⚠️ Do not click links or share data";
speak("Warning. This message is unsafe");
}

}else{

document.body.classList.remove("dangerMode");

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد واضح";
speak("الرسالة آمنة");
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat detected";
speak("This message is safe");
}

}

}

/* ===== اللغة ===== */
function toggleLang(){

currentLang=currentLang==="ar"?"en":"ar";

if(currentLang==="en"){
document.getElementById("subtitle").innerText="Suspicious Message Analyzer";
document.getElementById("threatTitle").innerText="Threat Status";
document.getElementById("riskLabel").innerText="Risk Score:";
msg.placeholder="Paste message here";
}else{
document.getElementById("subtitle").innerText="منصة تحليل الرسائل المشبوهة";
document.getElementById("threatTitle").innerText="حالة التهديد";
document.getElementById("riskLabel").innerText="نسبة الخطورة:";
msg.placeholder="الصق الرسالة هنا";
}

}

/* ===== تقرير احترافي PDF ===== */
function generateReport(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

/* ملاحظة: العربي صعب في PDF، نحوله بسيط */
doc.setFont("Helvetica");

doc.setFontSize(18);
doc.text("BlackFalcon SOC Report",20,20);

doc.setFontSize(12);
doc.text("Result: "+document.getElementById("status").innerText,20,40);
doc.text("Threat: "+document.getElementById("mitre").innerText,20,50);
doc.text("Risk: "+document.getElementById("score").innerText+"%",20,60);
doc.text("Recommendation:",20,80);

/* تقسيم النص */
let recText=document.getElementById("rec").innerText;
let split=doc.splitTextToSize(recText,170);
doc.text(split,20,90);

doc.text("Generated by BlackFalcon SOC",20,120);

doc.save("BlackFalcon_Report.pdf");

speak(currentLang==="ar"?"تم إنشاء التقرير":"Report generated");

}

/* ===== Matrix ===== */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01BLACKFALCON";
const fontSize=14;
const columns=canvas.width/fontSize;

const drops=[];
for(let i=0;i<columns;i++){drops[i]=1;}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
drops[i]++;
if(drops[i]*fontSize>canvas.height) drops[i]=0;
}

}

setInterval(draw,35);

</script>
