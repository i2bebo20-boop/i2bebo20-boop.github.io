// ШӘШЈШ®ЩҠШұ Ш§Щ„ШӘШӯЩ„ЩҠЩ„
вҖҸlet timer;
вҖҸdocument.getElementById("msg").addEventListener("input",()=>{
вҖҸclearTimeout(timer);
вҖҸtimer=setTimeout(analyze,800);
});

// Ш§Щ„ШӘШӯЩ„ЩҠЩ„
вҖҸfunction analyze(){
вҖҸlet text=document.getElementById("msg").value.toLowerCase();
вҖҸlet matches=0;
вҖҸsuspiciousWords.forEach(w=>{if(text.includes(w.toLowerCase()))matches++});
вҖҸlet risk=Math.min(matches*5,100);
вҖҸdocument.getElementById("score").innerText=risk;
вҖҸdocument.getElementById("bar").style.width=risk+"%";
вҖҸlet status=document.getElementById("status");
вҖҸlet rec=document.getElementById("rec");
вҖҸlet attack=document.getElementById("attackType");
вҖҸlet mitre=document.getElementById("mitre");

вҖҸif(risk>0){
вҖҸdocument.body.classList.add("dangerMode");
вҖҸstatus.innerHTML=lang=="ar"?"вҡ пёҸ ШұШіШ§Щ„Ш© Щ…ШҙШЁЩҲЩҮШ©":"вҡ пёҸ Suspicious Message";
вҖҸrec.className="recommendation recDanger speakable";
вҖҸrec.innerHTML=lang=="ar"?"вҡ пёҸ Щ„Ш§ ШӘШ¶ШәШ· ШЈЩҠ ШұШ§ШЁШ· ЩҲШ§ШӯШ°ЩҒ Ш§Щ„ШұШіШ§Щ„Ш© ЩҒЩҲШұШ§ЩӢ.":"вҡ пёҸ Do not click any links. Delete message immediately.";
вҖҸattack.innerText=lang=="ar"?"Ш§ШӯШӘЩҠШ§Щ„/ЩҒШ§ЩҠШҙЩҠЩҶШә":"Phishing / Fraud";
вҖҸmitre.innerText="T1566";
вҖҸspeak(status.innerText+" "+rec.innerText);
вҖҸ}else{
вҖҸdocument.body.classList.remove("dangerMode");
вҖҸstatus.innerHTML=lang=="ar"?"вң”пёҸ Ш§Щ„ШұШіШ§Щ„Ш© ШўЩ…ЩҶШ©":"вң”пёҸ Message is safe";
вҖҸrec.className="recommendation recSafe speakable";
вҖҸrec.innerHTML=lang=="ar"?"вң”пёҸ Ш§Щ„ШұШіШ§Щ„Ш© ШӘШЁШҜЩҲ ШўЩ…ЩҶШ©.":"вң”пёҸ Message looks safe.";
вҖҸattack.innerText="-";
вҖҸmitre.innerText="-";
вҖҸspeak(status.innerText+" "+rec.innerText);
}
}

вҖҸ// Matrix
вҖҸconst canvas=document.getElementById("matrix");
вҖҸconst ctx=canvas.getContext("2d");
вҖҸcanvas.height=window.innerHeight;
вҖҸcanvas.width=window.innerWidth;
вҖҸlet letters="гӮўгӮЎгӮ«гӮөгӮҝгғҠгғҸгғһгғӨгғЈгғ©гғҜ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
вҖҸletters=letters.split("");
вҖҸlet fontSize=14;
вҖҸlet columns=canvas.width/fontSize;
вҖҸlet drops=[];
вҖҸfor(let i=0;i<columns;i++){drops[i]=1;}
вҖҸfunction draw(){
вҖҸctx.fillStyle="rgba(0,0,0,0.08)";
вҖҸctx.fillRect(0,0,canvas.width,canvas.height);
вҖҸctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";
вҖҸctx.font=fontSize+"px monospace";
вҖҸfor(let i=0;i<drops.length;i++){
вҖҸctx.fillText(letters[Math.floor(Math.random()*letters.length)],i*fontSize,drops[i]*fontSize);
вҖҸif(drops[i]*fontSize>canvas.height && Math.random()>0.975)drops[i]=0;
вҖҸdrops[i]++;
}}
вҖҸsetInterval(draw,35);
