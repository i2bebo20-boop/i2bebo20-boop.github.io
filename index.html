<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/plugins/arabic.js"></script>

<style>
body{margin:0;background:black;color:#00f5d4;font-family:'Orbitron';overflow:hidden;}
body.dangerMode{background:#140000;box-shadow:inset 0 0 200px red;}
canvas{position:fixed;top:0;left:0;z-index:-1;}

.container{text-align:center;margin-top:40px;}

.logo{font-size:80px}
.project{font-size:28px}

textarea{
width:80%;height:130px;background:#000;border:1px solid #00f5d4;
border-radius:20px;color:#00f5d4;padding:15px;font-size:16px;
}

.card{
width:80%;margin:20px auto;padding:20px;
background:#000;border-radius:20px;text-align:left;
box-shadow:0 0 20px #00f5d4;
}

.progress{height:10px;background:#111;border-radius:20px;}
.bar{height:100%;width:0%;background:red;}

.btn{
padding:10px;margin:5px;border:1px solid #00f5d4;
background:none;color:#00f5d4;border-radius:10px;cursor:pointer;
}

.safe{color:#00ff88;}
.danger{color:red;}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="logo speakable">🦅</div>
<div class="project speakable">BlackFalcon SOC</div>

<button class="btn speakable" onclick="toggleLang()">EN / AR</button>
<button class="btn speakable" onclick="generatePDF()">REPORT</button>

<textarea id="msg" class="speakable" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<h2 id="threatTitle" class="speakable">حالة التهديد</h2>
<div id="status" class="speakable">—</div>

<div>
<span id="riskLabel">نسبة الخطورة:</span> <span id="score">0</span>%
</div>

<div class="progress"><div id="bar" class="bar"></div></div>

<div id="mitre" class="speakable">MITRE: —</div>
</div>

<div id="rec" class="speakable safe">✔️ بانتظار التحليل</div>

</div>

<script>

let lang="ar";
let lastResult="", lastType="", lastRec="", lastScore=0;

/* صوت */
function speak(text){
if(!text) return;
let u=new SpeechSynthesisUtterance(text);
u.lang=lang==="ar"?"ar-SA":"en-US";
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

/* hover */
document.addEventListener("mouseover",e=>{
if(e.target.classList.contains("speakable")){
speak(e.target.innerText);
}
});

/* مربع النص */
const msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
speak(lang==="ar"?"أنت في مربع إدخال النص":"You are in text box");
});

/* كلمات */
const words=[
"تحقق من حسابك البنكي","verify your bank account",
"otp","password","bank","bitcoin",
"http","urgent","click here","free money",
"مجاناً","جائزة","اربح","تحويل","استثمار"
];

/* تحليل */
let t;
msg.addEventListener("input",()=>{
clearTimeout(t);
t=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();
let score=0;

if(text.includes("تحقق من حسابك البنكي")) score+=70;

words.forEach(w=>{
if(text.includes(w)) score+=15;
});

if(text.includes("http")) score+=25;

if(score>100) score=100;

lastScore=score;

/* MITRE */
let type="—";

if(text.includes("verify")||text.includes("otp")||text.includes("تحقق")){
type="Phishing - T1566";
}
else if(text.includes("bank")) type="Credential Theft";
else if(text.includes("bitcoin")) type="Financial Scam";
else if(text.includes("http")) type="Malicious Link";

document.getElementById("mitre").innerText="MITRE: "+type;
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>30){

document.body.classList.add("dangerMode");

if(lang==="ar"){
status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";
speak("تحذير الرسالة غير آمنة");
lastResult="غير آمن";
lastRec="لا تضغط الروابط ولا تشارك بياناتك";
}else{
status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
rec.innerHTML="⚠️ Do not click links";
speak("Warning unsafe message");
lastResult="UNSAFE";
lastRec="Do not click links";
}

}else{

document.body.classList.remove("dangerMode");

if(lang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد";
speak("الرسالة آمنة");
lastResult="آمن";
lastRec="لا يوجد تهديد";
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat";
speak("Message is safe");
lastResult="SAFE";
lastRec="No threat";
}
}

lastType=type;
}

/* لغة */
function toggleLang(){
lang=lang==="ar"?"en":"ar";

document.getElementById("riskLabel").innerText=
lang==="ar"?"نسبة الخطورة:":"Risk Score:";

document.getElementById("threatTitle").innerText=
lang==="ar"?"حالة التهديد":"Threat Status";

msg.placeholder=
lang==="ar"?"الصق الرسالة هنا":"Paste message here";
}

/* PDF احترافي */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setR2L(true);

/* خلفية */
doc.setFillColor(0,0,0);
doc.rect(0,0,210,297,"F");

/* لوقو */
doc.setFontSize(40);
doc.setTextColor(0,255,200);
doc.text("🦅",105,35,null,null,"center");

/* اسم */
doc.setFontSize(20);
doc.text("BlackFalcon SOC",105,50,null,null,"center");

doc.setTextColor(255,255,255);
doc.setFontSize(14);

doc.text(lang==="ar"?"تقرير أمني":"Security Report",105,65,null,null,"center");

/* النص */
let input=msg.value||"---";
let wrapped=doc.splitTextToSize(input,160);

if(lang==="ar"){
doc.text("النص:",180,90,{align:"right"});
doc.text(wrapped,180,100,{align:"right"});
}else{
doc.setR2L(false);
doc.text("Input:",20,90);
doc.text(wrapped,20,100);
}

/* النتائج */
doc.setFontSize(12);

if(lang==="ar"){
doc.setR2L(true);
doc.text("النتيجة: "+lastResult,180,150,{align:"right"});
doc.text("النوع: "+lastType,180,165,{align:"right"});
doc.text("الخطورة: "+lastScore+"%",180,180,{align:"right"});
doc.text("التوصية: "+lastRec,180,195,{align:"right"});
}else{
doc.setR2L(false);
doc.text("Result: "+lastResult,20,150);
doc.text("Type: "+lastType,20,165);
doc.text("Risk: "+lastScore+"%",20,180);
doc.text("Recommendation: "+lastRec,20,195);
}

/* بار */
doc.setFillColor(255,0,0);
doc.rect(20,250,lastScore*1.5,8,"F");

doc.save("BlackFalcon_Report.pdf");
}

/* Matrix */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let letters="01BLACKFALCON";
let drops=Array(Math.floor(c.width/14)).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle=document.body.classList.contains("dangerMode")?"red":"#00f5d4";

drops.forEach((y,i)=>{
let t=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(t,i*14,y*14);
drops[i]=y*14>c.height?0:y+1;
});
}
setInterval(draw,35);

</script>
</body>
</html>
