<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let currentLang="ar";
let lastResult="", lastType="", lastRec="", lastMsg="";

/* ===== صوت ===== */
function speak(text){
if(!text) return;

speechSynthesis.cancel();

let msg=new SpeechSynthesisUtterance(text);
msg.lang = currentLang==="ar" ? "ar-SA" : "en-US";

speechSynthesis.speak(msg);
}

/* قراءة عند المرور */
document.addEventListener("mouseover",e=>{
if(e.target.classList.contains("speakable")){
speak(e.target.innerText);
}
});

/* مربع النص */
const msg=document.getElementById("msg");

msg.addEventListener("focus",()=>{
speak(currentLang==="ar"?
"أنت الآن في مربع إدخال الرسالة":
"You are in the message input field");
});

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,1200);
});

function analyze(){

let text=msg.value.toLowerCase();
lastMsg = msg.value;

let score=0;

if(text.includes("تحقق من حسابك البنكي")) score+=60;
if(text.includes("verify your bank account")) score+=60;

const words=[
"otp","verify","bank","password","credit card",
"bitcoin","http","urgent","click here","free money",
"مجاناً","جائزة","اضغط هنا","تحويل","استثمار"
];

words.forEach(w=>{
if(text.includes(w)) score+=15;
});

if(score>100) score=100;

/* نوع */
let type="—";

if(text.includes("verify")||text.includes("تحقق")) type="Phishing";
else if(text.includes("bank")) type="Data Theft";
else if(text.includes("bitcoin")) type="Financial Scam";
else if(text.includes("http")) type="Malicious Link";

/* عرض */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("mitre").innerText="MITRE: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

if(score>30){

document.body.classList.add("dangerMode");

if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
rec.innerHTML="⚠️ لا تضغط الروابط ولا تشارك بياناتك";

speak("تحذير. الرسالة غير آمنة. التوصية. لا تضغط الروابط ولا تشارك بياناتك");

lastResult="غير آمن";
lastRec="لا تضغط الروابط ولا تشارك بياناتك";

}else{
status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
rec.innerHTML="⚠️ Do not click links or share data";

speak("Warning. This message is unsafe. Recommendation. Do not click links or share data");

lastResult="UNSAFE";
lastRec="Do not click links or share data";
}

}else{

document.body.classList.remove("dangerMode");

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
rec.innerHTML="✔️ لا يوجد تهديد واضح";

speak("الرسالة آمنة. لا يوجد تهديد");

lastResult="آمن";
lastRec="لا يوجد تهديد واضح";

}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
rec.innerHTML="✔️ No threat detected";

speak("This message is safe. No threat detected");

lastResult="SAFE";
lastRec="No threat detected";
}

}

lastType=type;
}

/* ===== لغة ===== */
function toggleLang(){

currentLang = currentLang==="ar" ? "en" : "ar";

if(currentLang==="en"){
document.getElementById("subtitle").innerText="Suspicious Message Analyzer";
document.getElementById("threatTitle").innerText="Threat Status";
document.getElementById("riskLabel").innerText="Risk Score:";
msg.placeholder="Paste message here";
}else{
document.getElementById("subtitle").innerText="منصة تحليل الرسائل المشبوهة";
document.getElementById("threatTitle").innerText="حالة التهديد";
document.getElementById("riskLabel").innerText="نسبة الخطورة:";
msg.placeholder="الصق الرسالة هنا";
}

}

/* ===== PDF احترافي (حل مشكلة العربي) ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

/* نحول للعربي = انجليزي داخل PDF */
let result = currentLang==="ar" ? 
(lastResult==="آمن"?"SAFE":"UNSAFE") : lastResult;

let rec = currentLang==="ar" ?
(lastRec==="لا يوجد تهديد واضح"?"No threat detected":"Do not click links or share data") : lastRec;

/* اللوقو */
doc.setFontSize(28);
doc.text("🦅",105,30,null,null,"center");

/* اسم المشروع */
doc.setFontSize(18);
doc.text("BlackFalcon SOC",105,45,null,null,"center");

doc.setFontSize(12);
doc.text("Security Report",105,55,null,null,"center");

/* المحتوى */
doc.setFontSize(11);

doc.text("Message:",20,80);
doc.text(doc.splitTextToSize(lastMsg,170),20,90);

doc.text("Result: "+result,20,120);
doc.text("Threat Type: "+lastType,20,130);
doc.text("Risk: "+document.getElementById("score").innerText+"%",20,140);
doc.text("Recommendation: "+rec,20,150);

doc.save("BlackFalcon_Report.pdf");

}

</script>
