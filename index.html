<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>BlackFalcon SOC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
background:#0a0f14;
color:#e6f1ff;
font-family:'Orbitron',sans-serif;
}

.container{
text-align:center;
margin-top:60px;
}

h1{
color:#00f5d4;
letter-spacing:2px;
}

textarea{
width:75%;
height:130px;
background:#111;
border:1px solid #00f5d4;
border-radius:12px;
padding:15px;
color:#fff;
outline:none;
}

textarea:focus{
box-shadow:0 0 10px #00f5d4;
}

.card{
width:75%;
margin:25px auto;
padding:20px;
border-radius:15px;
background:#111;
}

.bar{
height:8px;
background:#00f5d4;
width:0%;
border-radius:10px;
transition:0.4s;
}

.safe{color:#00ff88;}
.danger{color:#ff4d4d;}

.btn{
padding:10px 18px;
margin:10px;
border:none;
background:#00f5d4;
color:black;
cursor:pointer;
border-radius:8px;
font-weight:bold;
}

.btn:hover{
opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>BlackFalcon SOC</h1>

<button class="btn" onclick="toggleLang()">EN / AR</button>
<button class="btn" onclick="generatePDF()">REPORT</button>

<textarea id="msg" placeholder="الصق الرسالة هنا..."></textarea>

<div class="card">
<div id="status">—</div>
<div>Risk: <span id="score">0</span>%</div>
<div class="bar" id="bar"></div>
<div id="type">Type: —</div>
</div>

<div id="rec">✔️ بانتظار التحليل</div>

</div>

<script>

let currentLang="ar";
let lastSpeak="";
let lastResult="",lastType="",lastRec="",lastMsg="";

/* ===== صوت مضبوط ===== */
function speak(text){
speechSynthesis.cancel();

let u=new SpeechSynthesisUtterance(text);
u.lang = currentLang==="ar" ? "ar-SA" : "en-US";
speechSynthesis.speak(u);
}

/* ===== Hover للمكفوفين ===== */
msg.addEventListener("mouseenter",()=>{
if(currentLang==="ar"){
speak("مربع إدخال الرسالة");
}else{
speak("Message input box");
}
});

/* ===== كلمات مشبوهة ===== */
const suspiciousWords=[
"otp","password","bank","bitcoin","crypto","wallet",
"http","https","urgent","click","verify","account","login",
"security alert","free money","offer","winner","lottery",
"تحقق","كلمة المرور","حساب","بنك","رابط","اضغط","عاجل",
"جائزة","هدية","استثمار","ربح","مجانا","تأكيد"
];

/* ===== تحليل ===== */
let timer;

msg.addEventListener("input",()=>{
clearTimeout(timer);
timer=setTimeout(analyze,800);
});

function analyze(){

let text=msg.value.toLowerCase();
lastMsg=msg.value;

let score=0;

suspiciousWords.forEach(w=>{
if(text.includes(w)) score+=8;
});

if(text.includes("http")) score+=25;
if(text.includes("otp")) score+=25;

if(score>100) score=100;

/* النوع */
let type="Safe";

if(text.match(/verify|تحقق|login/)) type="Phishing";
else if(text.match(/bank|account/)) type="Data Theft";
else if(text.match(/crypto|bitcoin/)) type="Crypto Scam";
else if(text.match(/http/)) type="Malicious Link";

/* UI */
document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";
document.getElementById("type").innerText="Type: "+type;

let status=document.getElementById("status");
let rec=document.getElementById("rec");

/* ===== لغة موحدة (بدون خلط) ===== */
if(score>35){

if(currentLang==="ar"){
status.innerHTML="<span class='danger'>⚠️ غير آمن</span>";
lastResult="غير آمن";
lastRec="لا تضغط الروابط ولا تشارك بياناتك";
}else{
status.innerHTML="<span class='danger'>⚠️ UNSAFE</span>";
lastResult="UNSAFE";
lastRec="Do not click links or share data";
}

}else{

if(currentLang==="ar"){
status.innerHTML="<span class='safe'>✔️ آمن</span>";
lastResult="آمن";
lastRec="لا يوجد تهديد";
}else{
status.innerHTML="<span class='safe'>✔️ SAFE</span>";
lastResult="SAFE";
lastRec="No threat detected";
}

}

rec.innerHTML=lastRec;

/* 🔊 قراءة بنفس اللغة فقط */
speak(lastResult + ". " + lastRec);

lastType=type;
}

/* ===== تغيير اللغة ===== */
function toggleLang(){
currentLang=currentLang==="ar"?"en":"ar";

msg.placeholder=currentLang==="ar"?"الصق الرسالة هنا":"Paste message here";
}

/* ===== PDF ===== */
function generatePDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFillColor(10,15,20);
doc.rect(0,0,210,297,"F");

doc.setTextColor(0,245,212);

let ar=currentLang==="ar";

doc.setFontSize(18);
doc.text(ar?"تقرير أمني":"Security Report",105,30,null,null,"center");

doc.line(20,40,190,40);

doc.setFontSize(12);

doc.text(ar?"الرسالة:":"Message:",20,60);
doc.text(doc.splitTextToSize(lastMsg||"",170),20,70);

doc.text((ar?"النتيجة: ":"Result: ")+lastResult,20,110);
doc.text((ar?"النوع: ":"Type: ")+lastType,20,120);
doc.text((ar?"الخطر: ":"Risk: ")+document.getElementById("score").innerText+"%",20,130);

doc.text(ar?"التوصية:":"Recommendation:",20,150);
doc.text(doc.splitTextToSize(lastRec,170),20,160);

doc.save("BlackFalcon_Report.pdf");

speak(ar?"تم إنشاء التقرير":"Report generated");
}

</script>

</body>
</html>
